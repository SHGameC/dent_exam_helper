<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Доклиническая реставрационная стоматология — Флэшкарты</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0e11;
    --surface: #1a1820;
    --surface2: #221f2b;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --accent: #c8a96e;
    --accent2: #e8c98e;
    --text: #f0ece4;
    --text2: #a09890;
    --text3: #6a6260;
    --green: #5cba8a;
    --red: #e0605a;
    --blue: #5b9cf6;
    --radius: 14px;
    --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Lora', Georgia, serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.7;
  }

  /* HEADER */
  .header {
    padding: 2rem 2rem 1rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 1rem;
  }
  .header-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.3rem, 3vw, 1.9rem);
    font-weight: 700;
    color: var(--accent2);
    line-height: 1.2;
  }
  .header-sub {
    font-size: 0.85rem;
    color: var(--text3);
    margin-top: 0.3rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .stats-row {
    display: flex;
    gap: 1.5rem;
    font-size: 0.82rem;
    color: var(--text2);
  }
  .stat { text-align: center; }
  .stat strong { display: block; font-size: 1.4rem; font-family: 'Playfair Display', serif; color: var(--accent); font-weight: 500; }

  /* NAV */
  .nav {
    display: flex;
    gap: 0.5rem;
    padding: 1rem 2rem;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    position: sticky;
    top: 0;
    z-index: 100;
    flex-wrap: wrap;
  }
  .nav-btn {
    padding: 0.45rem 1.1rem;
    border-radius: 100px;
    border: 1px solid var(--border2);
    background: transparent;
    color: var(--text2);
    cursor: pointer;
    font-family: 'Lora', serif;
    font-size: 0.88rem;
    transition: all 0.2s;
  }
  .nav-btn:hover { border-color: var(--accent); color: var(--accent); }
  .nav-btn.active { background: var(--accent); border-color: var(--accent); color: #1a1408; font-weight: 500; }

  /* SECTIONS */
  .section { display: none; }
  .section.visible { display: block; }

  /* SEARCH + FILTER */
  .toolbar {
    padding: 1rem 2rem;
    display: flex;
    gap: 1rem;
    align-items: center;
    flex-wrap: wrap;
    border-bottom: 1px solid var(--border);
  }
  .search-wrap { position: relative; flex: 1; min-width: 200px; }
  .search-wrap svg { position: absolute; left: 0.8rem; top: 50%; transform: translateY(-50%); opacity: 0.4; }
  #search {
    width: 100%;
    padding: 0.55rem 0.8rem 0.55rem 2.4rem;
    border-radius: 100px;
    border: 1px solid var(--border2);
    background: var(--surface);
    color: var(--text);
    font-family: 'Lora', serif;
    font-size: 0.9rem;
    outline: none;
  }
  #search:focus { border-color: var(--accent); }
  .filter-select {
    padding: 0.55rem 1rem;
    border-radius: 100px;
    border: 1px solid var(--border2);
    background: var(--surface);
    color: var(--text2);
    font-family: 'Lora', serif;
    font-size: 0.88rem;
    cursor: pointer;
    outline: none;
  }

  /* FLASHCARD GRID */
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 1.2rem;
    padding: 1.5rem 2rem;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    cursor: pointer;
    transition: border-color 0.2s, transform 0.15s;
    position: relative;
  }
  .card:hover { border-color: var(--border2); transform: translateY(-2px); }
  .card.learned { border-color: var(--green) !important; }
  .card.learned::after {
    content: '✓';
    position: absolute;
    top: 0.7rem;
    right: 0.9rem;
    color: var(--green);
    font-size: 1rem;
  }
  .card-num {
    font-size: 0.72rem;
    color: var(--text3);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 1rem 1.2rem 0.4rem;
  }
  .card-q {
    padding: 0 1.2rem 1.1rem;
    font-size: 0.93rem;
    color: var(--text);
    font-style: italic;
    line-height: 1.5;
  }
  .card-divider {
    height: 1px;
    background: var(--border);
    margin: 0 1.2rem;
  }
  .card-answer-short {
    padding: 0.9rem 1.2rem;
    font-size: 0.87rem;
    color: var(--accent);
    line-height: 1.5;
  }
  .card-expand {
    padding: 0 1.2rem 0.7rem;
    font-size: 0.82rem;
    color: var(--text3);
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }
  .expand-btn {
    background: none;
    border: none;
    color: var(--text3);
    cursor: pointer;
    font-family: 'Lora', serif;
    font-size: 0.82rem;
    padding: 0;
    display: flex;
    align-items: center;
    gap: 0.3rem;
    transition: color 0.2s;
  }
  .expand-btn:hover { color: var(--accent); }
  .card-full {
    display: none;
    padding: 0 1.2rem 1.2rem;
    font-size: 0.87rem;
    color: var(--text2);
    line-height: 1.7;
    border-top: 1px solid var(--border);
    margin-top: 0.3rem;
  }
  .card-full.open { display: block; }
  .card-actions {
    padding: 0 1.2rem 1rem;
    display: flex;
    gap: 0.5rem;
  }
  .tag-learned {
    font-size: 0.75rem;
    padding: 0.25rem 0.75rem;
    border-radius: 100px;
    border: 1px solid var(--border2);
    background: transparent;
    color: var(--text3);
    cursor: pointer;
    font-family: 'Lora', serif;
    transition: all 0.2s;
  }
  .tag-learned:hover { border-color: var(--green); color: var(--green); }
  .card.learned .tag-learned { background: var(--green); color: #0a2e1e; border-color: var(--green); }

  /* LOADING state */
  .loading-card {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    color: var(--text3);
    font-size: 0.85rem;
    gap: 0.5rem;
  }
  .spinner {
    width: 16px; height: 16px;
    border: 2px solid var(--border2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* QUIZ SECTION */
  .quiz-container {
    max-width: 680px;
    margin: 0 auto;
    padding: 2rem;
  }
  .quiz-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 2rem;
    flex-wrap: wrap;
    gap: 1rem;
  }
  .quiz-progress-bar {
    width: 100%;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    margin-bottom: 2rem;
    overflow: hidden;
  }
  .quiz-progress-fill {
    height: 100%;
    background: var(--accent);
    transition: width 0.4s;
  }
  .quiz-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 2rem;
    margin-bottom: 1.5rem;
  }
  .quiz-q-num { font-size: 0.75rem; color: var(--text3); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 0.7rem; }
  .quiz-q-text { font-size: 1.05rem; font-style: italic; color: var(--text); margin-bottom: 1.5rem; line-height: 1.6; }
  .quiz-options { display: flex; flex-direction: column; gap: 0.75rem; }
  .quiz-opt {
    padding: 0.85rem 1.1rem;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border2);
    background: var(--surface2);
    color: var(--text2);
    cursor: pointer;
    font-family: 'Lora', serif;
    font-size: 0.9rem;
    text-align: left;
    transition: all 0.2s;
    line-height: 1.5;
  }
  .quiz-opt:hover:not(:disabled) { border-color: var(--accent); color: var(--text); }
  .quiz-opt.correct { border-color: var(--green); background: rgba(92,186,138,0.1); color: var(--green); }
  .quiz-opt.wrong { border-color: var(--red); background: rgba(224,96,90,0.1); color: var(--red); }
  .quiz-opt:disabled { cursor: default; }
  .quiz-explanation {
    display: none;
    margin-top: 1.2rem;
    padding: 1rem;
    border-radius: var(--radius-sm);
    background: var(--surface2);
    border: 1px solid var(--border);
    font-size: 0.88rem;
    color: var(--text2);
    line-height: 1.7;
  }
  .quiz-explanation.open { display: block; }
  .quiz-next-btn {
    display: none;
    margin-top: 1.2rem;
    padding: 0.7rem 1.8rem;
    border-radius: 100px;
    border: none;
    background: var(--accent);
    color: #1a1408;
    cursor: pointer;
    font-family: 'Lora', serif;
    font-size: 0.95rem;
    font-weight: 500;
  }
  .quiz-next-btn.visible { display: inline-block; }
  .quiz-score {
    display: none;
    text-align: center;
    padding: 3rem 2rem;
  }
  .quiz-score.visible { display: block; }
  .score-num { font-family: 'Playfair Display', serif; font-size: 4rem; color: var(--accent); }
  .score-label { font-size: 1rem; color: var(--text2); margin-top: 0.5rem; }
  .score-emoji { font-size: 2.5rem; margin: 1rem 0; }
  .quiz-settings {
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
    margin-bottom: 1.5rem;
    align-items: center;
  }
  .quiz-settings label { font-size: 0.88rem; color: var(--text2); display: flex; align-items: center; gap: 0.5rem; }
  .quiz-settings select, .quiz-settings input[type=number] {
    padding: 0.4rem 0.8rem;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border2);
    background: var(--surface);
    color: var(--text);
    font-family: 'Lora', serif;
    font-size: 0.85rem;
  }
  .start-quiz-btn {
    padding: 0.75rem 2rem;
    border-radius: 100px;
    border: none;
    background: var(--accent);
    color: #1a1408;
    cursor: pointer;
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 0.03em;
    transition: opacity 0.2s;
  }
  .start-quiz-btn:hover { opacity: 0.9; }
  .quiz-setup { display: block; }
  .quiz-active { display: none; }

  /* CATEGORY tags */
  .cat-tag {
    display: inline-block;
    font-size: 0.7rem;
    padding: 0.15rem 0.6rem;
    border-radius: 100px;
    background: var(--surface2);
    color: var(--text3);
    border: 1px solid var(--border);
    margin: 0.2rem 1.2rem 0.5rem;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  @media (max-width: 600px) {
    .cards-grid { grid-template-columns: 1fr; padding: 1rem; }
    .header { padding: 1.2rem 1rem 0.8rem; }
    .nav, .toolbar { padding: 0.7rem 1rem; }
    .quiz-container { padding: 1rem; }
  }

  .no-results {
    grid-column: 1/-1;
    text-align: center;
    padding: 3rem;
    color: var(--text3);
    font-style: italic;
  }

  /* AI generating indicator */
  .ai-generating {
    font-size: 0.78rem;
    color: var(--text3);
    padding: 0.5rem 1.2rem 1rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-title">Доклиническая реставрационная<br>стоматология</div>
    <div class="header-sub">Флэшкарты для подготовки к экзамену · 2025–2026</div>
  </div>
  <div class="stats-row">
    <div class="stat"><strong id="total-count">75</strong>вопросов</div>
    <div class="stat"><strong id="learned-count">0</strong>изучено</div>
    <div class="stat"><strong id="pct-count">0%</strong>прогресс</div>
  </div>
</div>

<div class="nav">
  <button class="nav-btn active" onclick="showSection('flashcards', this)">Флэшкарты</button>
  <button class="nav-btn" onclick="showSection('quiz', this)">Тест / Квиз</button>
</div>

<!-- FLASHCARDS SECTION -->
<div class="section visible" id="section-flashcards">
  <div class="toolbar">
    <div class="search-wrap">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="search" placeholder="Поиск по вопросам..." oninput="filterCards()">
    </div>
    <select class="filter-select" id="cat-filter" onchange="filterCards()">
      <option value="">Все темы</option>
      <option value="Оборудование">Оборудование</option>
      <option value="Препарирование">Препарирование</option>
      <option value="Кариес">Кариес и классы по Блеку</option>
      <option value="Минимально">Минимально-инвазивные</option>
      <option value="Материалы">Пломбировочные материалы</option>
      <option value="Цементы">Цементы</option>
      <option value="Композиты">Композиты</option>
      <option value="Адгезивные">Адгезивные системы</option>
      <option value="Техники">Техники пломбирования</option>
      <option value="Анатомия">Анатомия зубов</option>
      <option value="Практика">Практические навыки</option>
    </select>
    <select class="filter-select" id="status-filter" onchange="filterCards()">
      <option value="">Все карточки</option>
      <option value="new">Не изучено</option>
      <option value="learned">Изучено</option>
    </select>
  </div>
  <div class="cards-grid" id="cards-grid"></div>
</div>

<!-- QUIZ SECTION -->
<div class="section" id="section-quiz">
  <div class="quiz-container">
    <div class="quiz-setup" id="quiz-setup">
      <h2 style="font-family:'Playfair Display',serif;font-size:1.5rem;margin-bottom:0.5rem;color:var(--accent2)">Режим теста</h2>
      <p style="color:var(--text2);margin-bottom:1.5rem;font-size:0.92rem">Выберите параметры и начните самопроверку</p>
      <div class="quiz-settings">
        <label>Тема:
          <select id="quiz-cat">
            <option value="">Все темы</option>
            <option value="Оборудование">Оборудование</option>
            <option value="Препарирование">Препарирование</option>
            <option value="Кариес">Кариес и классы по Блеку</option>
            <option value="Минимально">Минимально-инвазивные</option>
            <option value="Материалы">Пломбировочные материалы</option>
            <option value="Цементы">Цементы</option>
            <option value="Композиты">Композиты</option>
            <option value="Адгезивные">Адгезивные системы</option>
            <option value="Техники">Техники пломбирования</option>
            <option value="Анатомия">Анатомия зубов</option>
            <option value="Практика">Практические навыки</option>
          </select>
        </label>
        <label>Вопросов:
          <input type="number" id="quiz-num" value="10" min="3" max="75" style="width:70px">
        </label>
        <label>
          <input type="checkbox" id="quiz-learned-only"> Только изученные
        </label>
      </div>
      <button class="start-quiz-btn" onclick="startQuiz()">Начать тест →</button>
    </div>

    <div class="quiz-active" id="quiz-active">
      <div class="quiz-header">
        <span style="font-size:0.85rem;color:var(--text3)" id="quiz-counter">Вопрос 1 из 10</span>
        <span style="font-size:0.85rem;color:var(--green)" id="quiz-score-live">✓ 0</span>
        <button onclick="endQuiz()" style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:0.82rem;font-family:'Lora',serif">Завершить</button>
      </div>
      <div class="quiz-progress-bar"><div class="quiz-progress-fill" id="quiz-progress"></div></div>
      <div class="quiz-card">
        <div class="quiz-q-num" id="quiz-q-num"></div>
        <div class="quiz-q-text" id="quiz-q-text"></div>
        <div class="quiz-options" id="quiz-options"></div>
        <div class="quiz-explanation" id="quiz-explanation"></div>
        <button class="quiz-next-btn" id="quiz-next" onclick="nextQuestion()">Следующий →</button>
      </div>
    </div>

    <div class="quiz-score" id="quiz-score-end">
      <div class="score-num" id="score-num"></div>
      <div class="score-label">правильных ответов</div>
      <div class="score-emoji" id="score-emoji"></div>
      <p style="color:var(--text2);margin-bottom:1.5rem" id="score-comment"></p>
      <button class="start-quiz-btn" onclick="resetQuiz()">Пройти ещё раз</button>
    </div>
  </div>
</div>

<script>
const QUESTIONS = [
{ "id":1, "cat":"Оборудование", "q":"Эргономика в стоматологии. Этика и деонтология в стоматологии. Оснащение кабинета терапевта стоматолога.", "short":"Эргономика — наука об оптимальной организации рабочей среды врача. Рабочее место включает стоматологическую установку, кресло, светильник, стул врача и ассистента, мебель для инструментов.", "full":"Эргономика изучает функциональные возможности человека в трудовых процессах с целью создания оптимальных условий труда. Задачи эргономики в стоматологии: 1) обеспечение максимального удобства работы врача и персонала; 2) рациональное устройство кабинета и размещение оборудования; 3) снижение физической нагрузки; 4) снижение психологической и эмоциональной нагрузки; 5) профессиональный отбор персонала. Оптимальной считается работа стоматолога-терапевта сидя, с ассистентом «в четыре руки» при горизонтальном положении пациента. Врач располагается в позиции «8–12 часов», ассистент — «2–5 часов». Рабочее место терапевта-стоматолога включает: универсальную стоматологическую установку, стоматологическое кресло, стулья врача и ассистента с учётом антропометрических данных, операционный светильник (достаточной мощности, не вызывающий самополимеризации), плевательницу с гидроблоком, блок воздух/вода/пылесос/слюноотсос, рабочий столик ассистента, мебель для инструментов и материалов. Площадь кабинета — не менее 14 м² на одно кресло, +7 м² на каждое дополнительное. Этика — принципы профессионального поведения врача (уважение к пациенту, честность, конфиденциальность, недопущение дискриминации). Деонтология — учение о врачебном долге: принцип «не навреди», информированное добровольное согласие пациента, соблюдение врачебной тайны. Взаимоотношения «врач–пациент» строятся на партнёрских началах, врач обязан разъяснять пациенту план лечения, возможные риски и альтернативы.", "opts":["Наука об оптимальной организации рабочей среды","Изучение болезней зубов","Методы анестезии","Классификация инструментов"] },

{ "id":2, "cat":"Оборудование", "q":"Стоматологические установки. Группы, составные блоки, требования к ним.", "short":"Стоматологическая установка — комплекс электрических, механических и гидравлических элементов. Состоит из блока врача, блока ассистента, кресла, светильника, гидроблока.", "full":"Стоматологическая установка — это комплекс электрических, механических и гидравлических элементов, преобразующий внешнюю энергию в энергию стоматологических инструментов. Основные составные блоки: 1) стоматологическое кресло (обеспечивает удобное положение пациента лёжа и сидя); 2) блок врача — рукава с наконечниками, пистолет воздух/вода; 3) блок ассистента — слюноотсос, пылесос, дополнительные инструменты; 4) операционный светильник; 5) гидроблок с плевательницей; 6) ножная педаль управления приводом наконечника. Установки делятся на 3 класса по комплектации и цене: эконом-класс (минимальные функции), бизнес-класс (дополнительные приборы — фотополимеризатор, ультразвуковой скалер, подсветка наконечников), элит-класс (новейшие технологии, компьютер, максимальный комфорт, эксклюзивный дизайн). Требования к установке: соответствие эргономике, соответствие лечебному процессу, удобство и безопасность для пациента, надёжность, доступность сервисного обслуживания, соответствие ценовой категории клиники. Установки имеют безмасляный компрессор, систему воздушно-водяного охлаждения, аспирационную систему. Дополнительно могут оснащаться радиовизиографом, встроенной лампой для полимеризации, эндодонтическим микроскопом.", "opts":["Комплекс оборудования для обеспечения условий стоматологического лечения","Только бормашина","Только кресло пациента","Набор ручных инструментов"] },

{ "id":3, "cat":"Инструменты", "q":"Виды стоматологических наконечников. Строение турбинных и микромоторных наконечников.", "short":"Наконечники: турбинные (FG, 160 000–400 000 об/мин, сжатый воздух) и микромоторные угловые (RA, до 40 000 об/мин) и прямые (HP).", "full":"Стоматологический наконечник — инструмент, преобразующий энергию сжатого воздуха или вращение микромотора в движения рабочего инструмента (бора). Виды наконечников: 1) Турбинный (FG — Friction Grip): бор приводится в движение сжатым воздухом, подаваемым на ротор турбины в головке наконечника. Скорость вращения 160 000–400 000 об/мин. Основные преимущества — высокая скорость, эффективное препарирование эмали. Недостатки — невысокая механическая мощность (при давлении на бор замедляется), необходим строгий контроль силы нажатия, обязательное воздушно-водяное охлаждение (≥50 мл/мин). Бор фиксируется цанговым устройством или ключом, диаметр хвостовика 1,60 мм. Соединяется с установкой через разъёмы типов Borden, Midwest, Siemens. 2) Угловой микромоторный наконечник (RA — Right Angle): низкоскоростной, скорость 1000–40 000 об/мин. Многообразие рабочих инструментов и видов движений. Выпускаются повышающие (1:2–1:10, до 230 000 об/мин) и понижающие (4:1, для эндодонтии) наконечники. Бор диаметром 2,35 мм фиксируется защёлкой или кнопочной цангой. 3) Прямой наконечник (HP — Handpiece): аналогичные скоростные характеристики, но позволяет оказывать большее давление без вибрации. Применяется хирургами и ортопедами. Уход за наконечниками: смазка 2 раза в смену и перед стерилизацией, дезинфекция после каждого пациента, хранение головкой вниз.", "opts":["Турбинные (FG), угловые (RA), прямые (HP) — по виду привода и скорости","Только ручные инструменты","Зеркала и зонды","Боры и фрезы"] },

{ "id":4, "cat":"Инструменты", "q":"Группы инструментов в терапевтической стоматологии. Характеристика каждой группы, функции.", "short":"Группы: диагностические (зонд, зеркало, пинцет), препаровочные (боры, наконечники), пломбировочные (шпатель, штопфер), вспомогательные (матрицедержатель, клинья).", "full":"В терапевтической стоматологии используются следующие группы инструментов: 1) Диагностические инструменты: зеркало стоматологическое (осмотр труднодоступных участков, подсветка), зонд угловой (зондирование кариозных полостей, определение глубины, болезненности), пинцет стоматологический (удержание ватных шариков, тонких инструментов), экскаватор (удаление размягчённого дентина, временных пломб). 2) Инструменты для препарирования — боры (шаровидные, фиссурные, конусовидные, обратноконусовидные) для турбинных, угловых и прямых наконечников; ручные режущие инструменты (эмалевые ножи, долото, топорик, мотыга, триммеры десневого края) — для финирования краёв эмали и формирования стенок. 3) Инструменты для пломбирования: шпатель для замешивания (металлический или пластиковый), штопфер (уплотнение пломбировочного материала), гладилка (сглаживание поверхности пломбы). 4) Вспомогательные инструменты: матрицедержатели и матрицы (восстановление контактной поверхности при пломбировании полостей II класса), клинья деревянные или пластиковые (отжатие десны, прижатие матрицы), зубная нить, ретракторы десневого края, коффердам и его принадлежности. 5) Инструменты для финишной обработки: финиры твердосплавные (10–32 грани), абразивные диски, полировочные пасты, штрипсы.", "opts":["Диагностические, препаровочные, пломбировочные, вспомогательные, финишной обработки","Только боры","Только зонды и зеркала","Только щипцы и элеваторы"] },

{ "id":5, "cat":"Инструменты", "q":"Инструменты для осмотра, замешивания и наложения пломб, описание и составные части.", "short":"Осмотр: зеркало, зонд, пинцет. Замешивание: шпатель, стеклянная пластина или блок. Наложение: штопфер, гладилка, экскаватор.", "full":"Инструменты для осмотра: 1) Зеркало стоматологическое — состоит из ручки и съёмного зеркального диска; служит для осмотра труднодоступных участков и отражения света в полость. 2) Зонд угловой — ручка и изогнутая рабочая часть с заострённым кончиком; для зондирования кариозных полостей, определения глубины поражения, болезненности, плотности дентина. 3) Пинцет стоматологический — изогнутые губки для удержания ватных шариков, передачи мелких предметов. 4) Экскаватор — двусторонний инструмент с ложечкой с острой гранью; рабочая часть круглая, овальная или в форме лопатки; для удаления размягчённого дентина, временных пломб, назубных отложений. Инструменты для замешивания: 5) Шпатель — пластиковый (для цементов, СИЦ, чтобы избежать насыщения металлом) или металлический (для амальгамы); стеклянная пластина или одноразовый бумажный блок для замешивания. Инструменты для наложения и формирования пломб: 6) Штопфер — для уплотнения пломбировочного материала в полости, разных форм (цилиндрический, шаровидный, плоский); 7) Гладилка — для сглаживания поверхности пломбы и формирования её контуров; может быть одно- или двусторонней. Для композитов применяются специальные тефлоновые или золочёные инструменты, к которым материал не прилипает. Ручки всех инструментов должны быть сбалансированы — рабочая часть в пределах 2 мм от продольной оси инструмента. Ручки диаметром 9,5 мм (серия Satin Steel, Hu-Friedy) снижают риск карпального синдрома.", "opts":["Зеркало/зонд/пинцет; шпатель/стеклопластина; штопфер/гладилка/экскаватор","Только боры","Только наконечники","Только щипцы"] },

{ "id":6, "cat":"Инструменты", "q":"Классификация боров. Цветовая кодировка алмазных боров. Качество зернистости (мкм). Инструменты для полировки пломб.", "short":"Боры: по форме (шаровидные, фиссурные, конусовидные), по материалу (стальные, твёрдосплавные, алмазные). Алмазные кодируются цветом: чёрный 180 мкм, зелёный 135, без кольца 100–120, красный 50, жёлтый 30, белый 15 мкм.", "full":"Классификация боров: по материалу рабочей части — стальные (удаление дентина, малые скорости), твёрдосплавные из карбида вольфрама (универсальные, большие скорости, для эмали и дентина), алмазные (для эмали, металлов, керамики). По форме рабочей части: шаровидные, цилиндрические (фиссурные) с плоской или закруглённой (торпедовидной) головкой, конусовидные, обратноконусовидные, грушевидные, пулевидные, пламевидные, пиковидные, колесовидные. По наконечнику: для турбинного (FG, хвостовик 1,60 мм), углового (RA, хвостовик 2,35 мм), прямого (HP, хвостовик 2,35 мм). Цветовая кодировка алмазных боров (ISO): чёрное кольцо — сверхгрубая зернистость (180 мкм) — быстрое удаление тканей; зелёное — грубая (135 мкм) — быстрое удаление; без кольца — нормальная (100–120 мкм) — универсальное применение; красное — тонкая (50 мкм) — финирование тканей; жёлтое — сверхтонкая (30 мкм) — шлифование пломб; белое — ультратонкая (15 мкм) — окончательное полирование. Инструменты для полировки пломб: твёрдосплавные финиры (10–12 граней — финирование и шлифование, 16 граней — микроконтурирование, 20–32 грани — полирование до «сухого блеска»); гибкие полировочные диски (грубые → средние → мелкие → сверхмелкие); резиновые полировочные инструменты (чашечки, конусы, диски); полировочные пасты (безабразивные или с мелкодисперсным абразивом); штрипсы для контактных поверхностей.", "opts":["По форме, материалу, наконечнику; алмазные — цветом хвостовика по зернистости","Только по размеру","По стоимости","По стране производства"] },

{ "id":7, "cat":"Препарирование", "q":"Способы препарирования твёрдых тканей зубов. Особенности и показания.", "short":"Механический (боры), химико-механический (Carisolv), воздушно-абразивный (окись алюминия), ультразвуковой (насадки с алмазным покрытием), лазерный.", "full":"В настоящее время существуют следующие способы препарирования: 1) Механический — наиболее распространённый, с применением боров (стальных, твёрдосплавных, алмазных) и ручных инструментов. Показан при всех видах кариозных полостей. Требует обязательного воздушно-водяного охлаждения. 2) Химико-механический — система «Carisolv»: гель на основе 0,95% гипохлорита натрия и смеси аминокислот (лейцин, лизин, глутаминовая кислота) вносится в полость, разрушает кариозный дентин, который затем удаляется специальными ручными инструментами. Показан при лечении пациентов с непреодолимым страхом перед бормашиной, при лечении детей, пожилых пациентов. 3) Воздушно-абразивный (воздушно-гидро-кинетический) — направленная подача через специальный наконечник аэрозоля с частицами окиси алюминия. Применяется для обработки фиссур перед герметизацией, устранения пигментации эмали, препарирования небольших полостей, подготовки адгезионных поверхностей. Создаёт шероховатую поверхность без химического протравливания. 4) Ультразвуковой — специальные насадки с алмазным покрытием, совершающие микроскопические вибрирующие движения по овальной траектории. Применяется для минимально-инвазивного препарирования фиссур и апроксимальных полостей. 5) Лазерный — специальные лазеры для обработки кариозных полостей. Минимальная болезненность, точность, бактерицидный эффект. Применяется при начальном кариесе, для подготовки поверхности к адгезии.", "opts":["Механический, химико-механический, воздушно-абразивный, ультразвуковой, лазерный","Только механический","Только химический","Только ультразвуковой"] },

{ "id":8, "cat":"Препарирование", "q":"Изоляция твёрдых тканей зубов от ротовой жидкости. Абсолютные и относительные методы.", "short":"Абсолютная изоляция — коффердам (резиновая завеса + кламп). Относительная — ватные валики, слюноотсос, ретракционные нити.", "full":"Изоляция от ротовой жидкости — обязательное условие для качественного пломбирования, особенно при использовании адгезивных систем и композитов. Абсолютный метод — коффердам: латексная или безлатексная резиновая плёнка с отверстием для изолируемого зуба, фиксируется кламмом (металлический зажим) на зубе, удерживается рамкой (пластиковой или металлической). Обеспечивает полную изоляцию от слюны и ротовой жидкости. Показания: все виды реставраций, особенно из светоотверждаемых композитов; при использовании адгезивных систем; при работе с отбеливающими препаратами; при лечении методом инфильтрации. Кроме стандартного коффердама, используется жидкий коффердам (Liquid Dam) — светоотверждаемый гель-барьер. Относительные методы: 1) ватные валики различных размеров (вестибулярная и язычная/нёбная стороны) — простой и доступный метод; 2) слюноотсос и пылесос — для непрерывной аспирации жидкости; 3) ретракционные нити с вяжущим веществом (например, сульфатом алюминия) — для ретракции десны при пришеечных полостях; 4) специальные изолирующие системы (OptraGate, Isolite) — комбинированные удерживатели щёк и изоляторы. При операциях с адгезивными системами категорически недопустимо попадание слюны на протравленные поверхности.", "opts":["Абсолютная — коффердам; относительная — ватные валики и слюноотсос","Только коффердам","Только слюноотсос","Только зубная нить"] },

{ "id":9, "cat":"Препарирование", "q":"Этапы препарирования кариозных полостей. Принцип «Профилактического расширения».", "short":"5 этапов: раскрытие → расширение → некроэктомия → формирование → финирование. Принцип Блека: расширение полости до иммунных зон — «расширение ради предупреждения».", "full":"Препарирование кариозной полости включает 5 последовательных этапов: 1) Раскрытие полости — удаление нависающих и подрытых краёв эмали, не имеющих плотного дентина; создание отвесных стенок; обеспечение доступа и обзора. Инструмент: фиссурные или шаровидные алмазные/твёрдосплавные боры, турбина с охлаждением. 2) Расширение полости (профилактическое расширение по Блеку) — намечаются окончательные наружные очертания полости; цель — предотвращение рецидивного кариеса. 3) Некроэктомия — полное удаление размягчённого и пигментированного дентина; экскаватором или шаровидными борами. 4) Формирование полости — создание ретенционной и резистентной формы, обеспечивающей надёжную фиксацию пломбы. 5) Финирование краёв эмали — создание скоса, удаление ослабленных призм, сглаживание эмалевых краёв. Принцип «профилактического расширения» (G.V.Black): производится широкое иссечение кариесвосприимчивых участков (фиссуры, контактные поверхности, пришеечная область) до иммунных зон (бугры, экватор, гладкие выпуклые поверхности) — «расширение ради предупреждения». Результат — обширная полость ящикообразной формы. Достоинства: долговечность пломб, низкая частота рецидивного кариеса. Недостатки: большой объём иссекаемых здоровых тканей, уменьшение прочности коронки. В настоящее время применяется при пломбировании амальгамой и вкладками.", "opts":["Расширение до иммунных зон по Блеку — «расширение ради предупреждения»","Расширение только до здоровых тканей без учёта зон","Минимальное вмешательство без расширения","Только иссечение кариеса"] },

{ "id":10, "cat":"Препарирование", "q":"Этапы препарирования кариозных полостей. Принцип расширения по Лукомскому.", "short":"Принцип биологической целесообразности И.Г.Лукомского: иссечение только тканей, поражённых кариесом; сохранение непоражённых фиссур и участков.", "full":"Метод «биологической целесообразности» разработан И.Г.Лукомским в 1940–1950-х годах как альтернатива методу Блека. Суть: при препарировании иссекают только ткани, поражённые кариозным процессом, максимально сохраняя непоражённые ткани. Фиссуры и другие кариесвосприимчивые участки, не поражённые на момент лечения, остаются незапломбированными. Полость получается ящикообразной формы, но без профилактического расширения. Достоинства: сохранение непоражённых тканей зуба, простота, малые трудозатраты, меньшие временны́е затраты. Недостатки: недолговечность пломб (высокая частота развития кариеса в соседних незапломбированных фиссурах и по краю пломбы), особенно при высокой кариесрезистентности. Показания: при применении пломбировочных материалов с неудовлетворительными физико-химическими свойствами (силикофосфатные цементы); у пациентов с лёгкой степенью течения кариеса при пломбировании композитами. Авторы книги считают недопустимым применение так называемого «очагового» препарирования (2–3 отдельные пломбы на одном зубе) — это свидетельство безответственного отношения врача к работе. В настоящее время вместо метода Лукомского применяется метод «профилактического пломбирования», сочетающий достоинства обоих подходов.", "opts":["Иссечение только поражённых тканей, без профилактического расширения","Расширение до иммунных зон","Профилактическое расширение по Блеку","Туннельный метод без препарирования"] },

{ "id":11, "cat":"Препарирование", "q":"Этапы препарирования. Правила некроэктомии. Методы оценки качества некроэктомии.", "short":"Некроэктомия: удаление зоны распада и деминерализации экскаватором или шаровидными борами. Оценка качества: зонд (плотный дентин), кариес-маркер (индикатор Fusayama).", "full":"Некроэктомия (некротомия) — этап полного удаления размягчённого и пигментированного инфицированного дентина. С морфологической точки зрения удаляется зона распада и зона деминерализации. Границы полости создаются в зоне прозрачного (склерозированного) и интактного дентина. Зона прозрачного дентина — участок склерозированного дентина, формирующийся при отложении солей кальция в дентинных канальцах — защитная реакция организма. Правила проведения: а) На дне — некроэктомия в пределах зоны прозрачного дентина; б) На стенках — в пределах интактного дентина (кариес здесь активнее); в) Экскаватором движения направлять от дна к стенкам; г) Размер экскаватора соответствует размеру полости; д) При работе бором — шаровидный/грушевидный твёрдосплавный или стальной, малая скорость, осторожно у рогов пульпы; е) После видимого дентина иссечь тонкий пограничный слой (~1 мм). Допустимо оставление пигментированного, но плотного дентина при хроническом течении кариеса (покрыть СИЦ Vitrebond). При глубоких полостях у молодых пациентов допускается оставление небольшого количества размягчённого дентина с наложением лечебных прокладок. Методы оценки качества: 1) Зондирование — дентин должен быть плотным, гладким, при зондировании — крепитирующий звук; 2) Кариес-маркеры (детекторы) — 0,5% раствор основного фуксина или 1% кислого красного в пропиленгликоле, наносятся на 5–10 с, окрашивают нежизнеспособный дентин; промывают водой; прокрашенные участки удаляют. Представители: Caries Marker (VOCO), Seek, Sable Seek (Ultradent), Радсидент.", "opts":["Удаление инфицированного дентина экскаватором/борами; оценка — зонд и кариес-маркер","Только визуальная оценка цвета","Рентгенологический контроль","Только зонд без дополнительных методов"] },

{ "id":12, "cat":"Препарирование", "q":"Этапы препарирования. Цель и правила формирования и финирования краёв кариозной полости.", "short":"Формирование — создание ретенционной и резистентной формы полости. Финирование — сглаживание краёв эмали, создание скоса под углом 45° для улучшения краевого прилегания пломбы.", "full":"Формирование полости — 4-й этап препарирования. Цель: создание формы, обеспечивающей надёжную фиксацию пломбы (ретенция) и устойчивость тканей зуба к нагрузкам (резистентность). Правила формирования: А) При пломбировании амальгамой или вкладками — ящикообразная форма, плоское дно, отвесные стенки; угол дно/стенки = 90° (амальгама I поколения) или ~70° (амальгама с улучшенными характеристиками); под вкладки — слегка расходящиеся стенки. Б) При пломбировании композитами и СИЦ — сглаженные контуры, плавные переходы между дном и стенками, без прямых и острых углов, слегка грушевидная форма, при необходимости ступенчатое дно. Создание ретенционных подрезок для безадгезивных материалов. Ослабленные бугры — иссечение на 2 мм при амальгаме/вкладках; допускается укрепление текучим композитом при пломбировании полимерами. Граница пломбы не должна проходить через точки окклюзионных контактов. Финирование краёв эмали — 5-й этап. Цель: сглаживание краёв полости, создание скоса эмали для улучшения краевого прилегания. Скос эмали (фальц) увеличивает резистентность тканей и пломбы, удаляет ослабленные эмалевые призмы. Правила: при амальгаме I поколения — скос 45° на всю глубину эмали; амальгама II–III поколений — без скоса; при вкладках — скос на половину толщины эмали; при цементах — без скоса (тонкий слой быстро разрушится); при композитах — скос 45° или длинный скос (≥1 мм контакта с эмалью). Инструмент для финирования: твёрдосплавные финиры 10–12 граней (финирование), эмалевые ножи, триммеры десневого края.", "opts":["Формирование — ретенция и резистентность; финирование — скос эмали для краевого прилегания","Только расширение полости","Только удаление кариеса","Медикаментозная обработка"] },

{ "id":13, "cat":"Препарирование", "q":"Боры для каждого этапа препарирования и требования к сформированной кариозной полости.", "short":"Раскрытие — фиссурные/шаровидные алмазные, турбина. Некроэктомия — шаровидные твёрдосплавные, малая скорость. Формирование — фиссурные/конусовидные. Финирование — финиры 10–32 грани, эмалевые ножи.", "full":"Боры для каждого этапа: 1) Раскрытие полости: алмазные или твёрдосплавные фиссурные или шаровидные боры (диаметр соответствует входному отверстию), большая скорость (турбинный наконечник), воздушно-водяное охлаждение. Для удаления старых пломб — боры повышенной режущей эффективности. 2) Расширение (профилактическое): алмазные или твёрдосплавные фиссурные или конусовидные боры, турбина, большая скорость, охлаждение. 3) Некроэктомия: шаровидные или грушевидные твёрдосплавные или стальные боры больших размеров, малая скорость (угловой наконечник), или острый экскаватор. 4) Формирование полости: фиссурные/конусовидные/пламевидные/грушевидные боры (алмазные и твёрдосплавные), большая скорость, охлаждение. Для амальгамы — обратноконусовидные (плоское дно); для композитов — грушевидные (сглаженные контуры). 5) Финирование краёв: твёрдосплавные финиры 10–12 граней, мелкозернистые алмазные боры, эмалевые ножи, триммеры десневого края. Требования к сформированной полости: все пораженные ткани удалены; дно плотное; форма обеспечивает ретенцию и резистентность; для амальгамы — ящикообразная, прямые углы; для композитов — сглаженные контуры, без острых углов; края эмали не ослаблены; граница пломбы не на окклюзионных точках контакта; для безадгезивных материалов — глубина ≥1–1,5 мм; при пломбировании композитами — адекватный скос эмали.", "opts":["Разные боры для каждого этапа: раскрытие–некроэктомия–формирование–финирование — разная форма и скорость","Один универсальный бор для всех этапов","Только алмазные боры во всех этапах","Только твёрдосплавные боры без разделения по этапам"] },

{ "id":14, "cat":"Кариес", "q":"Понятие о кариесе. Классификации кариозных полостей по локализации, по ВОЗ.", "short":"Кариес — патологический процесс деминерализации и деструкции твёрдых тканей. По ВОЗ: начальный (пятно), поверхностный, средний, глубокий. По Блеку (локализация): I–VI классы.", "full":"Кариес зубов — сложный, медленно развивающийся патологический процесс в твёрдых тканях зуба, возникающий при сочетанном воздействии неблагоприятных факторов. Начинается с очаговой деминерализации неорганической части эмали, разрушения органического матрикса, заканчивается деструкцией с образованием полости. Для развития кариеса необходимы: кариесогенная микрофлора, легкоусвояемые углеводы, снижение кариесрезистентности — время. Классификация по ВОЗ (по глубине): кариес в стадии пятна (начальный) — К02.0; поверхностный кариес (в пределах эмали) — К02.0; средний кариес (в пределах дентина) — К02.1; глубокий кариес (опасность вскрытия пульпы) — К02.2. Классификация кариозных полостей по локализации (по Блеку): I класс — полости в ямках и фиссурах жевательных поверхностей моляров и премоляров, в слепых ямках резцов и моляров; II класс — полости на контактных (апроксимальных) поверхностях моляров и премоляров; III класс — полости на контактных поверхностях резцов и клыков без нарушения угла коронки; IV класс — полости на контактных поверхностях резцов и клыков с нарушением угла коронки; V класс — полости в пришеечной области всех зубов; VI класс (дополнение к классификации Блека) — полости на вершинах бугров жевательных зубов и режущих краях резцов.", "opts":["По ВОЗ — по глубине (начальный/поверхностный/средний/глубокий); по Блеку — по локализации (I–VI классы)","Только по размеру полости","Только по возрасту пациента","По причине возникновения"] },

{ "id":15, "cat":"Препарирование по Блеку", "q":"Принципы препарирования и пломбирования кариозных полостей I класса по Блеку.", "short":"I класс — жевательные поверхности и слепые ямки. Форма: ящикообразная для амальгамы, грушевидная для композитов. Расширение по фиссурам до иммунных зон.", "full":"Полости I класса расположены в ямках и фиссурах на жевательных поверхностях моляров и премоляров, в слепых ямках на нёбных поверхностях верхних резцов, а также в вестибулярных и язычных бороздах моляров, связанных с жевательной поверхностью. Принципы препарирования: 1) Раскрытие — удаление нависающих краёв эмали фиссурными/шаровидными алмазными борами, турбина. 2) Расширение — иссечение фиссур (фиссуротомия) конусовидными борами (не цилиндрическими!) диаметром 0,9–1 мм с закруглённой вершиной — создаёт расходящиеся стенки для технологичного пломбирования. Ширина бороздки 0,7–0,8 мм, глубина 1–1,5 мм. 3) Некроэктомия — шаровидные/грушевидные боры, малая скорость, или экскаватор. 4) Формирование: для амальгамы — ящикообразная форма, плоское дно перпендикулярно жевательному давлению, отвесные стенки, глубина ≥1–1,5 мм; для амальгамы I поколения угол дно/стенки = 90°; для амальгамы II–III поколений ≈70°. Ослабленный бугор (полость >1/2 расстояния от фиссуры до вершины) — иссечь на 2 мм. Для композитов — сглаженные контуры, грушевидная форма, плавные переходы, ступенчатое дно, без острых углов; все фиссуры запломбировать; граница не на окклюзионных точках. 5) Финирование: скос 45° для амальгамы I поколения; длинный скос ≥1 мм для композитов. Пломбирование: амальгама (уплотнение штопфером, финирование поверхности); СИЦ (замешать до сметанообразной консистенции, вносить одной порцией); композит (послойно ≤2 мм, полимеризация каждого слоя 20–40 с, начиная с адгезивной системы).", "opts":["Ямки и фиссуры жевательных зубов; ящикообразная или грушевидная форма; расширение по фиссурам","Контактные поверхности жевательных зубов","Пришеечная область всех зубов","Режущий край резцов"] },

{ "id":16, "cat":"Препарирование по Блеку", "q":"Принципы препарирования и пломбирования кариозных полостей II класса по Блеку.", "short":"II класс — контактные поверхности моляров и премоляров. Доступ: через жевательную (МОД или МО/ОД полость). Обязательны матрица и клин для восстановления контактного пункта.", "full":"Полости II класса расположены на контактных (апроксимальных) поверхностях моляров и премоляров. Доступ к кариозной полости осуществляется через жевательную поверхность, поэтому формируется комбинированная полость (М — мезиальная, О — окклюзиональная, Д — дистальная: МОД, МО или ОД). Особенности препарирования: 1) Раскрытие — через фиссуры жевательной поверхности создаётся «окно» для доступа к апроксимальному кариесу. Необходима защита соседнего зуба металлической полоской. 2) Расширение — формируется апроксимальный ящик (box): ширина ≥1,5 мм, выводится за межзубной контакт вестибулярно и орально. Придесневая стенка должна быть на 0,5–1 мм ниже уровня межзубного контакта. 3) Некроэктомия — стандартная. 4) Формирование: для амальгамы — ящикообразная форма с прямыми углами, строго параллельные стенки; для композитов — сглаженные контуры, скос эмали. Дополнительная площадка (окклюзиональная часть) — для обеспечения ретенции при применении амальгамы. Для закрытой сэндвич-техники — СИЦ на дно, композит — окклюзиональная часть. 5) Матрица и клин: обязательны для восстановления контактного пункта. Клин отжимает десну и прижимает матрицу к шейке зуба. Применяются матрицедержатели (Ivory, Tofflemire), кольцевые матрицы (Palodent, Contact Matrix). Пломбирование с применением открытой сэндвич-техники: СИЦ на придесневую стенку, выходит на апроксимальную поверхность; затем перекрывается композитом.", "opts":["Контактные поверхности моляров и премоляров, доступ через жевательную поверхность, обязательна матрица","Жевательные ямки и фиссуры","Пришеечная область жевательных зубов","Только жевательная поверхность"] },

{ "id":17, "cat":"Препарирование по Блеку", "q":"Принципы препарирования и пломбирования кариозных полостей III класса по Блеку.", "short":"III класс — контактные поверхности резцов и клыков без разрушения угла. Доступ: с оральной или вестибулярной стороны; треугольная форма. Пломбирование — высокоэстетичные композиты.", "full":"Полости III класса расположены на контактных (апроксимальных) поверхностях резцов и клыков без нарушения режущего края и угла коронки. Принципы препарирования: 1) Доступ зависит от распространённости поражения: а) с орально-апроксимального направления (при наличии интактной вестибулярной стенки) — сохраняет эстетику; б) с вестибулярного направления (при обширном поражении или для улучшения эстетики). 2) Раскрытие — фиссурным или шаровидным бором. 3) Расширение — в пределах поражения; при применении метода профилактического пломбирования — минимальное. 4) Некроэктомия — шаровидным/грушевидным бором или экскаватором. 5) Формирование: треугольная форма полости с вершиной к углу коронки; для амальгамы — ящикообразная форма с ретенционными подрезками; для композитов — сглаженные контуры, без острых углов. Скос эмали на вестибулярной стенке (3–4 волны, длинный скос) — для достижения оптимального эстетического результата и плавной границы реставрации. 6) Пломбирование: при пломбировании с оральной стороны — реставрация моделируется с учётом точки контакта; восстановление послойно, оттенок дентина + оттенок эмали. Используются прозрачные матрицы (Lucifix, Contact Matrix). Обязательна адгезивная система. Послойное нанесение: первый слой — более опаковый (имитирует дентин), второй — более прозрачный (имитирует эмаль). Полимеризация 20–40 с каждого слоя.", "opts":["Контактные поверхности резцов и клыков без нарушения угла; оральный или вестибулярный доступ; треугольная форма","Контактные поверхности с разрушением угла коронки","Пришеечная область фронтальных зубов","Жевательная поверхность"] },

{ "id":18, "cat":"Препарирование по Блеку", "q":"Принципы препарирования и пломбирования кариозных полостей IV класса по Блеку.", "short":"IV класс — контактные поверхности резцов и клыков с разрушением угла. Требует восстановления угла и режущего края. Пломбирование — стратификация: опаковый дентин + прозрачная эмаль.", "full":"Полости IV класса расположены на контактных поверхностях резцов и клыков с нарушением (разрушением) угла коронки и/или режущего края. Это наиболее сложные для реставрации полости. Принципы препарирования: 1) Раскрытие — алмазным бором. 2) Расширение — в зависимости от площади разрушения; при необходимости создаётся штыкообразный (или парапульпарный) доступ через эмаль для улучшения ретенции. 3) Некроэктомия — тщательное удаление всего инфицированного дентина. 4) Формирование: важно создать ретенционную форму — ретенционные пазы или скосы; длинный скос эмали (>2 мм) по всему периметру для плавного перехода; при значительном разрушении — парапульпарные штифты (пины). 5) Финирование — длинный волнистый скос на вестибулярной поверхности (3–4 волны) для маскировки границы реставрации. Пломбирование: используются высокоэстетичные микрогибридные или нанонаполненные световые композиты. Послойная техника (стратификация): а) нанесение опакового слоя (имитация дентина: А3/А2 дентинного оттенка) — создаёт основу объёма и цвет; б) нанесение прозрачного слоя (имитация эмали); в) при необходимости — добавление белых прожилок или коричневых трещин для имитации текстуры естественного зуба; г) полирование. Формирование угла реставрации с учётом принципа угла коронки (медиальный угол острый, дистальный — тупой). Использование силиконового ключа (небного индекса) для воспроизведения нёбной поверхности.", "opts":["Контактные поверхности с разрушением угла коронки; стратификация опаковый дентин + прозрачная эмаль","Контактные поверхности без разрушения угла","Пришеечная область всех зубов","Жевательная поверхность"] },

{ "id":19, "cat":"Препарирование по Блеку", "q":"Принципы препарирования и пломбирования кариозных полостей V класса по Блеку.", "short":"V класс — пришеечная область всех зубов. Бобовидная форма, вестибулярный доступ. Пломбирование: СИЦ или компомер (при контакте с десной), закрытая сэндвич-техника.", "full":"Полости V класса расположены в пришеечной области всех групп зубов (вестибулярные или оральные поверхности). Топографические особенности: близость к десневому краю и эмалево-цементной границе; ограниченный доступ; сложность изоляции от жидкости. Принципы препарирования: 1) Ретракция десны: ретракционными нитями или ретрактором. 2) Раскрытие: шаровидным или грушевидным алмазным бором. 3) Расширение: минимальное, только в пределах поражения. 4) Некроэктомия: острым экскаватором или шаровидным бором. 5) Формирование: бобовидная (серповидная) форма полости; придесневая стенка чаще под прямым углом или со скосом; вестибулярная и оральная стенки могут иметь небольшой скос. Ретенция: при применении материалов без адгезии — ретенционные подрезки по углам (обратноконусовидный бор). При применении адгезивных материалов ретенционные подрезки не обязательны. Пломбирование: а) при поддесневом расположении полости и контакте с десной — СИЦ (открытая сэндвич-техника) или компомер (выделяют фтор, лучше краевое прилегание в трудных условиях); б) при наддесневом расположении — закрытая сэндвич-техника (СИЦ основание + композит) или только композит; в) при эрозиях и клиновидных дефектах — компомер или микрогибридный/нанонаполненный композит. Матрицы: при необходимости — шейные матрицы.", "opts":["Пришеечная область всех зубов; бобовидная форма; СИЦ при контакте с десной, сэндвич при поддесневой локализации","Контактные поверхности жевательных зубов","Жевательная поверхность","Режущий край"] },

{ "id":20, "cat":"Препарирование по Блеку", "q":"Принципы препарирования и пломбирования кариозных полостей VI класса по Блеку.", "short":"VI класс — вершины бугров жевательных зубов и режущие края резцов. Чашеобразная форма, минимальная инвазивность. Пломбирование — нанонаполненные/микрогибридные композиты.", "full":"Полости VI класса (класс, добавленный к классификации Блека) расположены на вершинах бугров жевательных зубов (моляров и премоляров) и на режущих краях резцов и клыков. Причина развития кариеса здесь — чашеобразные углубления на вершинах бугров, в которых скапливается зубной налет. Дно таких дефектов часто пигментировано (тёмно-коричневое или чёрное) за счёт пищевых красителей. Принципы препарирования: 1) Минимальная инвазивность — иссечение только пораженных тканей без создания ретенционных подрезок. 2) Форма: чашеобразная, круглая или овальная; соответствует форме дефекта. 3) Раскрытие и формирование: шаровидным алмазным или твёрдосплавным бором небольшого диаметра; минимальное расширение. 4) Некроэктомия: полное удаление пигментированного и мягкого дентина. 5) Финирование: мелкозернистым алмазным бором по краям полости. Пломбирование: применяются нанонаполненные или микрогибридные световые композиты (обеспечивают отличную полировку и износостойкость — важно для бугров); адгезивная система обязательна; пломба вносится одной порцией (малый объём); полимеризация 20–40 с; финирование и полировка по стандартной методике. При значительном разрушении бугров жевательных зубов — оценка необходимости перекрытия бугра пломбой.", "opts":["Вершины бугров жевательных зубов и режущие края; чашеобразная форма; нанонаполненный/микрогибридный композит","Пришеечная область","Контактные поверхности","Фиссуры жевательной поверхности"] },

{ "id":21, "cat":"Малоинвазивные методы", "q":"Минимально-инвазивные методы препарирования. Виды, показания.", "short":"Виды: ART-методика, метод минимального препарирования, туннельный, SLOT-методика, BATE-CAVE-техника, воздушно-абразивный, ультразвуковой. Показаны при лёгком кариесе, у детей, при страхе перед бормашиной.", "full":"Минимально-инвазивная стоматология (MI-терапия) — профилактическая концепция, ориентированная на максимальное сохранение тканей зуба. Принципы: раннее выявление кариеса, индивидуализированная профилактика, минимально-инвазивное пломбирование биоактивными материалами. Виды: 1) ART-методика (Atraumatic Restorative Treatment) — только ручные инструменты + СИЦ, без бормашины. 2) Метод минимального препарирования — аналогично ART, но с использованием бормашины; небольшое входное отверстие, нависающие края эмали. 3) Туннельный метод — доступ через краевой гребень жевательной поверхности к апроксимальному кариесу без разрушения контактного пункта. 4) SLOT-методика — щелевидная (slot) полость на апроксимальной поверхности без выхода на жевательную. 5) BATE-CAVE-техника — доступ через вестибулярную поверхность к апроксимальному кариесу. 6) Воздушно-абразивный метод — для мелких полостей, фиссур. 7) Ультразвуковое препарирование — специальные насадки. 8) Инфильтрация (Icon) — для начального кариеса в стадии пятна без полости. Показания к MI-методам: лёгкая степень течения кариеса (КПУ <5); «благополучная полость рта»; высокий уровень гигиены; начальные и мелкие кариозные полости; лечение детей; пациенты с непреодолимым страхом перед бормашиной; пожилые и тяжелобольные пациенты; труднодоступные районы (ART).", "opts":["ART, туннельный, SLOT, BATE-CAVE, воздушно-абразивный — при лёгком кариесе, детях, страхе перед бормашиной","Только классическое препарирование бором","Только химическое удаление кариеса","Только лазерное препарирование"] },

{ "id":22, "cat":"Малоинвазивные методы", "q":"Принцип ART-методики.", "short":"ART (Atraumatic Restorative Treatment) — очищение кариозной полости только экскаватором (без бормашины), затем пломбирование СИЦ. Рекомендована ВОЗ для труднодоступных регионов.", "full":"ART-методика (Atraumatic Restorative Treatment — атравматичное восстановительное лечение) разработана профессором Taco Pilot (Нидерланды). Суть метода: кариозная полость очищается экскаватором без применения бормашины. Не требует анестезии, аспирационной системы, полимеризационной лампы. Техника: 1) очищение поверхности зуба; 2) расширение входного отверстия эмалевым ножом или экскаватором (иссечение деминерализованной эмали); 3) удаление размягчённого дентина экскаватором (движения от стенок ко дну); 4) очистка, промывание, высушивание полости; 5) замешивание и внесение СИЦ; 6) формирование пломбы; 7) одновременная герметизация СИЦ соседних фиссур. СИЦ выбирается за его свойства: простота применения, противокариозный эффект (выделение фтора), химическая адгезия к дентину и эмали, биологическая совместимость. Установлено: если пломбирование проведено на ранней стадии кариеса, даже оставшийся пигментированный дентин не препятствует остановке кариозного процесса при условии его изоляции от внешней среды. Показания (ВОЗ, 1994): жители бедных регионов, труднодоступные районы, корабли, детские учреждения; пациенты с непреодолимым страхом, с тяжёлой общесоматической патологией, пожилые, умственно отсталые; лечение детей.", "opts":["Ручные инструменты без бормашины + СИЦ; рекомендована ВОЗ для бедных регионов и особых групп пациентов","Лазерное препарирование","Воздушно-абразивное препарирование","Химическое удаление кариеса с Carisolv"] },

{ "id":23, "cat":"Малоинвазивные методы", "q":"Принцип SLOT-методики.", "short":"SLOT — щелевидная (slot = прорезь) апроксимальная полость, формируемая через вестибулярную или язычную поверхность, без выхода на жевательную и без разрушения контактного пункта.", "full":"SLOT-методика (от англ. slot — прорезь, паз) — вариант минимально-инвазивного препарирования апроксимального кариеса. Суть: формируется узкая щелевидная полость на контактной поверхности без выхода на окклюзиональную поверхность и без разрушения краевого гребня. Доступ осуществляется через вестибулярную или язычную поверхность с созданием узкого прохода к апроксимальному очагу кариеса. Техника: 1) Оценка рентгенограммы для точной локализации кариеса; 2) Создание доступа узким фиссурным или конусовидным бором с вестибулярной или оральной стороны; 3) Формирование прямоугольной (slot-образной) полости в пределах поражения; 4) Некроэктомия; 5) Пломбирование текучим или конденсируемым композитом послойно. Преимущества: сохраняется контактный пункт и краевой гребень; меньше иссекается здоровых тканей; меньше эстетический дефект. Недостатки: ограниченный доступ; сложность формирования и пломбирования; требует точной визуализации. Показания: апроксимальный кариес в стадии эмали или начальный кариес дентина, выявленный рентгенологически, при сохранном краевом гребне и контактном пункте.", "opts":["Щелевидная апроксимальная полость через вестибулярную/язычную поверхность без выхода на жевательную","Туннельное препарирование через жевательную поверхность","Профилактическое расширение по Блеку","Химическое препарирование"] },

{ "id":24, "cat":"Малоинвазивные методы", "q":"Принцип BATE-CAVE-техники.", "short":"BATE (Buccal Approach to proximal caries in Enamel/dentin) — доступ к апроксимальному кариесу через вестибулярную поверхность (щёчную), туннелеобразно, с образованием cavern (пещеры) — CAVE.", "full":"BATE-CAVE-техника — вариант минимально-инвазивного препарирования апроксимального кариеса. BATE (Buccal Approach To proximal caries in Enamel/dentin) — доступ через вестибулярную (щёчную, buccal) поверхность к апроксимальному кариесу. CAVE (от cavern — пещера) — образуемая полость, напоминающая пещеру (нависающие стенки). Суть: препарирование производится через вестибулярную поверхность зуба в области межзубного пространства, формируется туннелеобразная полость (pещера), достигающая очага апроксимального кариеса. Контактный пункт и язычная стенка сохраняются. Техника: 1) Определение локализации кариеса рентгенологически; 2) Сепарация зубов металлической полоской для защиты соседнего; 3) Создание доступа с вестибулярной стороны шаровидным или конусовидным алмазным бором; 4) Формирование пещерообразной полости в апроксимальной области; 5) Некроэктомия; 6) Пломбирование текучим или микрогибридным композитом с применением адгезивной системы. Преимущества: нет выхода на жевательную поверхность; сохраняется контактный пункт; меньше иссекается здоровых тканей. Недостатки: сложный доступ; риск перфорации в сторону соседнего зуба; нависающие края эмали.", "opts":["Доступ через вестибулярную поверхность к апроксимальному кариесу с образованием пещерообразной полости","Туннельное препарирование через жевательную поверхность","ART-методика без бормашины","SLOT через вестибулярную поверхность без нависающих краёв"] },

{ "id":25, "cat":"Малоинвазивные методы", "q":"Принцип туннельного метода препарирования.", "short":"Туннельный метод — доступ через краевой гребень (marginal ridge) жевательной поверхности к апроксимальному кариесу без разрушения контактного пункта. Пломбируется СИЦ или текучим композитом.", "full":"Туннельный метод (tunneling) — минимально-инвазивный метод лечения апроксимального кариеса через краевой гребень жевательной поверхности. Суть: доступ к апроксимальному кариесу осуществляется через краевой гребень (marginal ridge) жевательной поверхности, формируя узкий туннель. Контактный пункт между зубами полностью сохраняется. Техника: 1) Рентгенологическая оценка глубины и локализации кариеса — обязательна; 2) Создание доступа через краевой гребень жевательной поверхности специальным шаровидным или обратноконусовидным бором; 3) Расширение туннеля специальными тонкими борами под контролем рентгена; 4) Некроэктомия — экскаватором или шаровидным бором малого диаметра; 5) Высушивание; 6) Пломбирование: СИЦ (светоотверждаемый или химического отверждения) или текучий композит вносится с помощью специального шприца или инструмента. Преимущества: сохраняется контактный пункт; наименьшее удаление здоровых тканей; снижение риска вскрытия пульпы; применим у детей, при страхе перед бормашиной. Недостатки: ограниченный доступ и контроль некроэктомии (риск оставления инфицированного дентина); высокий технический уровень; применим только при кариесе дентина в эмалево-дентинной зоне (не при обширном поражении). Показания: апроксимальный кариес ранней/средней степени (D1–D2), без обширного поражения дна.", "opts":["Доступ через краевой гребень жевательной поверхности к апроксимальному кариесу, сохраняется контактный пункт","Через вестибулярную поверхность (BATE)","Щелевидная полость (SLOT)","ART без бормашины"] },

{ "id":26, "cat":"Пломбировочные материалы", "q":"Классификация пломбировочных материалов. Требования к временным. Отличие искусственного дентина от дентин-пасты.", "short":"Классификация: временные, изолирующие прокладки, лечебные прокладки, постоянные. Искусственный дентин замешивается на воде, дентин-паста — на эвгеноловом масле.", "full":"Классификация стоматологических пломбировочных материалов: 1) Материалы для повязок и временных пломб; 2) Материалы для изолирующих прокладок (базисные и лайнерные); 3) Материалы для лечебных прокладок; 4) Постоянные пломбировочные материалы: а) цементы (фосфатные, поликарбоксилатные, стеклоиономерные), б) полимерные ненаполненные, в) полимерные наполненные (композиты), г) металлические (амальгамы), д) первичнотвёрдые (вкладки, виниры). Требования к временным пломбировочным материалам: достаточная прочность и герметичность для временной защиты; лёгкое замешивание и введение в полость; лёгкое удаление; не должны нарушать контактный пункт; химическая нейтральность; не должны оказывать раздражающего действия на пульпу; доступность и экономичность. Представители временных материалов: Cavit (ESPE), Cimpat (Septodont), искусственный дентин, дентин-паста. Отличия искусственного дентина от дентин-пасты: Искусственный дентин (дентин без масла) — состав: сульфат кальция (97%) + сульфат цинка (1–2%) + оксид кальция (1%) замешивается на воде до консистенции пасты. Быстро твердеет (2–3 мин), нерастворим в воде, используется как временная пломба для нескольких дней. Дентин-паста (дентин с маслом) — те же компоненты + масло (вазелиновое или гвоздичное), не затвердевает. Используется как временная повязка (мягкая, легко извлекается), размягчается ротовой жидкостью. Не выдерживает жевательной нагрузки.", "opts":["Временные/изолирующие/лечебные/постоянные; дентин — на воде (твердеет), паста — на масле (не твердеет)","Только постоянные материалы","Только цементы","Только композиты"] },

{ "id":27, "cat":"Пломбировочные материалы", "q":"Требования и виды изолирующих прокладок. Базисные и лайнерные прокладки. Показания и противопоказания.", "short":"Базисные (толстые) — цинк-фосфат, СИЦ, поликарбоксилат. Лайнерные (тонкие) — изолирующие лаки, адгезивные системы, жидкий СИЦ. Защищают пульпу от химических и термических воздействий.", "full":"Изолирующие прокладки — слой материала между дном/стенками кариозной полости и пломбировочным материалом, защищающий пульпу от химических, температурных и электрических воздействий. Требования к изолирующим прокладкам: механическая прочность; нерастворимость в ротовой жидкости; химическая нейтральность к пульпе и пломбировочному материалу; минимальная теплопроводность; биологическая совместимость; адгезия к тканям зуба. Виды и применяемые материалы: Базисные прокладки (толстые, >1 мм): 1) Цинк-фосфатный цемент (Фосфат-цемент) — прочный, хорошая теплоизоляция, но раздражает пульпу при нанесении на тонкий дентин. 2) Поликарбоксилатный цемент — обладает химической адгезией к дентину, биосовместим, менее прочен. 3) Классический СИЦ — выделяет фтор, химическая адгезия к тканям зуба, биосовместим, биологически активен. Лайнерные прокладки (тонкие, <1 мм): 1) Изолирующие лаки (Copalite) — плёнка на основе сополимеров; 2) Жидкие (текучие) СИЦ — Vitrebond (3M ESPE); 3) Адгезивные системы 4–5 поколений — при применении Total Etch одновременно служат лайнерными прокладками. Показания к изолирующим прокладкам: все постоянные пломбы при среднем и глубоком кариесе; перед применением материалов, раздражающих пульпу (амальгама, некоторые цементы). Противопоказания: при глубоком кариесе — не применять цинк-фосфатный цемент прямо на дентин без лечебной прокладки (раздражает пульпу).", "opts":["Базисные (цинк-фосфат, СИЦ) и лайнерные (лаки, жидкий СИЦ, адгезив) — защита пульпы от химических и термических воздействий","Только лечебные прокладки на основе гидроксида кальция","Только постоянные цементы","Только адгезивные системы"] },

{ "id":28, "cat":"Пломбировочные материалы", "q":"Требования и виды лечебных прокладок. Одонтотропные, комбинированные, биологические. Показания и противопоказания.", "short":"Лечебные прокладки: одонтотропные — Са(ОН)₂ (Dycal); антибактериальные — цинк-эвгенол (IRM); комбинированные — пасты. Стимулируют образование заместительного дентина.", "full":"Лечебные прокладки — материалы, накладываемые на дно кариозной полости для оказания биологического воздействия на пульпу и дентин. Требования: биологическая активность; стимуляция одонтобластов к образованию заместительного дентина; антибактериальное действие; биосовместимость; адгезия к дентину; совместимость с изолирующими прокладками и пломбировочными материалами. Группы: 1) Одонтотропные (стимулирующие образование заместительного дентина): материалы на основе гидроксида кальция Ca(OH)₂. Механизм: щелочная среда (рН 12) вызывает асептический некроз тонкого слоя дентина, что стимулирует одонтобласты к формированию заместительного дентина (дентинного мостика). Также антибактериальное действие, противовоспалительное. Представители: Dycal (Dentsply/Caulk), Calcipulpe (Septodont), Life (Kerr), Kalsogen Plus. 2) Антибактериальные/противовоспалительные: цинк-эвгенольный цемент (ZOE) — оказывает антибактериальное, слабоанестезирующее и противовоспалительное действие. IRM (Intermediate Restorative Material, Dentsply). Нельзя сочетать с композитами (эвгенол ингибирует полимеризацию)! 3) Комбинированные лекарственные пасты (антибиотики + кортикостероиды + антисептики): Pulpomixine, Ledermix. 4) Биологические (физиологичные) прокладки: коллаген, дентинная стружка. Показания: глубокий кариес без симптомов пульпита; случайное вскрытие пульпы. Противопоказания: Ca(OH)₂ нельзя в качестве базисной прокладки (хрупкий, разрушается через 1–2 года). ZOE нельзя под композиты.", "opts":["Гидроксид кальция (одонтотропный), цинк-эвгенол (антибактериальный), комбинированные пасты","Только СИЦ","Только цинк-фосфатный цемент","Только адгезивные системы"] },

{ "id":29, "cat":"Цементы", "q":"Постоянные пломбировочные материалы. Цементы на основе фосфатной кислоты. Показания, противопоказания, представители.", "short":"Цементы на фосфатной кислоте: цинк-фосфатные, силикатные, силикофосфатные. Показания: базисная прокладка, фиксация конструкций. Противопоказаны у детей при пломбировании полостей (токсичны).", "full":"Минеральные цементы на основе фосфатной кислоты: 1) Цинк-фосфатный цемент: состав — порошок (оксид цинка 90%, оксиды магния, кальция, кремния) + жидкость (ортофосфорная кислота 50–55%, вода, буфер — фосфаты). Замешивается порционно на стеклянной пластине до нужной консистенции (нить 2 см для прокладки; для фиксации — капля). Прочность при сжатии 100–140 МПа. Адгезия — только механическая (микрошероховатость). Раздражает пульпу при нанесении на тонкий дентин. Показания: базисная изолирующая прокладка при среднем и глубоком кариесе; фиксация несъёмных ортопедических конструкций. Противопоказания: в качестве постоянной пломбы (растворяется); без лечебной прокладки при глубоком кариесе (раздражает пульпу). Представители: Фосфат-цемент (Радуга-Р), Адгезор (Spofa Dental). 2) Силикатные цементы: порошок — кальций-алюмофторсиликатное стекло + жидкость — ортофосфорная кислота. Выделяют фтор. Прозрачные, эстетичные. Очень токсичны для пульпы! Показания (устаревшие): постоянные пломбы фронтальных зубов у взрослых. Вытеснены СИЦ. Представители: Силицин, Fritex, Алюмодент. 3) Силикофосфатные цементы (смесь силикатного + фосфатного): Силидонт, Силин. Токсичны. Практически не применяются.", "opts":["Цинк-фосфатные, силикатные, силикофосфатные; базисная прокладка, фиксация; токсичны для пульпы при прямом контакте","Только стеклоиономерные цементы","Только поликарбоксилатные цементы","Только композиты"] },

{ "id":30, "cat":"Цементы", "q":"Постоянные пломбировочные материалы. Цементы на основе полиакриловой кислоты. Показания, противопоказания, представители.", "short":"Цементы на полиакриловой кислоте: поликарбоксилатные и стеклоиономерные. Обладают химической адгезией к дентину и эмали. СИЦ дополнительно выделяют фтор.", "full":"Полимерные цементы на основе полиакриловой кислоты: 1) Поликарбоксилатные цементы: состав — порошок (оксид цинка, MgO, добавки) + жидкость (водный раствор полиакриловой кислоты 32–42%). Механизм адгезии: карбоксильные группы полиакриловой кислоты образуют ионные связи с кальцием эмали и дентина — химическая адгезия. Биосовместимы (менее раздражают пульпу, чем цинк-фосфатные). Прочность при сжатии ~60–80 МПа (ниже, чем у цинк-фосфатного). Показания: базисная прокладка; фиксация коронок, ортодонтических дуг; временное пломбирование. Недостатки: быстрое схватывание, низкая прочность, растворяется в ротовой жидкости. Противопоказания: постоянное пломбирование жевательных зубов. Представители: Carboco (VOCO), Durelon (3M ESPE), Аквацем. 2) Стеклоиономерные цементы (СИЦ) — см. вопрос 31, 32. Это наиболее значимые и широко применяемые цементы на основе полиакриловой кислоты в современной стоматологии. Общая черта всех цементов этой группы: химическая адгезия к твёрдым тканям зуба за счёт ионного взаимодействия карбоксильных групп с кальцием, хорошая биосовместимость. Для обеспечения адгезии обязательна кондиционирование поверхности (слабые кислоты или ЭДТА).", "opts":["Поликарбоксилатные и СИЦ — химическая адгезия к тканям зуба за счёт карбоксильных групп","Только цинк-фосфатные","Только силикатные","Только нанонаполненные композиты"] },

{ "id":31, "cat":"СИЦ", "q":"Стеклоиономерные цементы (СИЦ). Классические СИЦ — состав, свойства, недостатки, показания, представители.", "short":"Классические СИЦ: порошок — кальций-алюмофторсиликатное стекло, жидкость — поли/малеиновая кислота. Выделяют фтор, химическая адгезия к дентину. Чувствительны к влаге, медленно твердеют.", "full":"Классические (конвенциональные) стеклоиономерные цементы (СИЦ): Состав: порошок — кальций-алюмофторсиликатное стекло (CaAl-fluorosilicate) + жидкость — водный раствор полиакриловой кислоты (или малеиновой кислоты или их сополимеров, 40–50%). Некоторые СИЦ выпускаются в системе «порошок–вода» (вода дистиллированная). Реакция отверждения: кислотно-основная реакция (ион-обменная реакция). Положительные свойства: 1) Химическая адгезия к эмали и дентину (без протравливания); 2) Выделение ионов фтора — кариеспрофилактический эффект (реминерализация); 3) Высокая биосовместимость с пульпой; 4) Коэффициент теплового расширения близок к тканям зуба; 5) Не требует сложного протокола нанесения. Недостатки: 1) Чувствительность к влаге в период отверждения (первые 24 ч) — необходима защита лаком; 2) Медленное окончательное твердение (7 суток); 3) Невысокая механическая прочность и износостойкость; 4) Хрупкость — не пригоден для больших реставраций жевательных зубов. Показания: изолирующая и лечебная прокладка; пломбирование молочных зубов; пломбирование шеечных полостей (V класс) и нежевательных поверхностей; ART-методика; пломбирование у пациентов с высокой активностью кариеса. Представители: Fuji II (GC), Ketac Molar (3M ESPE), Chemfil Superior (Dentsply), Meron (VOCO).", "opts":["Кальций-алюмофторсиликатное стекло + полиакриловая кислота; выделяют фтор; чувствительны к влаге; Fuji II, Ketac Molar","Оксид цинка + эвгенол","Бисфенол-А + наполнитель","Гидроксид кальция + основа"] },

{ "id":32, "cat":"СИЦ", "q":"Стеклоиономерные цементы (СИЦ). Гибридные СИЦ — состав, свойства, недостатки, показания, представители.", "short":"Гибридные СИЦ (RMGIC) = классический СИЦ + метакрилатная смола. Быстро полимеризуются светом, менее чувствительны к влаге, прочнее классических. Vitremer, Fuji II LC.", "full":"Гибридные СИЦ (модифицированные смолой, Resin-Modified Glass Ionomer Cement — RMGIC): Состав: кальций-алюмофторсиликатное стекло + полиакриловая кислота + метакрилатные компоненты (HEMA — гидроксиэтилметакрилат и/или уретандиметакрилат). Инициаторы двойного отверждения: фотоинициатор (камфорохинон) для световой полимеризации + химические инициаторы для ионно-обменного твердения СИЦ-компонента. Механизм: при фотополимеризации мгновенно отверждается смоляной компонент, обеспечивая рабочую прочность; ионно-обменная реакция продолжается медленно. Положительные свойства по сравнению с классическими СИЦ: 1) Быстрое рабочее время (отверждение светом — 20–40 с); 2) Менее чувствительны к влаге в период отверждения; 3) Более высокая прочность; 4) Лучшие эстетические свойства; 5) Сохраняется выделение фтора и химическая адгезия. Недостатки: 1) Хуже выделяют фтор, чем классические СИЦ; 2) Более сложный протокол; 3) Полимеризационная усадка смоляного компонента; 4) Дороже. Показания: изолирующая прокладка под композит (закрытая сэндвич-техника); пломбирование молочных зубов; пломбирование V класса; основа под большие реставрации. Представители: Vitremer (3M ESPE), Fuji II LC (GC), Photac-Fil (3M ESPE), Ionoseal (VOCO), Dyract Flow (Dentsply).", "opts":["СИЦ + метакрилатная смола (RMGIC); двойное отверждение (свет + ионный обмен); меньше чувствительность к влаге; Vitremer, Fuji II LC","Чистый классический СИЦ без смолы","Только композит без стекла","Компомер = СИЦ + композит"] },

{ "id":33, "cat":"Фотополимеризаторы", "q":"Абсолютные и относительные противопоказания к реставрации зубов. Фотополимеризаторы: виды, режим работы.", "short":"Фотополимеризаторы: галогеновые, LED, плазменные, лазерные. Длина волны 400–500 нм (синий спектр). Абсолютные противопоказания к реставрации: непереносимость компонентов, невозможность изоляции.", "full":"Абсолютные противопоказания к реставрации зубов: аллергия или непереносимость компонентов пломбировочного материала (мономеров, адгезивов); психические расстройства, не позволяющие провести лечение; невозможность обеспечить надлежащую изоляцию рабочего поля (исключение влаги). Относительные противопоказания: беременность I триместра (плацентарный барьер формируется к 14–16 неделе); тяжёлые декомпенсированные общесоматические заболевания; выраженный тризм или рвотный рефлекс; слишком молодой возраст (широкая пульпа — риск термического повреждения). Фотополимеризаторы — источники光 излучения в диапазоне 400–500 нм (синий спектр) для активации фотоинициатора камфорохинона. Виды: 1) Галогеновые (QTH): галогеновая лампа + фильтр, мощность 300–1500 мВт/см², нагревание наконечника и зуба, требуют периодической замены лампы и фильтра. 2) LED (светодиодные): мощность 400–2000 мВт/см², не нагреваются, долговечны (>1 000 часов), работают от аккумулятора, компактны, узкий спектр (~460 нм). 3) Плазменные: очень высокая мощность, быстрое отверждение за 3–6 с, дорогие, большие. 4) Лазерные: аргоновый лазер, точное воздействие, дорогие. Режим работы: расстояние от торца наконечника до материала — 0–2 мм; время полимеризации — 20–40 с для слоя ≤2 мм; использовать защитные экраны.", "opts":["Галогеновые, LED, плазменные, лазерные; длина волны 400–500 нм; абсолютные — аллергия, невозможность изоляции","Только галогеновые лампы","Только LED лампы","Только лазерные источники"] },

{ "id":34, "cat":"Фотополимеризаторы", "q":"Галогеновые фотополимеризаторы. Положительные свойства, недостатки. Абсолютные противопоказания к реставрации.", "short":"Галогеновые: длина волны 400–500 нм, мощность 300–1500 мВт/см², полимеризуют все виды фотокомпозитов. Недостатки: нагрев, необходима замена лампы каждые 40–100 ч. Абсолютные противопоказания к реставрации: аллергия на материал, невозможность изоляции.", "full":"Галогеновые (кварцево-вольфрамо-галогеновые, QTH) фотополимеризаторы — наиболее распространённый ранее тип. Устройство: галогеновая лампа + стеклянный световод + фильтры (отсекающие нежелательную часть спектра). Длина волны активного спектра: 400–500 нм (синий, соответствует максимуму поглощения камфорохинона). Мощность: от 300 до 1500 мВт/см². Положительные свойства: 1) Широкий спектр — полимеризует все виды фотоотверждаемых материалов (включая материалы с альтернативными фотоинициаторами); 2) Доступность и невысокая стоимость; 3) Хорошая изученность клинических протоколов. Недостатки: 1) Значительный нагрев наконечника и тканей зуба (термическая травма возможна при длительном воздействии); 2) Лампа и фильтры требуют периодической замены (каждые 40–100 часов работы); 3) Мощность снижается в процессе эксплуатации (требуется контроль); 4) Большие размеры, работа от сети. Режим работы: мощность 400–600 мВт/см² — стандартный режим 20–40 с; рабочее расстояние 0–2 мм. Абсолютные противопоказания к реставрации: 1) Доказанная аллергия или непереносимость компонентов пломбировочного материала; 2) Невозможность обеспечить сухое рабочее поле (абсолютную или относительную изоляцию); 3) Психические расстройства, исключающие возможность проведения лечения. Мощность прибора необходимо периодически измерять радиометром.", "opts":["Широкий спектр 400–500 нм, полимеризует все материалы; нагрев и замена лампы — недостатки","Лучший современный тип без недостатков","Не имеют недостатков, используются повсеместно","Только для временных материалов"] },
