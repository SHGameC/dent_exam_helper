  { id:53, cat:"Анатомия", q:"Анатомические особенности строения коронки и корня 14, 15, 24, 25 зубов (верхние премоляры).", short:"14, 24 (1-й премоляр): 2 бугра, 2 корня (щёчный + нёбный). 15, 25 (2-й премоляр): 2 бугра, 1 корень (реже 2). Форма — граненный куб.", full:"Верхние первые премоляры (14, 24): Коронка: прямоугольная, 2 бугра — щёчный (больше) и нёбный (меньше); продольная фиссура по центру. Длина коронки 8–9 мм. Корень: 2 корня — щёчный и нёбный (разделяются на уровне средней трети); длина 14–15 мм; реже 1 или 3 корня; между корнями межкорневая борозда. Верхние вторые премоляры (15, 25): Коронка: схожа с 14/24, но бугры более равны по высоте; слабо выраженная центральная фиссура. Длина коронки 7–9 мм. Корень: чаще 1 корень с продольными бороздками (уплощённый); реже 2 корня; длина 14–16 мм. Клиническое значение: при эндодонтическом лечении — 1-й премоляр нередко имеет 2 канала (сложность).", opts:["14/24: 2 корня (щёчный+нёбный); 15/25: 1 корень; оба имеют 2 бугра (щёчный и нёбный)","Три корня","Один бугор","Без фиссур"] },
  { id:54, cat:"Анатомия", q:"Анатомические особенности строения коронки и корня 16 и 26 зубов (верхние первые моляры).", short:"16, 26: самые большие зубы верхней челюсти. 4 бугра + 5-й (Карабелли). 3 корня: 2 щёчных + 1 нёбный. Ромбовидная коронка.", full:"Верхние первые моляры (16, 26) — наиболее крупные зубы верхней челюсти. Коронка: ромбовидная; 4 основных бугра: медиально-щёчный (наибольший), дистально-щёчный, медиально-нёбный, дистально-нёбный; 5-й бугор (бугор Карабелли) — на медиально-нёбной поверхности нёбного бугра (непостоянный); фиссуры: H-образная или «+» образная. Длина коронки 7–8 мм. Корни: 3 корня — медиально-щёчный (нередко 2 канала!), дистально-щёчный, нёбный (наибольший). Нёбный корень прямой, мощный. Медиально-щёчный — чаще с изгибом, 2 канала (~40–70%). Длина корней 12–14 мм. Клиническое значение: обязательно рентгенологически проверять наличие МБ2 канала.", opts:["4 бугра (+5-й Карабелли); 3 корня (2 щёчных + нёбный); ромбовидная коронка","2 корня","5 обязательных бугров","Квадратная форма"] },
  { id:55, cat:"Анатомия", q:"Анатомические особенности строения коронки и корня 17 и 27 зубов (верхние вторые моляры).", short:"17, 27: меньше 16/26. Чаще 3 бугра (без Карабелли) или 4. 3 корня, более сближены (могут срастаться). Корни часто искривлены.", full:"Верхние вторые моляры (17, 27). Коронка: меньше 16/26; чаще 3–4 бугра (бугор Карабелли редко); форма более вытянутая; дистально-нёбный бугор может быть редуцирован; фиссуры менее чёткие. Размеры: длина коронки 6–7 мм. Корни: 3 корня, но более сближены и нередко сращены (особенно дистально-щёчный и нёбный → нередко 1 общий ствол); могут быть искривлены дистально (важно при эндодонтии); длина корней 11–13 мм. Вариантность формы: от 3-бугровой до 4-бугровой в зависимости от популяции. Клиническое значение: близость к верхнечелюстной пазухе (sinus maxillaris); при удалении — риск ороантрального сообщения.", opts:["Меньше 16/26; 3–4 бугра, без стабильного Карабелли; 3 корня, чаще сближены или сращены","Больше 16/26","Всегда 5 бугров","4 корня"] },
  { id:56, cat:"Анатомия", q:"Анатомические особенности строения коронки и корня 41, 42, 31, 32 зубов (нижние резцы).", short:"Нижние резцы — наименьшие зубы. Коронка узкая, долотообразная. 1 корень уплощённый. 41/31 — центральные (уже), 42/32 — боковые (чуть шире).", full:"Нижние резцы — наименьшие по размеру зубы в полости рта. Нижние центральные резцы (41, 31): Коронка: долотообразная, очень узкая (ширина ~5 мм); режущий край почти симметричный; оба угла (медиальный и дистальный) закруглённые; вестибулярная поверхность почти плоская. Длина коронки 7–9 мм. Корень: 1 корень, уплощённый медиолатерально; нередко 2 канала; длина 12–14 мм. Нижние боковые резцы (42, 32): Коронка: шире центральных (6–7 мм); дистальный угол более закруглён; на язычной поверхности слабо выражены боковые гребни. Корень: уплощённый, нередко с продольными бороздками, длина 14–16 мм; возможно 2 канала.", opts:["Самые маленькие; коронка долотообразная узкая; 1 уплощённый корень (возможно 2 канала)","Самые большие зубы","Два корня стандартно","Три бугра"] },
  { id:57, cat:"Анатомия", q:"Анатомические особенности строения коронки и корня 43 и 33 зубов (нижние клыки).", short:"Нижние клыки: похожи на верхние, но меньше и уже. 1 бугор, 1 корень уплощённый (иногда раздвоен). Ромбовидная коронка.", full:"Нижние клыки (43, 33). Коронка: ромбовидная, уже верхних клыков; 1 бугор на режущем крае; медиальный скат бугра короче дистального; вестибулярная поверхность с 1 выраженным валиком; язычная поверхность с медиальным и дистальным гребнями. Размеры: длина коронки 9–11 мм, ширина 6–7 мм. Корень: 1 корень, уплощённый медиолатерально (возможны продольные борозды); иногда раздвоение корня в апикальной трети (2 канала в ~5%); длина 15–18 мм. Особенности: нижние клыки немного уже, менее выражен бугорок на язычной поверхности; корень меньше изогнут, чем у верхнего клыка.", opts:["1 бугор, 1 уплощённый корень (реже раздвоен); уже верхнего клыка","2 бугра","Самый короткий корень","Нет бугра"] },
  { id:58, cat:"Анатомия", q:"Анатомические особенности строения коронки и корня 44, 45, 34, 35 зубов (нижние премоляры).", short:"44, 34 (1-й): 2 бугра, но щёчный намного больше. 1 корень конический. 45, 35 (2-й): 2–3 бугра, более равные. 1 корень уплощённый.", full:"Нижние первые премоляры (44, 34): Коронка: асимметричная — щёчный бугор высокий, нёбный (язычный) — маленький, рудиментарный; жевательная поверхность наклонена в язычную сторону; трансверзальный гребень соединяет бугры; выраженная дистальная фиссура. Корень: 1 конический, иногда уплощённый; возможно 2 канала; длина 14–15 мм. Нижние вторые премоляры (45, 35): Коронка: 2–3 бугра более равные (2-бугровый тип — 1 щёчный + 1 язычный; 3-бугровый — 1 щёчный + 2 язычных); Y-образная или П-образная фиссура. Корень: 1 корень, менее уплощённый; длина 14–16 мм. Клиническое значение: близость к n. mentalis при нижних премолярах.", opts:["44/34: щёчный бугор доминирует, 1 корень; 45/35: 2–3 равных бугра, 1 корень","2 корня","Равные бугры у 44/34","Нет фиссур"] },
  { id:59, cat:"Анатомия", q:"Анатомические особенности строения коронки и корня 46 и 36 зубов (нижние первые моляры).", short:"46, 36: самые большие нижние зубы. 5 бугров, кубическая форма. 2 корня (мезиальный + дистальный). Мезиальный — 2 канала. Mesiobuccal groove.", full:"Нижние первые моляры (46, 36) — самые крупные зубы нижней челюсти. Коронка: кубическая (прямоугольная); 5 бугров: 3 щёчных (медиально-щёчный, дистально-щёчный, дистальный) + 2 язычных (медиально-язычный, дистально-язычный); щёчная борозда чёткая; анатомия жевательной поверхности сложная. Длина коронки 7–8 мм. Корни: 2 корня — мезиальный и дистальный. Мезиальный: уплощённый, с 2 каналами (мезиально-щёчный + мезиально-язычный, ~90%); нередко соединяются апикально. Дистальный: конический, 1 широкий канал; иногда 2. Длина корней 14–16 мм. Клиническое значение: 3–4 канала в большинстве случаев; обязательна КЛКТ или грамотная интерпретация рентгенограммы.", opts:["5 бугров; 2 корня (мезиальный чаще 2 канала, дистальный 1 широкий); кубическая форма","4 бугра","3 корня","1 канал всегда"] },
  { id:60, cat:"Анатомия", q:"Анатомические особенности строения коронки и корня 47 и 37 зубов (нижние вторые моляры).", short:"47, 37: меньше 46/36. 4 бугра (реже 5). 2 корня, более сближены (нередко сращены). Каналы чаще искривлены.", full:"Нижние вторые моляры (47, 37). Коронка: прямоугольная; чаще 4 бугра (2 щёчных + 2 язычных), реже 5; + крестообразная или H-образная фиссура; нет дистального бугра в отличие от 46/36; форма более симметричная. Размеры: длина коронки 6–7 мм. Корни: 2 корня — мезиальный и дистальный; более сближены, чем у 46/36; нередко сращены (особенно в апикальной трети); искривление в дистальном направлении (осложняет эндодонтию); длина 13–15 мм. Вариантность: иногда «тавродонтизм» (большая пульповая камера). Клиническое значение: при сращении корней — единый конический корень с несколькими каналами; близость к нижнечелюстному каналу (n. alveolaris inferior).", opts:["4 бугра, 2 корня (нередко сращены), без дистального бугра; искривлённые каналы","5 бугров всегда","3 корня","Такой же как 46/36"] },
  { id:61, cat:"Практика", q:"Препарирование кариозных полостей I класса на фантомах.", short:"Последовательность: разметка фиссур → раскрытие шаровидным бором → расширение фиссурным → некрэктомия → формирование ящика → финирование. Контроль зондом и глубиномером.", full:"Алгоритм препарирования полостей I класса на фантоме: (1) Осмотр: определить локализацию фиссур на жевательной поверхности. (2) Раскрытие: шаровидным алмазным бором вскрыть полость по ходу фиссуры. (3) Расширение: фиссурным бором расширить полость в пределах поражённых тканей (при СО) или по всей длине фиссуры (при ХО/амальгаме). (4) Некрэктомия: маленький шаровидный бор на малой скорости или экскаватор — удалить размягчённый дентин. (5) Формирование: фиссурный бор с плоским концом — плоское дно, вертикальные стенки, минимальная глубина 1.5–2 мм. (6) Финирование: мелкозернистый алмазный бор или финир — обработать края. (7) Контроль: зонд (плотность стенок), индикатор кариеса, промывание и высушивание.", opts:["Шаровидный→фиссурный→некрэктомия→формирование→финирование + контроль зондом","Только один бор","Начинать с финирования","Без некрэктомии"] },
  { id:62, cat:"Практика", q:"Препарирование кариозных полостей II класса на фантомах.", short:"Доступ через жевательную поверхность (ящик + площадка). Сепарационный диск или боры. Матрица + клин до пломбирования. Контактный пункт под контролем.", full:"Алгоритм препарирования II класса на фантоме: (1) Сепарация: разделение контактной поверхности матрицей-разлучителем или клином для защиты соседнего зуба. (2) Раскрытие: фиссурным бором с жевательной поверхности — доступ к апроксимальной полости. (3) Формирование «ящика»: параллельные вертикальные стенки; десневой пол на 0.5–1 мм ниже дентиноэмалевого соединения; ширина ≥1 мм; исмус (перешеек) ≥1.5 мм. (4) Площадка на жевательной поверхности («ласточкин хвост» при амальгаме). (5) Некрэктомия: удаление кариозного дентина. (6) Финирование краёв. (7) Установка матрицы (Tofflemire или секционной) + деревянного клина до пломбирования. (8) Контроль контактного пункта после пломбирования — флоссом.", opts:["Ящик + площадка через жевательную, матрица+клин, контроль контакта флоссом","Прямой доступ через контактную поверхность","Без матрицы","Начинать с апроксимальной стороны"] },
  { id:63, cat:"Практика", q:"Препарирование кариозных полостей III класса на фантомах.", short:"Доступ с нёбной поверхности (сохранить губную стенку). Треугольная полость. Скос эмали с губной стороны 45°. Прозрачная матрица + клин.", full:"Алгоритм препарирования III класса на фантоме: (1) Оценка доступа: если губная эмаль цела — доступ с нёбной (язычной) поверхности. (2) Раскрытие: шаровидным бором с нёбной стороны → выход на апроксимальную поверхность к кариесу. (3) Формирование: треугольная или овальная форма; минимальный объём при адгезивном материале. (4) Некрэктомия. (5) Финирование: скос 45° по губному краю (увеличивает площадь адгезии и маскирует переход пломба-зуб). (6) Установка прозрачной целлулоидной матрицы + клина. (7) Подбор цвета: до коффердама, при естественном освещении. (8) Послойное нанесение: дентинный оттенок → эмалевый → полимеризация каждого → финирование штрипсами.", opts:["Нёбный доступ, скос 45° губного края, прозрачная матрица+клин, слоёная техника","Губной доступ всегда","Без матрицы","Один слой"] },
  { id:64, cat:"Практика", q:"Препарирование кариозных полостей IV класса на фантомах.", short:"Кариес/перелом угла резца. Силиконовый ключ (wax-up). Широкий скос 45° по периметру. Нёбная стенка → дентин → мамелоны → эмаль. Послойная техника.", full:"Алгоритм препарирования IV класса на фантоме: (1) Изготовление силиконового ключа: wax-up (моделирование формы зуба в воске) → оттиск силиконом нёбной поверхности → ключ-шаблон для воссоздания нёбной стенки. (2) Препарирование: скос по всему периметру полости 2–3 мм, 45°; по режущему краю — скос из нескольких плоскостей. (3) Некрэктомия. (4) При необходимости — штифт для ретенции. (5) Пломбирование: силиконовый ключ фиксируется → нёбная стенка из прозрачного или нёбного оттенка; затем дентинный слой; мамелоны (конусообразные выступы из непрозрачного опак-оттенка); перекрытие эмалевым прозрачным слоем; финишный слой. (6) Окклюзионная коррекция; финирование штрипсами; полировка.", opts:["Силиконовый ключ + широкий скос + послойно (нёбная→дентин→мамелоны→эмаль)","Один слой","Без силиконового ключа","Только круглая форма"] },
  { id:65, cat:"Практика", q:"Препарирование кариозных полостей V класса на фантомах.", short:"Пришеечная область. Ретракция десны. Овальная форма. СИЦ или наноком. Не пересушивать дентин. Кисть + канюля.", full:"Алгоритм препарирования V класса на фантоме: (1) Ретракция десны: ретракционная нить или ретракционная паста (Expasyl) для обнажения десневой стенки. (2) Изоляция: коффердам с кламмером или ватные валики + слюноотсос. (3) Раскрытие: шаровидным бором (бордовая/красная кодировка) — доступ к кариозной полости в пришеечной зоне. (4) Формирование: овальная или почковидная форма с закруглёнными углами; дно параллельно поверхности; десневая стенка — ≤1 мм ниже десны. (5) Некрэктомия. (6) Финирование краёв. (7) Пломбирование: для СИЦ — нанесение кисточкой или канюлей; при композите — слой праймера/адгезива → светоотверждение → наношаг текучим → наношаг наноком; (8) Световод перпендикулярно поверхности зуба.", opts:["Ретракция десны, овальная форма, дно параллельно поверхности, СИЦ или наноком + адгезив","Прямоугольная форма","Без ретракции","Только амальгама"] },
  { id:66, cat:"Практика", q:"Препарирование кариозных полостей VI класса на фантомах.", short:"Режущий край / бугры. Минимальное препарирование. Закруглённые края. Нанокомпозит или микрогибридный. Обязателен контроль окклюзии.", full:"Алгоритм препарирования VI класса на фантоме: (1) Оценка поражения: визуально, зонд, трансиллюминация — определить границы поражения на режущем крае резца или бугре моляра/премоляра. (2) Минимальное препарирование: шаровидным бором удалить только кариозные ткани; закруглённые края полости (скос по периметру при адгезивном материале). (3) Некрэктомия + финирование. (4) Протравливание + адгезив. (5) Пломбирование: нанонаполненный или микрогибридный композит — для прочности и хорошей полировки; конденсируемый — при буграх боковых зубов под нагрузку. (6) Обязательный окклюзионный контроль: артикуляционная бумага → точечная коррекция. (7) Финирование и полировка.", opts:["Минимальное препарирование, закруглённые края, нанокомпозит, контроль окклюзии","Обширное препарирование","Только амальгама","Без окклюзионного контроля"] },
  { id:67, cat:"Практика", q:"Медикаментозная обработка кариозной полости на фантомах.", short:"После препарирования: промывание (вода/хлоргексидин 0.05–2%), высушивание воздухом, обработка антисептиком (хлоргексидин, этанол). Не спирт при адгезивных системах.", full:"Медикаментозная обработка — этап после некрэктомии и формирования полости. Цель: удаление остатков дентина, дезинфекция, подготовка к пломбированию. Алгоритм на фантоме: (1) Промывание: водно-воздушная струя или 0.05–2% раствор хлоргексидина биглюконата. (2) Высушивание: воздушная струя (умеренная, не пересушивать — особенно под адгезивные системы). (3) Антисептическая обработка: ватный шарик с 0.05% хлоргексидином или 3% перекисью водорода (при инфицированных полостях); 37% ортофосфорная кислота — если используется тотальное протравливание. Важно: не применять спирт (96%) перед нанесением адгезивной системы — может пересушить дентинные канальцы → снижение адгезии; не использовать перекись под композит — остаточный кислород ингибирует полимеризацию.", opts:["Промывание хлоргексидином + умеренное высушивание; спирт нельзя под адгезив","Только сухая обработка","Только спиртом","Обработка не нужна"] },
  { id:68, cat:"Практика", q:"Высушивание кариозной полости на фантомах.", short:"Воздушная струя умеренно. Ватный шарик — дополнительно. Нельзя пересушивать под адгезивные системы (коллаген сжимается). При ХО — можно суше.", full:"Высушивание — важный этап перед нанесением любого пломбировочного материала. На фантоме: (1) Воздушная струя: умеренной силы (не макс!), 1–3 с. (2) Ватный шарик/пелет: дополнительное промокание избытка влаги. (3) Оценка: поверхность матовая, не блестит (избыток влаги), но и не меловая/белая (пересушено). Правило «влажного связывания» (wet bonding): для адгезивных систем 4–5-го поколений (total-etch) дентин должен оставаться влажным → коллагеновая сеть не коллапсирует → праймер проникает в канальцы. При пересушивании: коллаген коллапсирует → гибридный слой не образуется → низкая адгезия → постоперативная чувствительность. Для самопротравливающих систем (6–8-е поколение): допускается слегка влажная поверхность. Для СИЦ и цементов: допускается более сухая поверхность.", opts:["Умеренная струя, матовая поверхность; нельзя пересушивать под total-etch адгезив","Максимальная сушка","Полное высушивание обязательно","Влажность не важна"] },
  { id:69, cat:"Практика", q:"Восстановление полости композитами химического отверждения на фантомах.", short:"2 пасты, смешать 1:1, 30–60с на блоке, рабочее время ~2 мин. Без адгезива (или только праймер). Нанести штопфером. Не полимеризатор не нужен.", full:"Алгоритм восстановления полости ХО-композитом на фантоме: (1) Подготовка полости: препарирование, медикаментозная обработка, высушивание. (2) Изоляция: коффердам или ватные валики. (3) Адгезивная система: при ХО-композитах используется либо специальный праймер из набора, либо протравливание + праймер; бонд тоже из набора (ХО-бонд). (4) Замешивание: равные части пасты А (основа) и пасты Б (катализатор) на стекле или блоке — 30–60 с, до однородного цвета. (5) Нанесение: штопфером в полость одним или двумя слоями; уплотнение. (6) Формирование контура: до начала схватывания (~2 мин) — оформить контуры инструментом. (7) Схватывание: 4–5 мин. (8) Финирование и полировка: после схватывания финирами, штрипсами, пастой. Важно: работать быстро; исключить контаминацию влагой.", opts:["Смешать 2 пасты 1:1, ~60с, нанести штопфером, схватывание 4–5 мин без лампы","Один флакон","Лампа обязательна","Рабочее время 10 мин"] },
  { id:70, cat:"Практика", q:"Восстановление полости композитами светового отверждения на фантомах.", short:"1 паста. Адгезивная система (травление+праймер+бонд или self-etch). Слои ≤2 мм, каждый 20–40 с лампой. Финирование + полировка.", full:"Алгоритм восстановления СО-композитом на фантоме: (1) Изоляция: коффердам. (2) Адгезивная система: тотальное протравливание (37% H₃PO₄, эмаль 30 с / дентин 15 с) → смыть → умеренно высушить → праймер → бонд → полимеризация 10–20 с. (3) Первый слой (необязательно): тонкий слой жидкотекучего композита (буфер) → полимеризация 20 с. (4) Послойное нанесение: слои ≤2 мм; штопфером конденсировать; каждый слой полимеризуется 20–40 с; световод максимально близко к поверхности. (5) Для фронтальных зубов: дентинный оттенок → эмалевый → финишный прозрачный. (6) Финирование: алмазными финирами, дисками Soflex, штрипсами для контакта. (7) Полировка: резиновыми насадками и полировочной пастой. (8) Контроль окклюзии: артикуляционная бумага → коррекция.", opts:["Адгезив + слои ≤2мм + полимеризация каждого 20–40 с + финирование + полировка","Один толстый слой","Без адгезива","Без полимеризатора"] },
  { id:71, cat:"Практика", q:"Пломбирование кариозных полостей текучими (жидкотекучими) композитами на фантомах.", short:"Flowable — из шприца с иглой-канюлей. Буферный первый слой или самостоятельно для V класса и малых полостей. Слой ≤2 мм, полимеризация 20–40 с.", full:"Алгоритм пломбирования жидкотекучим (flowable) композитом на фантоме: (1) Показания: V класс, фиссуры, малые полости I класса, буферный слой под конденсируемый. (2) Изоляция. (3) Адгезивная система (как обычно). (4) Нанесение: шприц с иглой-канюлей вводят в полость и медленно подают материал → полость заполняется снизу вверх (чтобы не было пузырей). (5) Толщина слоя: ≤2 мм (как для обычного композита, но текучие имеют большую усадку). (6) Полимеризация: 20–40 с. (7) Если как буферный слой: сверху наносится конденсируемый или гибридный → полимеризация. (8) При V классе: можно как основной материал (один/два слоя). (9) Финирование и полировка: аккуратно финирами, дисками. Особенность: из-за высокой текучести не требует конденсации штопфером.", opts:["Шприц с канюлей снизу вверх, ≤2 мм слой, полимеризация; как буфер или самостоятельно для малых полостей","Штопфером наносится","Нет ограничений по толщине","Без адгезива"] },
  { id:72, cat:"Практика", q:"Препарирование «туннельным» методом на фантомах.", short:"Шаровидным бором через жевательную поверхность → туннель к апроксимальному кариесу без вскрытия контакта. Контроль рентгенограммой. СИЦ через канюлю.", full:"Алгоритм препарирования туннельным методом на фантоме: (1) Показание: небольшой апроксимальный кариес с интактной апроксимальной эмалью. (2) Разметка: по рентгенограмме определить локализацию поражения. (3) Доступ: фиссурным бором через жевательную поверхность в дентин → изменить направление → шаровидным бором небольшого диаметра (1–1.5 мм) создать туннель к апроксимальному кариесу. (4) Некрэктомия: маленьким экскаватором или шаровидным бором на малой скорости удалить мягкий дентин через туннель. (5) Контроль: рентгенограмма или кариес-детектор (через канюлю). (6) Пломбирование: высоковязкий СИЦ (Fuji IX, Ketac Molar) вводят через иглу-канюлю в туннель; конденсируют; полимеризация. (7) Окклюзионная коррекция. Важно: не нарушать апроксимальный контакт.", opts:["Туннель через жевательную в дентин, некрэктомия экскаватором, СИЦ через канюлю без нарушения контакта","Открытый доступ","Через корень","Матрица обязательна"] },
  { id:73, cat:"Практика", q:"Пломбирование «открытой» сэндвич-техникой на фантомах.", short:"Открытый сэндвич: нижний слой СИЦ выходит на десневую стенку (открыт в полость рта), верхний — композит. Используется при II классе с поддесневым краем.", full:"Открытая сэндвич-техника: Показание: II класс с поддесневым расположением десневого края (невозможно полностью изолировать и пломбировать композитом). Алгоритм на фантоме: (1) Препарирование полости II класса. (2) Ретракция десны + изоляция (ватные валики, слюноотсос). (3) Матрица + клин установлены. (4) Нижний слой: СИЦ (Fuji IX или Ketac Molar) замешивается и вносится в десневую часть ящика (нижняя 1/3–1/2 полости) → конденсация, формирование поверхности на уровне дёсны или чуть ниже → кратковременная полимеризация (для гибридного СИЦ) или ожидание схватывания. (5) Удаление матрицы. СИЦ открыт в полость рта в десневой части. (6) Верхний слой: адгезивная система + послойный композит заполняет остальной объём полости → полимеризация. (7) Финирование и полировка.", opts:["СИЦ в десневую часть (остаётся открытым), сверху композит; для II класса с поддесневым краем","СИЦ полностью покрывается","Без матрицы","Без клина"] },
  { id:74, cat:"Практика", q:"Пломбирование «закрытой» сэндвич-техникой на фантомах.", short:"Закрытый сэндвич: СИЦ полностью закрыт слоем композита. Используется при I, II классе, среднем кариесе. СИЦ — основа, композит — финиш.", full:"Закрытая сэндвич-техника: Показание: I и II класс при среднем кариесе; пациенты с высоким кариесриском; полости в зонах умеренной нагрузки. Алгоритм на фантоме: (1) Препарирование полости. (2) При II классе — матрица + клин. (3) Нижний слой: СИЦ (лайнерный жидкий — Vitrebond, или базисный конденсируемый — Fuji IX) на дно и нижние стенки полости (0.5–1 мм для лайнера, 1–2 мм для базисного); кратковременная полимеризация (для гибридного) или 4–5 мин (для классического). (4) Не нужно протравливать СИЦ кислотой → нанести самопротравливающий праймер или специальный кондиционер. (5) Адгезивная система на эмаль и поверхность СИЦ. (6) Послойное нанесение композита (закрывает СИЦ полностью) → полимеризация каждого слоя. (7) Финирование + полировка. Преимущество: СИЦ выделяет фтор → профилактика вторичного кариеса; защита пульпы.", opts:["СИЦ на дно, полностью закрыт послойным композитом; I–II класс, профилактика рецидива","СИЦ открыт","Только один слой","Без СИЦ"] },
  { id:75, cat:"Практика", q:"Проведение основных этапов эстетической реставрации зубов на фантомах.", short:"Подбор цвета → изоляция → препарирование/очистка → адгезив → послойный композит (дентин+эмаль+прозрачный) → финирование → полировка → контроль окклюзии.", full:"Алгоритм эстетической реставрации на фантоме (пример: IV класс / сложная реставрация фронтального зуба): (1) Диагностика: клиническая и фотодокументация. (2) Подбор цвета: до коффердама, при увлажнённом зубе, дневной свет. Шкала Vita. (3) Силиконовый ключ (wax-up): при необходимости восстановления контура. (4) Изоляция: коффердам. (5) Препарирование/обработка: скос 45° по периметру; поверхностное очищение пемзой. (6) Протравливание: эмаль 30 с, дентин 15 с → смыть. (7) Адгезивная система: праймер → бонд → полимеризация. (8) Послойная реставрация: нёбная стенка через ключ (прозрачный слой); дентинный опак-слой (мамелоны); покрытие эмалевым слоем; финишный прозрачный слой. (9) Полимеризация каждого слоя. (10) Финирование: алмазные финиры, диски, штрипсы. (11) Полировка: резиновые насадки, паста. (12) Окклюзионный контроль. (13) Фотодокументация результата.", opts:["Цвет → изоляция → препарирование → адгезив → дентин+эмаль+прозрачный слои → финирование → полировка → окклюзия","Один слой","Без адгезива","Без подбора цвета"] }
];

let learnedSet = new Set(JSON.parse(localStorage.getItem('learned') || '[]'));
let quizQuestions = [];
let quizIdx = 0;
let quizScore = 0;

function saveProgress() {
  try { localStorage.setItem('learned', JSON.stringify([...learnedSet])); } catch(e){}
  updateStats();
}

function updateStats() {
  document.getElementById('learned-count').textContent = learnedSet.size;
  document.getElementById('pct-count').textContent = Math.round(learnedSet.size/75*100)+'%';
}

function showSection(name, btn) {
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('visible'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('section-'+name).classList.add('visible');
  btn.classList.add('active');
}

function renderCards(list) {
  const grid = document.getElementById('cards-grid');
  grid.innerHTML = '';
  if(!list.length) { grid.innerHTML='<div class="no-results">Ничего не найдено</div>'; return; }
  list.forEach(q => {
    const isLearned = learnedSet.has(q.id);
    const div = document.createElement('div');
    div.className = 'card' + (isLearned?' learned':'');
    div.dataset.id = q.id;
    div.innerHTML = `
      <div class="card-num">Вопрос ${q.id} · ${q.cat}</div>
      <div class="card-q">${q.q}</div>
      <div class="card-divider"></div>
      <div class="card-answer-short">${q.short}</div>
      <div style="padding:0 1.2rem 0.5rem">
        <button class="expand-btn" onclick="toggleExpand(${q.id}, event)">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg>
          Развёрнутый ответ
        </button>
      </div>
      <div class="card-full" id="full-${q.id}">${q.full}</div>
      <div class="card-actions">
        <button class="tag-learned" onclick="toggleLearned(${q.id}, event)">${isLearned?'✓ Изучено':'Отметить изученным'}</button>
      </div>
    `;
    grid.appendChild(div);
  });
}

function toggleExpand(id, e) {
  e.stopPropagation();
  const el = document.getElementById('full-'+id);
  const btn = e.target.closest('.expand-btn');
  const isOpen = el.classList.toggle('open');
  btn.querySelector('svg').style.transform = isOpen ? 'rotate(180deg)' : '';
}

function toggleLearned(id, e) {
  e.stopPropagation();
  if(learnedSet.has(id)) learnedSet.delete(id);
  else learnedSet.add(id);
  saveProgress();
  const card = document.querySelector(`.card[data-id="${id}"]`);
  const btn = card.querySelector('.tag-learned');
  if(learnedSet.has(id)) { card.classList.add('learned'); btn.textContent='✓ Изучено'; }
  else { card.classList.remove('learned'); btn.textContent='Отметить изученным'; }
}

function filterCards() {
  const q = document.getElementById('search').value.toLowerCase();
  const cat = document.getElementById('cat-filter').value;
  const status = document.getElementById('status-filter').value;
  const filtered = QUESTIONS.filter(item => {
    const matchQ = !q || item.q.toLowerCase().includes(q) || item.short.toLowerCase().includes(q);
    const matchCat = !cat || item.cat.includes(cat);
    const matchStatus = !status || (status==='learned'&&learnedSet.has(item.id)) || (status==='new'&&!learnedSet.has(item.id));
    return matchQ && matchCat && matchStatus;
  });
  renderCards(filtered);
}

// QUIZ
function startQuiz() {
  const cat = document.getElementById('quiz-cat').value;
  const num = parseInt(document.getElementById('quiz-num').value) || 10;
  const learnedOnly = document.getElementById('quiz-learned-only').checked;
  let pool = QUESTIONS.filter(q => {
    const matchCat = !cat || q.cat.includes(cat);
    const matchLearned = !learnedOnly || learnedSet.has(q.id);
    return matchCat && matchLearned;
  });
  if(pool.length < 3) { alert('Недостаточно вопросов по выбранным критериям. Уменьшите фильтры.'); return; }
  pool = shuffle(pool).slice(0, Math.min(num, pool.length));
  quizQuestions = pool;
  quizIdx = 0;
  quizScore = 0;
  document.getElementById('quiz-setup').style.display='none';
  document.getElementById('quiz-active').style.display='block';
  document.getElementById('quiz-score-end').classList.remove('visible');
  showQuestion();
}

function shuffle(arr) { return [...arr].sort(()=>Math.random()-0.5); }

function showQuestion() {
  const q = quizQuestions[quizIdx];
  const total = quizQuestions.length;
  document.getElementById('quiz-counter').textContent = `Вопрос ${quizIdx+1} из ${total}`;
  document.getElementById('quiz-score-live').textContent = `✓ ${quizScore}`;
  document.getElementById('quiz-progress').style.width = (quizIdx/total*100)+'%';
  document.getElementById('quiz-q-num').textContent = `Вопрос ${q.id} · ${q.cat}`;
  document.getElementById('quiz-q-text').textContent = q.q;
  const opts = document.getElementById('quiz-options');
  opts.innerHTML = '';
  const correct = q.opts[0];
  const shuffled = shuffle(q.opts);
  shuffled.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'quiz-opt';
    btn.textContent = opt;
    btn.onclick = () => answerQuestion(opt, correct, q.short);
    opts.appendChild(btn);
  });
  document.getElementById('quiz-explanation').classList.remove('open');
  document.getElementById('quiz-explanation').textContent = '';
  document.getElementById('quiz-next').classList.remove('visible');
}

function answerQuestion(chosen, correct, explanation) {
  const btns = document.querySelectorAll('.quiz-opt');
  btns.forEach(b => {
    b.disabled = true;
    if(b.textContent === correct) b.classList.add('correct');
    else if(b.textContent === chosen && chosen !== correct) b.classList.add('wrong');
  });
  if(chosen === correct) quizScore++;
  document.getElementById('quiz-score-live').textContent = `✓ ${quizScore}`;
  const exp = document.getElementById('quiz-explanation');
  exp.textContent = chosen === correct ? '✓ Верно! ' + explanation : '✗ Неверно. ' + explanation;
  exp.classList.add('open');
  document.getElementById('quiz-next').classList.add('visible');
}

function nextQuestion() {
  quizIdx++;
  if(quizIdx >= quizQuestions.length) { endQuiz(); return; }
  showQuestion();
}

function endQuiz() {
  document.getElementById('quiz-active').style.display='none';
  const score = document.getElementById('quiz-score-end');
  const total = quizQuestions.length;
  const pct = total > 0 ? Math.round(quizScore/total*100) : 0;
  document.getElementById('score-num').textContent = `${quizScore} / ${total}`;
  const emoji = pct>=80?'🏆':pct>=60?'👍':pct>=40?'📚':'💪';
  const comment = pct>=80?'Отличный результат! Продолжай в том же духе.':pct>=60?'Хороший результат, но есть что повторить.':pct>=40?'Неплохо, но нужно больше практики.':'Повтори материал и попробуй снова!';
  document.getElementById('score-emoji').textContent = emoji;
  document.getElementById('score-comment').textContent = comment;
  score.classList.add('visible');
}

function resetQuiz() {
  document.getElementById('quiz-score-end').classList.remove('visible');
  document.getElementById('quiz-setup').style.display='block';
  document.getElementById('quiz-active').style.display='none';
}

// INIT
renderCards(QUESTIONS);
updateStats();
</script>
</body>
</html>
