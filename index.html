<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Доклиническая реставрационная стоматология — Флэшкарты</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0e11;
    --surface: #1a1820;
    --surface2: #221f2b;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --accent: #c8a96e;
    --accent2: #e8c98e;
    --text: #f0ece4;
    --text2: #a09890;
    --text3: #6a6260;
    --green: #5cba8a;
    --red: #e0605a;
    --blue: #5b9cf6;
    --radius: 14px;
    --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Lora', Georgia, serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.7;
  }

  /* HEADER */
  .header {
    padding: 2rem 2rem 1rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 1rem;
  }
  .header-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.3rem, 3vw, 1.9rem);
    font-weight: 700;
    color: var(--accent2);
    line-height: 1.2;
  }
  .header-sub {
    font-size: 0.85rem;
    color: var(--text3);
    margin-top: 0.3rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .stats-row {
    display: flex;
    gap: 1.5rem;
    font-size: 0.82rem;
    color: var(--text2);
  }
  .stat { text-align: center; }
  .stat strong { display: block; font-size: 1.4rem; font-family: 'Playfair Display', serif; color: var(--accent); font-weight: 500; }

  /* NAV */
  .nav {
    display: flex;
    gap: 0.5rem;
    padding: 1rem 2rem;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    position: sticky;
    top: 0;
    z-index: 100;
    flex-wrap: wrap;
  }
  .nav-btn {
    padding: 0.45rem 1.1rem;
    border-radius: 100px;
    border: 1px solid var(--border2);
    background: transparent;
    color: var(--text2);
    cursor: pointer;
    font-family: 'Lora', serif;
    font-size: 0.88rem;
    transition: all 0.2s;
  }
  .nav-btn:hover { border-color: var(--accent); color: var(--accent); }
  .nav-btn.active { background: var(--accent); border-color: var(--accent); color: #1a1408; font-weight: 500; }

  /* SECTIONS */
  .section { display: none; }
  .section.visible { display: block; }

  /* SEARCH + FILTER */
  .toolbar {
    padding: 1rem 2rem;
    display: flex;
    gap: 1rem;
    align-items: center;
    flex-wrap: wrap;
    border-bottom: 1px solid var(--border);
  }
  .search-wrap { position: relative; flex: 1; min-width: 200px; }
  .search-wrap svg { position: absolute; left: 0.8rem; top: 50%; transform: translateY(-50%); opacity: 0.4; }
  #search {
    width: 100%;
    padding: 0.55rem 0.8rem 0.55rem 2.4rem;
    border-radius: 100px;
    border: 1px solid var(--border2);
    background: var(--surface);
    color: var(--text);
    font-family: 'Lora', serif;
    font-size: 0.9rem;
    outline: none;
  }
  #search:focus { border-color: var(--accent); }
  .filter-select {
    padding: 0.55rem 1rem;
    border-radius: 100px;
    border: 1px solid var(--border2);
    background: var(--surface);
    color: var(--text2);
    font-family: 'Lora', serif;
    font-size: 0.88rem;
    cursor: pointer;
    outline: none;
  }

  /* FLASHCARD GRID */
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 1.2rem;
    padding: 1.5rem 2rem;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    cursor: pointer;
    transition: border-color 0.2s, transform 0.15s;
    position: relative;
  }
  .card:hover { border-color: var(--border2); transform: translateY(-2px); }
  .card.learned { border-color: var(--green) !important; }
  .card.learned::after {
    content: '✓';
    position: absolute;
    top: 0.7rem;
    right: 0.9rem;
    color: var(--green);
    font-size: 1rem;
  }
  .card-num {
    font-size: 0.72rem;
    color: var(--text3);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 1rem 1.2rem 0.4rem;
  }
  .card-q {
    padding: 0 1.2rem 1.1rem;
    font-size: 0.93rem;
    color: var(--text);
    font-style: italic;
    line-height: 1.5;
  }
  .card-divider {
    height: 1px;
    background: var(--border);
    margin: 0 1.2rem;
  }
  .card-answer-short {
    padding: 0.9rem 1.2rem;
    font-size: 0.87rem;
    color: var(--accent);
    line-height: 1.5;
  }
  .card-expand {
    padding: 0 1.2rem 0.7rem;
    font-size: 0.82rem;
    color: var(--text3);
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }
  .expand-btn {
    background: none;
    border: none;
    color: var(--text3);
    cursor: pointer;
    font-family: 'Lora', serif;
    font-size: 0.82rem;
    padding: 0;
    display: flex;
    align-items: center;
    gap: 0.3rem;
    transition: color 0.2s;
  }
  .expand-btn:hover { color: var(--accent); }
  .card-full {
    display: none;
    padding: 0 1.2rem 1.2rem;
    font-size: 0.87rem;
    color: var(--text2);
    line-height: 1.7;
    border-top: 1px solid var(--border);
    margin-top: 0.3rem;
  }
  .card-full.open { display: block; }
  .card-actions {
    padding: 0 1.2rem 1rem;
    display: flex;
    gap: 0.5rem;
  }
  .tag-learned {
    font-size: 0.75rem;
    padding: 0.25rem 0.75rem;
    border-radius: 100px;
    border: 1px solid var(--border2);
    background: transparent;
    color: var(--text3);
    cursor: pointer;
    font-family: 'Lora', serif;
    transition: all 0.2s;
  }
  .tag-learned:hover { border-color: var(--green); color: var(--green); }
  .card.learned .tag-learned { background: var(--green); color: #0a2e1e; border-color: var(--green); }

  /* LOADING state */
  .loading-card {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    color: var(--text3);
    font-size: 0.85rem;
    gap: 0.5rem;
  }
  .spinner {
    width: 16px; height: 16px;
    border: 2px solid var(--border2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* QUIZ SECTION */
  .quiz-container {
    max-width: 680px;
    margin: 0 auto;
    padding: 2rem;
  }
  .quiz-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 2rem;
    flex-wrap: wrap;
    gap: 1rem;
  }
  .quiz-progress-bar {
    width: 100%;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    margin-bottom: 2rem;
    overflow: hidden;
  }
  .quiz-progress-fill {
    height: 100%;
    background: var(--accent);
    transition: width 0.4s;
  }
  .quiz-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 2rem;
    margin-bottom: 1.5rem;
  }
  .quiz-q-num { font-size: 0.75rem; color: var(--text3); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 0.7rem; }
  .quiz-q-text { font-size: 1.05rem; font-style: italic; color: var(--text); margin-bottom: 1.5rem; line-height: 1.6; }
  .quiz-options { display: flex; flex-direction: column; gap: 0.75rem; }
  .quiz-opt {
    padding: 0.85rem 1.1rem;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border2);
    background: var(--surface2);
    color: var(--text2);
    cursor: pointer;
    font-family: 'Lora', serif;
    font-size: 0.9rem;
    text-align: left;
    transition: all 0.2s;
    line-height: 1.5;
  }
  .quiz-opt:hover:not(:disabled) { border-color: var(--accent); color: var(--text); }
  .quiz-opt.correct { border-color: var(--green); background: rgba(92,186,138,0.1); color: var(--green); }
  .quiz-opt.wrong { border-color: var(--red); background: rgba(224,96,90,0.1); color: var(--red); }
  .quiz-opt:disabled { cursor: default; }
  .quiz-explanation {
    display: none;
    margin-top: 1.2rem;
    padding: 1rem;
    border-radius: var(--radius-sm);
    background: var(--surface2);
    border: 1px solid var(--border);
    font-size: 0.88rem;
    color: var(--text2);
    line-height: 1.7;
  }
  .quiz-explanation.open { display: block; }
  .quiz-next-btn {
    display: none;
    margin-top: 1.2rem;
    padding: 0.7rem 1.8rem;
    border-radius: 100px;
    border: none;
    background: var(--accent);
    color: #1a1408;
    cursor: pointer;
    font-family: 'Lora', serif;
    font-size: 0.95rem;
    font-weight: 500;
  }
  .quiz-next-btn.visible { display: inline-block; }
  .quiz-score {
    display: none;
    text-align: center;
    padding: 3rem 2rem;
  }
  .quiz-score.visible { display: block; }
  .score-num { font-family: 'Playfair Display', serif; font-size: 4rem; color: var(--accent); }
  .score-label { font-size: 1rem; color: var(--text2); margin-top: 0.5rem; }
  .score-emoji { font-size: 2.5rem; margin: 1rem 0; }
  .quiz-settings {
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
    margin-bottom: 1.5rem;
    align-items: center;
  }
  .quiz-settings label { font-size: 0.88rem; color: var(--text2); display: flex; align-items: center; gap: 0.5rem; }
  .quiz-settings select, .quiz-settings input[type=number] {
    padding: 0.4rem 0.8rem;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border2);
    background: var(--surface);
    color: var(--text);
    font-family: 'Lora', serif;
    font-size: 0.85rem;
  }
  .start-quiz-btn {
    padding: 0.75rem 2rem;
    border-radius: 100px;
    border: none;
    background: var(--accent);
    color: #1a1408;
    cursor: pointer;
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 0.03em;
    transition: opacity 0.2s;
  }
  .start-quiz-btn:hover { opacity: 0.9; }
  .quiz-setup { display: block; }
  .quiz-active { display: none; }

  /* CATEGORY tags */
  .cat-tag {
    display: inline-block;
    font-size: 0.7rem;
    padding: 0.15rem 0.6rem;
    border-radius: 100px;
    background: var(--surface2);
    color: var(--text3);
    border: 1px solid var(--border);
    margin: 0.2rem 1.2rem 0.5rem;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  @media (max-width: 600px) {
    .cards-grid { grid-template-columns: 1fr; padding: 1rem; }
    .header { padding: 1.2rem 1rem 0.8rem; }
    .nav, .toolbar { padding: 0.7rem 1rem; }
    .quiz-container { padding: 1rem; }
  }

  .no-results {
    grid-column: 1/-1;
    text-align: center;
    padding: 3rem;
    color: var(--text3);
    font-style: italic;
  }

  /* AI generating indicator */
  .ai-generating {
    font-size: 0.78rem;
    color: var(--text3);
    padding: 0.5rem 1.2rem 1rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-title">Доклиническая реставрационная<br>стоматология</div>
    <div class="header-sub">Флэшкарты для подготовки к экзамену · 2025–2026</div>
  </div>
  <div class="stats-row">
    <div class="stat"><strong id="total-count">75</strong>вопросов</div>
    <div class="stat"><strong id="learned-count">0</strong>изучено</div>
    <div class="stat"><strong id="pct-count">0%</strong>прогресс</div>
  </div>
</div>

<div class="nav">
  <button class="nav-btn active" onclick="showSection('flashcards', this)">Флэшкарты</button>
  <button class="nav-btn" onclick="showSection('quiz', this)">Тест / Квиз</button>
</div>

<!-- FLASHCARDS SECTION -->
<div class="section visible" id="section-flashcards">
  <div class="toolbar">
    <div class="search-wrap">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="search" placeholder="Поиск по вопросам..." oninput="filterCards()">
    </div>
    <select class="filter-select" id="cat-filter" onchange="filterCards()">
      <option value="">Все темы</option>
      <option value="Оборудование">Оборудование</option>
      <option value="Препарирование">Препарирование</option>
      <option value="Кариес">Кариес и классы по Блеку</option>
      <option value="Минимально">Минимально-инвазивные</option>
      <option value="Материалы">Пломбировочные материалы</option>
      <option value="Цементы">Цементы</option>
      <option value="Композиты">Композиты</option>
      <option value="Адгезивные">Адгезивные системы</option>
      <option value="Техники">Техники пломбирования</option>
      <option value="Анатомия">Анатомия зубов</option>
      <option value="Практика">Практические навыки</option>
    </select>
    <select class="filter-select" id="status-filter" onchange="filterCards()">
      <option value="">Все карточки</option>
      <option value="new">Не изучено</option>
      <option value="learned">Изучено</option>
    </select>
  </div>
  <div class="cards-grid" id="cards-grid"></div>
</div>

<!-- QUIZ SECTION -->
<div class="section" id="section-quiz">
  <div class="quiz-container">
    <div class="quiz-setup" id="quiz-setup">
      <h2 style="font-family:'Playfair Display',serif;font-size:1.5rem;margin-bottom:0.5rem;color:var(--accent2)">Режим теста</h2>
      <p style="color:var(--text2);margin-bottom:1.5rem;font-size:0.92rem">Выберите параметры и начните самопроверку</p>
      <div class="quiz-settings">
        <label>Тема:
          <select id="quiz-cat">
            <option value="">Все темы</option>
            <option value="Оборудование">Оборудование</option>
            <option value="Препарирование">Препарирование</option>
            <option value="Кариес">Кариес и классы по Блеку</option>
            <option value="Минимально">Минимально-инвазивные</option>
            <option value="Материалы">Пломбировочные материалы</option>
            <option value="Цементы">Цементы</option>
            <option value="Композиты">Композиты</option>
            <option value="Адгезивные">Адгезивные системы</option>
            <option value="Техники">Техники пломбирования</option>
            <option value="Анатомия">Анатомия зубов</option>
            <option value="Практика">Практические навыки</option>
          </select>
        </label>
        <label>Вопросов:
          <input type="number" id="quiz-num" value="10" min="3" max="75" style="width:70px">
        </label>
        <label>
          <input type="checkbox" id="quiz-learned-only"> Только изученные
        </label>
      </div>
      <button class="start-quiz-btn" onclick="startQuiz()">Начать тест →</button>
    </div>

    <div class="quiz-active" id="quiz-active">
      <div class="quiz-header">
        <span style="font-size:0.85rem;color:var(--text3)" id="quiz-counter">Вопрос 1 из 10</span>
        <span style="font-size:0.85rem;color:var(--green)" id="quiz-score-live">✓ 0</span>
        <button onclick="endQuiz()" style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:0.82rem;font-family:'Lora',serif">Завершить</button>
      </div>
      <div class="quiz-progress-bar"><div class="quiz-progress-fill" id="quiz-progress"></div></div>
      <div class="quiz-card">
        <div class="quiz-q-num" id="quiz-q-num"></div>
        <div class="quiz-q-text" id="quiz-q-text"></div>
        <div class="quiz-options" id="quiz-options"></div>
        <div class="quiz-explanation" id="quiz-explanation"></div>
        <button class="quiz-next-btn" id="quiz-next" onclick="nextQuestion()">Следующий →</button>
      </div>
    </div>

    <div class="quiz-score" id="quiz-score-end">
      <div class="score-num" id="score-num"></div>
      <div class="score-label">правильных ответов</div>
      <div class="score-emoji" id="score-emoji"></div>
      <p style="color:var(--text2);margin-bottom:1.5rem" id="score-comment"></p>
      <button class="start-quiz-btn" onclick="resetQuiz()">Пройти ещё раз</button>
    </div>
  </div>
</div>

<script>
const QUESTIONS = [
  { id:1, cat:"Оборудование", q:"Эргономика в стоматологии. Этика и деонтология. Оснащение кабинета терапевта-стоматолога.", short:"Эргономика — наука о правильной организации рабочего места врача. Кабинет: стоматологическая установка, кресло, освещение, инструментарий, вытяжка.", full:"Эргономика изучает оптимальную организацию рабочего пространства для снижения нагрузки на врача. Рабочая зона делится на 4 зоны по часовой стрелке (12–3–6–9 часов). Кабинет терапевта включает: стоматологическую установку, стул врача и ассистента, операционный светильник, рабочий столик, плевательницу, блок воздух/вода/пылесос. Этика — принципы профессионального поведения (уважение, честность, конфиденциальность). Деонтология — учение о долге врача: не навредить, информированное согласие, тайна пациента. Площадь кабинета ≥14 м² на одно кресло, +7 м² на каждое дополнительное.", opts:["Наука об оптимальной организации рабочей среды","Изучение болезней зубов","Методы анестезии","Классификация инструментов"] },
  { id:2, cat:"Оборудование", q:"Стоматологические установки. Группы, составные блоки, требования к ним.", short:"Установки делятся на приставные и собственные. Блоки: стул пациента, блок врача (наконечники, вода, воздух, пылесос), осветитель, плевательница.", full:"Стоматологические установки классифицируются по расположению инструментального блока: (1) «Европейский тип» — блок справа от пациента; (2) «Американский тип» — блок на кронштейне над пациентом; (3) Комбинированный. Основные составные части: стоматологическое кресло (с регулировкой высоты, спинки, подголовника); осветитель (бестеневой, светодиодный); инструментальный блок (держатели для 3–5 наконечников, тройник-шприц, пылесос, слюноотсос); плевательница; педальный блок управления. Требования: надёжность, гигиеничность (возможность дезинфекции), эргономичность, соответствие санитарным нормам.", opts:["Кресло, осветитель, инструментальный блок, плевательница","Только бормашина и кресло","Автоклав и дистиллятор","Рентгенаппарат и компрессор"] },
  { id:3, cat:"Оборудование", q:"Виды стоматологических наконечников. Строение турбинных и микромоторных наконечников.", short:"Наконечники: турбинные (высокоскоростные, воздушная турбина, 300–500 тыс. об/мин) и микромоторные (угловые и прямые, 40–80 тыс. об/мин). Турбинные — для препарирования, микромоторные — для финирования.", full:"Наконечники делятся на: (1) Турбинные — привод от сжатого воздуха, скорость 250 000–500 000 об/мин. Состав: корпус, воздушная турбина (ротор с лопастями), патрон для фиксации бора (кнопочный или цанговый), каналы водяного охлаждения. (2) Угловые микромоторные — скорость 800–40 000 об/мин, подключаются к электрическому микромотору. Для полирования, финирования, нанесения материалов. (3) Прямые микромоторные — для лабораторных работ. (4) Наконечники для повышенной скорости (Contra-angle). Турбинные — только для бёров типа FG; микромоторные — для RA и CA боров.", opts:["Турбинные (воздушные) и микромоторные (электрические)","Механические и ультразвуковые","Лазерные и воздушно-абразивные","Карбидные и алмазные"] },
  { id:4, cat:"Оборудование", q:"Группы инструментов в терапевтической стоматологии. Характеристика каждой группы и функции.", short:"5 групп: осмотровые (зеркало, зонд, пинцет), для препарирования (боры), для медобработки, для замешивания, для пломбирования (штопферы, гладилки).", full:"Группы инструментов: (1) Диагностические/осмотровые: зеркало (осмотр), зонд (определение глубины, кариеса), пинцет (перенос ватных шариков), экскаватор (удаление размягчённого дентина). (2) Для препарирования: боры (шаровидные, фиссурные, конические, обратноконические), дисковые сепарационные пилки. (3) Для медикаментозной обработки: ватные валики, шарики, одноразовые кисти, ватные турунды. (4) Для замешивания пломбировочных материалов: стеклянная пластинка, бумажный блок, металлические и пластиковые шпатели. (5) Для пломбирования: штопфер (конденсация), гладилка (выравнивание поверхности), матрицедержатель, матрицы, клинья, зонд.", opts:["Диагностические, препаровочные, обработочные, замесочные, пломбировочные","Только боры и зеркала","Лазерные, механические, химические","Ручные и машинные"] },
  { id:5, cat:"Оборудование", q:"Инструменты для осмотра, замешивания и наложения пломб — описание и составные части.", short:"Осмотр: зеркало (ручка+головка), зонд (ручка+рабочая часть), пинцет. Замешивание: шпатель+блок. Наложение: штопфер, гладилка.", full:"Инструменты для осмотра: Зеркало — ручка (сталь) + головка с зеркальной поверхностью; позволяет осмотреть труднодоступные участки, направить свет. Зонд — ручка + рабочий конец (прямой или изогнутый под 45°); определяет кариозные полости, болезненность, плотность дентина. Пинцет — две бранши с захватным кончиком; для перемещения мелких объектов. Для замешивания: металлический шпатель (гибкий) + стеклянная пластинка или бумажный блок. Для наложения пломб: Штопфер — ручка + рабочая часть (сферическая или плоская); конденсация и уплотнение материала в полости. Гладилка — ручка + рабочий конец (плоская пластинка); сглаживание поверхности пломбы. Экскаватор — двусторонний инструмент с ложкообразной частью; удаление размягчённого дентина.", opts:["Зеркало, зонд, пинцет; шпатель+блок; штопфер, гладилка","Только боры и шпатели","Фотополимеризатор и ретрактор","Матрица и клин"] },
  { id:6, cat:"Оборудование", q:"Классификация боров. Цветовая кодировка алмазных боров. Зернистость (мкм). Инструменты для полировки.", short:"Боры: по форме (шаровидные, фиссурные, конические) и материалу (карбид вольфрама, алмаз). Алмазы: чёрный (160мкм грубый), зелёный (107 мкм), синий (64 мкм стандарт), красный (25 мкм финир), жёлтый (8 мкм полир).", full:"Классификация боров: По форме: шаровидный, фиссурный (прямой/конический), обратноконический, пламевидный, грушевидный. По материалу: карбид-вольфрамовые (режущая эффективность) и алмазные (истирание эмали). По хвостовику: FG (турбинный, длинный), RA (угловой), CA (прямой). Цветовая кодировка алмазных боров по ISO: чёрный — суперкрупнозернистый (>150 мкм); зелёный — крупнозернистый (107 мкм); синий — стандартный (64 мкм, основное препарирование); красный — мелкозернистый (25 мкм, финирование); жёлтый — сверхмелкий (8 мкм, полировка). Для финальной полировки: полировочные диски (Soflex, OptiDisc), полировочные насадки (резиновые), пасты (Prisma Gloss, Enhance), специальные щёточки.", opts:["По форме и материалу; кодировка по зернистости от чёрного (грубый) до жёлтого (полировка)","Все боры одинаковы","Кодировка по производителю","Боры не классифицируются"] },
  { id:7, cat:"Препарирование", q:"Способы препарирования твёрдых тканей зубов. Особенности и показания к применению.", short:"Основные способы: механическое (боры), химическое (Carisolv), воздушно-абразивное, ультразвуковое, лазерное. Стандарт — механическое.", full:"Способы препарирования: (1) Механическое — наконечник с борами. Наиболее распространённое, точное, применяется для всех классов полостей. (2) Химическое (хемомеханическое) — раствор Carisolv (гипохлорит натрия + аминокислоты) размягчает некротизированный дентин, удаляемый экскаватором. Показание: начальный/средний кариес у детей, при непереносимости шума. (3) Воздушно-абразивное (Air-abrasion) — поток оксида алюминия под давлением. Показание: минимальные полости, фиссуры, без анестезии. (4) Ультразвуковое — вибрация наконечника с водяным охлаждением. Точность, минимальная инвазивность. (5) Лазерное (Er:YAG) — поглощение воды в твёрдых тканях. Минимальная боль, без вибрации, высокая стоимость.", opts:["Механическое, химическое, воздушно-абразивное, ультразвуковое, лазерное","Только механическое","Только химическое и лазерное","Механическое и электрическое"] },
  { id:8, cat:"Препарирование", q:"Изоляция твёрдых тканей зубов от ротовой жидкости. Абсолютные и относительные методы.", short:"Абсолютный — коффердам (латексный платок + кламп). Относительный — ватные валики + слюноотсос + ретракторы.", full:"Изоляция необходима для качественного пломбирования, т.к. влага нарушает адгезию. Абсолютный метод — коффердам: латексный лист (или безлатексный Rubber Dam), перфорируется и натягивается на зуб с помощью металлического кламмера и рамки. Преимущества: полная изоляция, защита дыхательных путей, удобство врача. Недостатки: время, аллергия на латекс, страх пациента. Другой абсолютный метод — OptraDam, Isolite. Относительный метод — ватные валики (вестибулярно и лингвально), слюноотсос, слюновпитывающие прокладки, Dry Dam (безрамочный барьер), ретракционная нить. Применяется при невозможности использования коффердама (глубокий прикус, нарушения дыхания).", opts:["Абсолютный — коффердам; относительный — ватные валики + слюноотсос","Только ватные тампоны","Только коффердам","Воздушная сушка — единственный метод"] },
  { id:9, cat:"Препарирование", q:"Этапы препарирования кариозных полостей. Раскрытие и расширение. Принцип «профилактического расширения».", short:"Этапы: раскрытие → расширение → некрэктомия → формирование → финирование. Профилактическое расширение — удаление фиссур и ямок в зоне риска для предупреждения рецидива.", full:"Этапы препарирования: (1) Раскрытие — вскрытие кариозной полости, удаление нависающих краёв эмали. (2) Расширение — расширение полости до устойчивых тканей. Принцип «профилактического расширения» (Блек): полость расширяется в зоны самоочищения и за пределы зон ретенции (фиссур, ямок), даже если они не поражены. Цель — предупреждение рецидива кариеса. Актуален при использовании неадгезивных материалов (амальгама, цементы). При использовании адгезивных материалов (композиты) принцип минимальной инвазии важнее. (3) Некрэктомия — удаление размягчённого дентина. (4) Формирование — придание полости оптимальной геометрии. (5) Финирование — обработка краёв эмали.", opts:["Удаление нависающих краёв + расширение за пределы кариозных зон для профилактики рецидива","Удаление только кариозных тканей","Расширение до дентиноэмалевого соединения","Сошлифовывание эмали по всей поверхности"] },
  { id:10, cat:"Препарирование", q:"Этапы препарирования. Раскрытие и расширение. Принцип расширения по Лукомскому.", short:"По Лукомскому расширение проводится только в пределах поражённых тканей — «биологической целесообразности». Здоровые ткани не удаляются.", full:"Принцип расширения по Лукомскому — альтернатива «профилактическому расширению» Блека. Суть: препарирование только в пределах реально поражённых тканей, без иссечения здоровой эмали и дентина. Обоснование: сохранение максимального количества здоровых тканей укрепляет зуб и уменьшает риск осложнений. Применяется: при использовании адгезивных пломбировочных материалов (композиты, СИЦ), которые не требуют механической ретенции. Принцип биологической целесообразности: достаточно удалить инфицированные и размягчённые ткани, оставив пигментированный, но плотный дентин. Актуальная концепция в современной минимально-инвазивной стоматологии.", opts:["Препарирование только в пределах поражённых тканей без удаления здоровых","Расширение за пределы кариозной зоны","Удаление всего дентина до эмали","Полное иссечение коронки"] },
  { id:11, cat:"Препарирование", q:"Этапы препарирования. Правила некрэктомии. Методы оценки качества некрэктомии.", short:"Некрэктомия — удаление некротизированного дентина шаровидными борами на малой скорости или экскаватором. Контроль: зондирование, кариес-детектор (красный краситель).", full:"Некрэктомия — третий этап препарирования, удаление инфицированного размягчённого дентина. Правила: применяют шаровидные боры малого размера на низкой скорости (угловой наконечник, 800–3000 об/мин) или острый экскаватор. Движения — от стенок к центру, не давить на пульпу. Удаляют весь мягкий дентин, плотный пигментированный — по ситуации. Методы оценки качества: (1) Зондирование — плотный дентин не поддаётся, характерный звук. (2) Кариес-детектор (Caries Detector, Snoop) — красный краситель на основе кислого фуксина окрашивает только инфицированный дентин, оставляя здоровый неокрашенным. (3) Флуоресцентная диагностика (DIAGNOdent). (4) Визуальная оценка: дентин должен быть плотным, жёлтым или светло-коричневым.", opts:["Шаровидные боры / экскаватор; контроль — кариес-детектор и зондирование","Только турбинные наконечники","Оценка только по цвету","Некрэктомия не проводится"] },
  { id:12, cat:"Препарирование", q:"Этапы препарирования. Цель и правила формирования и финирования краёв кариозной полости.", short:"Формирование — придание полости геометрии для ретенции пломбы. Финирование — обработка краёв эмели мелкозернистыми борами для герметичного прилегания.", full:"Формирование полости — 4-й этап. Цель: придать полости форму, обеспечивающую ретенцию и резистентность пломбы. Правила: дно полости должно быть плоским или повторять контур пульповой камеры; стенки — перпендикулярны дну (для неадгезивных) или расходятся (для адгезивных); углы — прямые или закруглённые. Финирование — 5-й этап, обработка краёв полости. Цель: удалить ослабленные призмы эмали на краях полости, создать правильный угол скоса (фальц). При использовании амальгамы — угол 90° (без скоса). При использовании композита — скос 45° увеличивает площадь адгезии. Инструменты: мелкозернистые алмазные боры (красная и жёлтая кодировка), финиры, штрипсы.", opts:["Формирование — геометрия полости; финирование — обработка краёв эмали для герметичности","Это один и тот же этап","Финирование проводится до некрэктомии","Формирование не обязательно"] },
  { id:13, cat:"Препарирование", q:"Какие боры используются при каждом этапе препарирования? Требования к сформированной полости.", short:"Раскрытие — шаровидный/фиссурный, Расширение — фиссурный, Некрэктомия — шаровидный низкая скорость, Формирование — фиссурный, Финирование — алмазный красный/жёлтый, финир.", full:"Этапы и инструменты: (1) Раскрытие: шаровидный алмазный бор (синяя кодировка) — вскрытие полости. (2) Расширение: фиссурный/конический алмазный или карбид-вольфрамовый бор. (3) Некрэктомия: шаровидный карбид-вольфрамовый бор малого размера на малой скорости или экскаватор. (4) Формирование: фиссурный бор с плоским концом, при необходимости обратноконический. (5) Финирование: мелкозернистый алмазный бор (красный/жёлтый), карбид-вольфрамовый финир (12 граней), штрипсы для контактных поверхностей. Требования к сформированной полости: края в пределах здоровых тканей; достаточная глубина (не менее 1–1,5 мм); правильный угол краёв; отсутствие нависающих краёв эмали; соответствие форме выбранного пломбировочного материала.", opts:["Шаровидный→фиссурный→шаровидный мед.скорость→фиссурный→алмазный финир","Только один тип бора для всех этапов","Финирование проводится алмазным чёрным бором","Боры не меняются"] },
  { id:14, cat:"Кариес", q:"Понятие о кариесе. Классификации кариозных полостей по локализации, по ВОЗ.", short:"Кариес — инфекционно-обусловленный патологический процесс деминерализации и разрушения тв. тканей. По Блеку: I–VI классы. По ВОЗ: начальный (К02.0), поверхностный (К02.1), средний (К02.2), глубокий (К02.3).", full:"Кариес зубов — патологический процесс, возникающий после прорезывания зубов, при котором происходит деминерализация и разрушение твёрдых тканей под действием органических кислот, вырабатываемых микроорганизмами зубного налёта. Классификация по ВОЗ (МКБ-10): К02.0 — эмалевый кариес (начальный, «белое пятно»); К02.1 — кариес дентина (поверхностный и средний); К02.2 — кариес цемента; К02.3 — приостановившийся кариес; К02.4 — одонтоклазия. Классификация по локализации (Блек): I класс — фиссуры и ямки жевательных зубов; II — контактные поверхности боковых зубов; III — контактные поверхности передних зубов без угла; IV — контактные поверхности передних зубов с углом; V — пришеечная область; VI — режущий край/бугры.", opts:["Деструкция тв. тканей под действием кислот; классы I–VI по Блеку и К02.0–К02.4 по ВОЗ","Воспаление пульпы","Эрозия от химических веществ","Механическое стирание"] },
  { id:15, cat:"Кариес", q:"Принципы препарирования и пломбирования кариозных полостей I класса по Блеку.", short:"I класс — фиссуры и ямки жевательных зубов. Форма полости: ящикообразная, плоское дно. Пломбируют композитом (слоёная техника) или амальгамой.", full:"I класс по Блеку — полости в фиссурах и слепых ямках жевательной поверхности моляров, премоляров, а также язычной поверхности передних зубов (ямка). Принципы препарирования: полость расширяется по всей длине фиссуры (профилактическое расширение при амальгаме) или минимально (при композите); форма ящикообразная с плоским дном и вертикальными стенками; дно параллельно жевательной поверхности; минимальная глубина 1,5 мм. Принципы пломбирования: при использовании амальгамы — конденсация, без адгезива; при использовании композита — тотальное кислотное протравливание + адгезив + слоёная техника (горизонтальные слои ≤2 мм); при СИЦ — возможно без протравливания, самоадгезия. Матрица при I классе не нужна.", opts:["Ящикообразная форма, плоское дно; пломбируют послойно композитом или амальгамой","Полукруглая форма без ограничений","Только временные пломбы","Удаление зуба"] },
  { id:16, cat:"Кариес", q:"Принципы препарирования и пломбирования кариозных полостей II класса по Блеку.", short:"II класс — контактные поверхности боковых зубов (+ жевательная). Препарируют с жевательной поверхности, «ласточкин хвост». Обязательна матрица, контактный пункт восстанавливается.", full:"II класс — кариес апроксимальных (контактных) поверхностей моляров и премоляров. Доступ — через жевательную поверхность. Форма полости: «ящик» на контактной поверхности + площадка на жевательной («ласточкин хвост» для ретенции при амальгаме, при адгезивных — необязателен). Глубина ящика до десны — не менее 0,5 мм ниже дентиноэмалевой границы. Принципы пломбирования: обязательно использование матрицы (Tofflemire, секционная матрица) и деревянных клиньев для восстановления контактного пункта и предотвращения затёка материала. При композите: протравливание, адгезив, послойное наполнение. Контактный пункт проверяется флоссом. Важно: правильная анатомия контактного пункта — защита межзубного сосочка.", opts:["Через жевательную поверхность, матрица + клин, восстановление контактного пункта","Прямой доступ через десну","Без матрицы, открытый метод","Только удаление зуба"] },
  { id:17, cat:"Кариес", q:"Принципы препарирования и пломбирования кариозных полостей III класса по Блеку.", short:"III класс — контактная поверхность передних зубов без угла. Доступ чаще с нёбной стороны. Эстетическая реставрация композитом, сохранение губной стенки.", full:"III класс — кариес апроксимальных поверхностей резцов и клыков без поражения угла коронки. Особенности: высокие эстетические требования. Доступ: с нёбной поверхности (если губная стенка цела) — сохраняется эмаль с губной стороны; с губной — если поражение распространилось. Форма полости: треугольная или овальная; при адгезивных материалах — минимальная. Финирование: скос эмели с губной стороны 45° (увеличивает площадь адгезии и маскирует переход). Пломбирование: прозрачная или металлическая матрица + клин; послойное нанесение дентинного (более тёмного, опакового) и эмалевого (прозрачного) оттенков композита. Подбор цвета по шкале Vita — в условиях естественного освещения до нанесения коффердама.", opts:["Нёбный доступ при сохранной губной стенке; послойный композит с подбором цвета","Удаление с губной стороны всегда","Только амальгама","Нет особенностей"] },
  { id:18, cat:"Кариес", q:"Принципы препарирования и пломбирования кариозных полостей IV класса по Блеку.", short:"IV класс — контактная поверхность передних зубов с поражением угла. Восстановление угла послойным опак+эмаль композитом. Высокие эстетические и функциональные требования.", full:"IV класс — кариес или перелом резцов с поражением угла режущего края. Наиболее сложный в эстетическом отношении класс. Особенности препарирования: скос эмали 45° по всему периметру и особенно по режущему краю (длина скоса 2–3 мм); это маскирует линию соединения пломбы и зуба и увеличивает площадь адгезии. Пломбирование: применяется технология силиконового ключа (wax-up + силиконовый шаблон для воспроизведения нёбной поверхности), послойная техника: нёбная стенка → дентинный слой → мамелоны → эмалевый слой → прозрачный слой. Используется несколько оттенков (дентинный опак + эмалевый прозрачный). Для больших дефектов — штифт для ретенции. Полировка — ключ к успеху.", opts:["Скос 45° по периметру, послойная техника с силиконовым ключом, несколько оттенков","Только один оттенок, без скоса","Коронковая реставрация всегда","Только при потере зуба"] },
  { id:19, cat:"Кариес", q:"Принципы препарирования и пломбирования кариозных полостей V класса по Блеку.", short:"V класс — пришеечная область. Форма полосатая/овальная. Сложность: близость пульпы, доступ, влажность. Пломбируют СИЦ или компомером.", full:"V класс — кариес пришеечной (гингивальной) области всех групп зубов, включая кариес корня. Особенности: расположение вблизи пульпы (истончение дентина); сложность изоляции (близость десны, кровотечение); риск перфорации. Форма полости: овальная с закруглёнными углами; дно — параллельно поверхности зуба; десневая стенка ≤1 мм ниже десны. Изоляция: ретракционная нить, ретракция десны, коффердам. Пломбирование: при неглубоких полостях — СИЦ (хорошая адгезия к дентину, фторвыделение); компомеры (Dyract); при высоких эстетических требованиях — гибридный или нанокомпозит. Важно: не пересушивать дентин, адгезивная система 5–7-го поколения, светополимеризация с учётом угла (световод перпендикулярно).", opts:["Овальная форма, СИЦ / компомер / наноком; сложность — десневая стенка и влажность","Прямоугольная полость, амальгама","Только удаление дентина без пломбирования","Коффердам не нужен"] },
  { id:20, cat:"Кариес", q:"Принципы препарирования и пломбирования кариозных полостей VI класса по Блеку.", short:"VI класс — режущий край резцов или бугры жевательных зубов. Минимальное препарирование, закруглённая форма, нанокомпозит или ормокер.", full:"VI класс (дополнительный, добавлен позже) — кариозное поражение режущего края резцов, клыков или вершин бугров жевательных зубов. Встречается редко. Особенности: подвергается наибольшей окклюзионной нагрузке; требует материала с высокой прочностью. Препарирование: минимальное, в пределах поражения; форма закруглённая; скос по периметру. Пломбирование: нанонаполненные или микрогибридные композиты (высокая прочность + полируемость); ормокеры; возможно применение конденсируемых (пакуемых) композитов на бугры боковых зубов. Обязательно: тщательная окклюзионная коррекция после пломбирования; полировка; контроль артикуляции.", opts:["Режущий край / бугры; минимальное препарирование, нанокомпозит; контроль окклюзии","Только удаление зуба","Полная депульпация","Обширное препарирование"] },
  { id:21, cat:"Минимально", q:"Минимально-инвазивные методы препарирования кариозных полостей. Виды и показания.", short:"МИ-методы: ART, SLOT, BATE-CAVE, туннельный, воздушно-абразивный, химический (Carisolv). Показаны при начальном/среднем кариесе, у детей, тревожных пациентов.", full:"Минимально-инвазивные (МИ) методы направлены на максимальное сохранение здоровых тканей. Принципы МИ: удаление только инфицированного (мягкого) дентина; сохранение поражённого (пигментированного, но плотного) дентина; опора на адгезивные материалы. Виды: (1) ART (Atraumatic Restorative Treatment) — экскаватором + СИЦ. (2) SLOT-методика — узкий паз через жевательную поверхность. (3) BATE-CAVE-техника — для апроксимальных поражений. (4) Туннельный метод — без вскрытия контактного пункта. (5) Воздушно-абразивный (Air-abrasion). (6) Химическое препарирование (Carisolv, Papain-гели). Показания: начальный и средний кариес; педиатрическая стоматология; пациенты с дентофобией; труднодоступные регионы (ART).", opts:["ART, SLOT, туннельный, Carisolv — при начальном/среднем кариесе, у детей","Только при глубоком кариесе","Только в лазерной стоматологии","Показаны только взрослым"] },
  { id:22, cat:"Минимально", q:"ART-методика. Принцип минимально-инвазивного метода.", short:"ART (Atraumatic Restorative Treatment) — вручную экскаватором удаляют мягкий кариозный дентин, пломбируют высоковязким СИЦ. Без бормашины, без анестезии, без электричества.", full:"ART (Atraumatic Restorative Treatment) — атравматичный восстановительный метод, разработан ВОЗ для регионов без стоматологического оборудования. Принцип: раскрытие полости ручными инструментами (экскаватор, эмалевый нож); удаление только мягкого кариозного дентина экскаватором; без бормашины; пломбирование высоковязким (конденсируемым) стеклоиономерным цементом (СИЦ). Запечатывание фиссур остатком материала — профилактика рецидива. Преимущества: нет бормашины → нет шума и вибрации; нет анестезии в большинстве случаев; можно проводить в полевых условиях; подходит для детей. Ограничения: только начальный/средний кариес без пульпита; прочность реставрации ниже, чем у композита.", opts:["Ручное удаление кариеса + высоковязкий СИЦ без бормашины","Лазерное препарирование","Воздушно-абразивный метод","Химическое растворение"] },
  { id:23, cat:"Минимально", q:"SLOT-методика. Принцип минимально-инвазивного метода.", short:"SLOT — узкая щелевидная полость через жевательную поверхность для апроксимального кариеса. Сохраняется контактный пункт, заполняется СИЦ или текучим композитом.", full:"SLOT-методика применяется для лечения апроксимального (II/III класс) кариеса при сохранном контактном пункте. Принцип: формируют узкий щелевидный «слот» (паз) с жевательной или вестибулярной поверхности под апроксимальный кариес, не разрушая контактный пункт. Направление паза: вертикальное или горизонтальное в зависимости от локализации поражения. Преимущества: сохраняется апроксимальный контакт (не нужна матрица); меньше здоровых тканей удаляется по сравнению с классическим II классом по Блеку. Заполнение: СИЦ (при небольших полостях) или текучий композит + адгезив. Ограничения: подходит только при небольших апроксимальных поражениях; требует хорошей видимости и рентгенографии.", opts:["Узкий паз со жевательной поверхности к апроксимальному кариесу без разрушения контакта","Туннель через корень","Удаление контактного пункта","Открытый SLOT без изоляции"] },
  { id:24, cat:"Минимально", q:"BATE-CAVE-техника. Принцип минимально-инвазивного метода.", short:"BATE-CAVE — препарирование апроксимального кариеса с вестибулярной (BATE) или нёбной/язычной (CAVE) стороны без затрагивания жевательной поверхности.", full:"BATE-CAVE-техника (Buccal Access Through Enamel / Cave Access Via Enamel) — минимально-инвазивный доступ к апроксимальным поражениям передних и боковых зубов. BATE — доступ с вестибулярной поверхности: боковой доступ к апроксимальному кариесу через вестибулярную эмаль. CAVE — доступ с нёбной/язычной поверхности. Принцип: щелевидный туннельный доступ под кариозное поражение без вскрытия окклюзионной поверхности и без разрушения апроксимального контакта. Применяется: при мелком и среднем апроксимальном кариесе в сочетании с рентгенографической диагностикой (КЛКТ или битевая рентгенограмма). Заполнение: текучий композит или СИЦ через микроканюлю. Преимущество: максимальное сохранение тканей зуба и контактного пункта.", opts:["Вестибулярный (BATE) или нёбный (CAVE) доступ к апроксимальному кариесу без разрушения окклюзии","Туннельный доступ через корень","Открытый доступ со всех сторон","Только для III класса передних зубов"] },
  { id:25, cat:"Минимально", q:"Туннельный метод препарирования. Принцип минимально-инвазивного метода.", short:"Туннельный метод — узкий канал через жевательную поверхность к апроксимальному кариесу, контактный пункт полностью сохраняется. Заполняется СИЦ.", full:"Туннельный метод (Tunnel Preparation) — минимально-инвазивная техника для апроксимального кариеса. Принцип: с жевательной поверхности фиссурным бором формируют узкий канал (туннель) диаметром ~2 мм через дентин к апроксимальному кариесному поражению; апроксимальный контактный пункт полностью сохраняется; кариозный дентин удаляется через туннель маленькими экскаваторами. Заполнение: через туннель вводится СИЦ высокой вязкости (самоадгезивный к дентину, фторвыделяющий). Преимущества: апроксимальный контакт не нарушается; меньше риск повреждения соседнего зуба. Недостатки: ограниченный обзор — риск неполного удаления кариеса; требует рентгенологического контроля; не применим при большом поражении.", opts:["Канал через жевательную поверхность к апроксимальному кариесу с сохранением контактного пункта","Туннель через корень зуба","Удаление зуба и канюляция","Только для глубокого кариеса"] },
  { id:26, cat:"Материалы", q:"Классификация пломбировочных материалов. Требования к временным материалам. Чем отличается искусственный дентин от дентин-пасты?", short:"Пл. материалы: временные и постоянные. Временные: водный дентин (порошок+вода, схватывается за 2–3 мин) и дентин-паста (на масляной основе, не твердеет в воде, дольше).", full:"Классификация пломбировочных материалов: Временные (на 1–14 дней): искусственный дентин (водный дентин, Zinoment), дентин-паста, Cavit, Clip (светоотверждаемый). Постоянные: цементы (на основе фосфатной, поликарбоксильной, полиакриловой кислоты, СИЦ); металлические (амальгама); полимерные (композиты, компомеры, ормокеры); адгезивные системы. Требования к временным материалам: достаточная герметизация (>24 ч); лёгкое удаление; отсутствие раздражающего действия на пульпу; доступность. Искусственный дентин (водный) — порошок (ZnO + каолин) + вода; твердеет в полости за 2–3 мин при наличии воды; не должен контактировать с влажными стенками полости до замешивания. Дентин-паста — те же компоненты + масло (эвгенол или вазелин); не требует воды для схватывания; твердеет медленно; более пластична; не растворяется в ротовой жидкости так быстро.", opts:["Водный дентин твердеет от воды за 2–3 мин; дентин-паста — на масляной основе, тверже, дольше","Оба материала одинаковы","Дентин-паста — постоянный материал","Водный дентин не твердеет"] },
  { id:27, cat:"Материалы", q:"Требования и виды изолирующих прокладок. Базисные и лайнерные. Показания и противопоказания.", short:"Изолирующие прокладки защищают пульпу от раздражения. Лайнерные (тонкослойные) — СИЦ, ЦОЕ тонким слоем (<1 мм). Базисные — фосфат-цемент или СИЦ толстым слоем (>1 мм).", full:"Изолирующие прокладки — промежуточный слой между пульпой и постоянной пломбой. Функции: защита пульпы от термических, химических и электрических раздражителей. Требования: биосовместимость; адгезия к дентину; устойчивость к влаге; не растворяться под пломбой. Лайнерные (тонкослойные) прокладки ≤1 мм: жидкотекучий СИЦ (Vitrebond), праймер с кальцием (Life), ЦОЕ-лайнер. Наносятся кистью или эндодонтической иглой. Базисные прокладки >1 мм: СИЦ классический, фосфат-цемент. Показания: средний и глубокий кариес; при использовании амальгамы; при ортопедических препарировках. Противопоказания: не применяют при поверхностном кариесе; ЦОЕ-прокладки — противопоказаны под адгезивные системы (эвгенол ингибирует полимеризацию).", opts:["Лайнерные ≤1 мм (СИЦ, ЦОЕ-лайнер), базисные >1 мм (фосфат-цемент, СИЦ); ЦОЕ нельзя под композит","Только один вид прокладок","Прокладки не нужны при глубоком кариесе","Базисная прокладка = пломба"] },
  { id:28, cat:"Материалы", q:"Требования и виды лечебных прокладок. Одонтотропные, комбинированные и биологические. Показания и противопоказания.", short:"Лечебные прокладки стимулируют образование заместительного дентина. Одонтотропные — Ca(OH)₂ (Dycal, Calcipulpe). Комбинированные — Biodentin. Биологические — коллаген.", full:"Лечебные прокладки применяются при глубоком кариесе с угрозой или случайным вскрытием пульпы. Цель — стимуляция одонтобластов к выработке заместительного (третичного) дентина. Одонтотропные прокладки: гидроксид кальция Ca(OH)₂ (pH 12 → бактерицидное действие); препараты: Dycal (Dentsply), Calcipulpe, Life (Kerr). Наносят точечно на дно глубокой полости. Противопоказаны при вскрытии пульпы > 0.5 мм. Комбинированные лечебные прокладки: MTA (минеральный триоксидный агрегат), Biodentin (трикальцийсиликат) — при прямом покрытии пульпы. Биологические лечебные прокладки: коллаген, дентинный адгезив + КОЕ. Показания: глубокий кариес с прозрачным дном; случайное вскрытие пульпы (МТА). Противопоказания: острый/хронический пульпит; некроз пульпы.", opts:["Ca(OH)₂ (Dycal) — одонтотропные; MTA/Biodentin — при вскрытии пульпы; коллаген — биологические","Только СИЦ используется","Лечебные прокладки ставятся на любую полость","Нет различий между типами"] },
  { id:29, cat:"Цементы", q:"Постоянные пломбировочные материалы. Цементы на основе фосфатной кислоты. Показания, противопоказания, представители.", short:"Фосфатные цементы (Фосфат-цемент, Adhesor) — порошок ZnO + жидкость H₃PO₄. Прочные, дешёвые, не адгезивны. Базисная прокладка, фиксация коронок. Нельзя в полости I класса самостоятельно.", full:"Цементы на основе фосфатной кислоты — исторически первые постоянные цементы. Состав: порошок (оксид цинка ZnO + модификаторы) + жидкость (35–40% ортофосфорная кислота + вода). Реакция: кислотно-основная с образованием матрицы фосфата цинка. Свойства: высокая прочность на сжатие (80–100 МПа); хорошая теплоизоляция; не адгезивны к твёрдым тканям (требуют механической ретенции); рН при замешивании ~2 (раздражает пульпу → нужна прокладка). Показания: базисная прокладка под амальгаму; фиксация несъёмных ортопедических конструкций (коронки, мосты); фиксация ортодонтических брекетов. Противопоказания: не применяют в качестве постоянной пломбы для полостей I–V классов самостоятельно (хрупкий, нет адгезии); при глубоком кариесе без лечебной прокладки. Представители: Фосфат-цемент (Россия/Узбекистан), Adhesor (SpofaDental), Harvard Cement.", opts:["ZnO + H₃PO₄; базисная прокладка, фиксация коронок; не для самостоятельного пломбирования","Только для временного пломбирования","Адгезивный к эмали","Кислотный рН не страшен"] },
  { id:30, cat:"Цементы", q:"Постоянные пломбировочные материалы. Цементы на основе полиакриловой кислоты. Показания, противопоказания, представители.", short:"Полиакриловые цементы (Durelon, Аквацем) — ZnO + полиакриловая кислота. Умеренная адгезия к дентину, биосовместимы. Фиксация коронок, вкладок. Слабее фосфатных.", full:"Поликарбоксилатные (полиакрилатные) цементы. Состав: порошок (оксид цинка, возможны добавки фтора) + жидкость (40% водный раствор полиакриловой кислоты). Особенность: первые цементы с реальной химической адгезией к дентину и эмали (связь с кальцием гидроксиапатита). Свойства: pH при схватывании 4–5 (менее раздражает пульпу, чем фосфатные); биосовместимость; прочность ниже фосфатных (~60–70 МПа); хорошая адгезия. Показания: фиксация несъёмных ортопедических конструкций (коронки, вкладки); базисная прокладка при чувствительной пульпе; фиксация ортодонтических аппаратов; молочные зубы. Противопоказания: не для самостоятельного постоянного пломбирования (низкая прочность, хрупкость); не применяют в зонах высокой нагрузки. Представители: Durelon (3M ESPE), Аквацем, Polycarboxylate Cement (Harvard).", opts:["ZnO + полиакриловая кислота; адгезивны к дентину; фиксация коронок и вкладок","Нет адгезии к дентину","Прочнее фосфатных цементов","Применяются как самостоятельная пломба"] },
  { id:31, cat:"Цементы", q:"Постоянные пломбировочные материалы. Классические стеклоиономерные цементы (СИЦ) — состав, свойства, показания, представители.", short:"Классические СИЦ: порошок (алюмофторсиликатное стекло) + жидкость (полиакриловая кислота). Самоадгезия к дентину, фторвыделение, биосовместимость. Минус — хрупкие, чувствительны к влаге.", full:"Классические СИЦ (стеклоиономерные цементы, Glass-Ionomer Cement). Состав: Порошок — алюмофторсиликатное стекло (SiO₂-Al₂O₃-CaF₂-AlF₃-NaF). Жидкость — сополимер полиакриловой и итаконовой кислот в воде. Реакция: кислотно-основная с образованием ионного полиакрилатного матрикса, связывающегося с гидроксиапатитом дентина. Положительные свойства: химическая адгезия к дентину и эмали без травления; фторвыделение (противокариесный эффект); биосовместимость; КТР близок к дентину; простота применения. Недостатки: хрупкость; чувствительность к влаге при схватывании (первые 24 ч закрывать лаком); чувствительность к пересыханию; эстетика уступает композитам. Показания: V класс; молочные зубы; полости под АРТ-методику; прокладка под композит (сэндвич-техника); полости в зонах малой нагрузки. Представители: Fuji IX (GC), Ketac Molar (3M ESPE), Цемион (ВладМиВа).", opts:["Алюмофторсиликатное стекло + полиакриловая кислота; адгезия, фторвыделение, хрупкие","Состоят только из ZnO","Нет адгезии к дентину","Хорошая эстетика"] },
  { id:32, cat:"Цементы", q:"Постоянные пломбировочные материалы. Гибридные СИЦ — состав, свойства, показания, представители.", short:"Гибридные СИЦ (РМСИЦ) = СИЦ + смола (HEMA). Совмещают адгезию и фторвыделение СИЦ с прочностью и эстетикой композитов. Схватываются от света и химически.", full:"Гибридные СИЦ (ремодифицированные смолой, РМСИЦ / Resin-Modified Glass-Ionomer Cement, RMGIC). Состав: порошок (алюмофторсиликатное стекло); жидкость — полиакриловая кислота + HEMA (гидроксиэтилметакрилат) + инициатор фотополимеризации. Двойной механизм схватывания: кислотно-основная реакция СИЦ + фотополимеризация смолы. Положительные свойства по сравнению с классическим СИЦ: выше прочность; меньше чувствительность к влаге; хорошая рабочая время; лучшая эстетика (более прозрачны). Сохраняются: адгезия к дентину, фторвыделение, биосовместимость. Недостатки: ниже фторвыделение чем у классических СИЦ; полимеризационный стресс (как у композитов); возможен осмотический эффект от HEMA (постоперативная чувствительность). Показания: полости V класса; лайнерная и базисная прокладка; молочные зубы; нижний слой в сэндвич-технике. Представители: Vitrebond (3M ESPE), Fuji II LC (GC), Vitremer (3M ESPE).", opts:["СИЦ + HEMA смола; световое+химическое схватывание; прочнее, менее влагочувствительны","Без смолы","Только химическое схватывание","Нет фторвыделения"] },
  { id:33, cat:"Материалы", q:"Абсолютные и относительные противопоказания к реставрации. Фотополимеризаторы: виды, режим работы.", short:"Абс. противопоказания: аллергия на компоненты, некомпенсированные системные болезни, острый пульпит. Отн.: беременность I триместр, псих. расстройства. Полимеризаторы: галогеновые, LED, лазерные.", full:"Абсолютные противопоказания к реставрации: аллергия на компоненты (HEMA, Bis-GMA, фотоинициаторы); некроз пульпы без предварительного лечения; острый пульпит / периодонтит (требуют эндодонтического лечения); невозможность обеспечить изоляцию. Относительные противопоказания: беременность I триместра (избегать рентгена и длительных процедур); тяжёлые психические расстройства; гиперчувствительность дентина без устранения причины. Фотополимеризаторы: (1) Галогеновые (QTH) — широкий спектр (400–500 нм); постепенно заменяются LED. (2) Диодные LED — спектр 440–480 нм; низкое тепловыделение; долгосрочные; компактны. (3) Плазменные (PAC) — быстрая полимеризация. (4) Лазерные — точечные. Режим работы: стандартный (40–60 с), ступенчатый (soft-start), пульсирующий (для снижения полимеризационного стресса). Мощность ≥800 мВт/см².", opts:["Абс.: аллергия, острый пульпит; Отн.: беременность, психоз; Типы: галогеновые и LED","Нет противопоказаний","Только галогеновые лампы","Беременность — абсолютное противопоказание"] },
  { id:34, cat:"Материалы", q:"Галогеновые фотополимеризаторы. Положительные свойства и недостатки. Абсолютные противопоказания к реставрации.", short:"Галогеновые: широкий спектр, отверждает все материалы. Минусы: высокое тепловыделение, замена лампы, деградация светового потока. Абс. прот-ния: аллергия на компоненты, некроз пульпы.", full:"Галогеновые фотополимеризаторы (Quartz-Tungsten-Halogen, QTH). Принцип: вольфрамово-галогеновая лампа + полосовой фильтр → свет 400–500 нм. Положительные свойства: широкий спектр → отверждает материалы с разными фотоинициаторами (камфорохинон и альтернативные); хорошая интенсивность; относительно доступная цена; возможность ступенчатого и мягкого старта. Недостатки: значительное тепловыделение (до 40–50°C → риск ожога пульпы при длительном применении); со временем световой поток снижается (лампа и фильтр деградируют → необходим контроль радиометром); большой вес/размер; короткий срок службы лампы (~100 ч); потребление энергии выше. Абсолютные противопоказания к реставрации: аллергическая реакция на компоненты пломбировочного материала; некроз пульпы (необходимо эндодонтическое лечение); острый гнойный пульпит; острый периодонтит.", opts:["Широкий спектр, но высокое тепловыделение и деградация лампы; абс. прот-ния: аллергия, некроз пульпы","Не выделяет тепла","Нет деградации светового потока","Противопоказаний нет"] },
  { id:35, cat:"Материалы", q:"Диодные (LED) фотополимеризаторы. Положительные свойства и недостатки. Относительные противопоказания к реставрации.", short:"LED: узкий спектр (440–480 нм), мало тепла, долгий срок службы, компактны. Минус: не отверждает материалы с фотоинициаторами за пределами спектра. Отн. прот-ния: беременность I тр., дети до 3 лет.", full:"Диодные LED фотополимеризаторы. Принцип: светодиоды синего спектра 440–480 нм. Положительные свойства: минимальное тепловыделение → безопасность для пульпы; постоянная интенсивность на протяжении всего срока службы (нет деградации); компактность и мобильность (беспроводные модели); долгий срок службы LED (>10 000 ч); работа от аккумулятора. Полиполнодиапазонные LED (полихроматические) перекрывают дополнительные фотоинициаторы. Недостатки: стандартные LED (монохроматические) не отверждают материалы с фотоинициаторами вне спектра (люцерин, PPD); менее пригодны для толстых слоёв. Относительные противопоказания к реставрации: беременность I триместра; дети до 3 лет (при обширных вмешательствах); тяжёлые психические расстройства; аллергия неустановленная к материалам.", opts:["Мало тепла, стабильная интенсивность, долговечны; минус — узкий спектр некоторых моделей","Хуже галогеновых","Одинаковы с галогеновыми","Отн. прот-ний нет"] },
  { id:36, cat:"Композиты", q:"Классификация полимерных наполненных пломбировочных материалов. Полимеризация. Меры снижения полимеризационного стресса.", short:"Классификация по размеру частиц: макро-, микро-, гибридные, микрогибридные, нано. Полимеризация: свободнорадикальная, инициатор (КХ + светополимеризация). Снижение стресса: послойное наполнение ≤2 мм, мягкий старт, текучий слой.", full:"Классификация по размеру наполнителя: Макронаполненные (10–100 мкм); Микронаполненные (0.04–0.4 мкм); Гибридные (0.1–10 мкм); Микрогибридные (0.4–1 мкм); Нанонаполненные (<0.1 мкм); Нанокластерные. По методу отверждения: химического отверждения (ХО, двухпастный) и светового (СО, однопастный). По консистенции: конденсируемые (пакуемые), обычные, жидкотекучие. Полимеризация: свободнорадикальная. Инициаторы: камфорохинон (свет 467 нм, синий) + амин-ускоритель; при ХО — пероксид бензоила + амин. Полимеризационный стресс (усадка 2–5%) → краевая щель → микроподтекание. Меры снижения стресса: (1) Послойное нанесение (слои ≤2 мм); (2) Мягкий старт полимеризации (soft-start: сначала 150–200 мВт/см², потом 800+); (3) Первый слой жидкотекучего композита (буферный); (4) Методика открытого зонта; (5) Центрипетальная техника; (6) Применение «bulk-fill» материалов.", opts:["По размеру частиц (нано→макро); усадка снижается слоистым нанесением ≤2мм, мягким стартом, буферным слоем","Нет классификации","Нет полимеризационной усадки","Наполнение одним слоем лучше"] },
  { id:37, cat:"Композиты", q:"Композиты химического и светового отверждения. Состав, свойства, показания.", short:"ХО (хим): 2 пасты (база+катализатор), инициатор — перекись бензоила + амин. Равномерная полимеризация. СО (свет): 1 паста, камфорохинон + свет 470 нм. Управляемое время.", full:"Композиты химического отверждения (ХО): Состав: 2 компонента — паста-основа (Bis-GMA или UDMA + наполнитель + инициатор пероксид бензоила) и паста-катализатор (аминовый ускоритель). Смешиваются в равных частях на блоке 30–60 с. Рабочее время 1.5–2 мин, схватывание 4–5 мин. Преимущества: равномерная полимеризация в глубину независимо от толщины; не зависит от источника света. Недостатки: ограниченное рабочее время; пористость (пузырьки при замешивании); жёлтое окрашивание со временем (аминное). Показания: штифтовые зубы, культи под коронки, I–II класс при отсутствии лампы. Композиты светового отверждения (СО): Состав: 1 паста (Bis-GMA + наполнитель + камфорохинон + ингибитор). Полимеризация — свет 440–480 нм. Преимущества: неограниченное рабочее время; управляемая полимеризация; нет пористости; лучшая эстетика. Недостатки: глубина полимеризации ≤2 мм; зависимость от источника света.", opts:["ХО: 2 пасты, полимеризация без лампы, ограничено время; СО: 1 паста, лампа, управляемое время","Оба одинаковы","ХО лучше СО по эстетике","СО схватывается без лампы"] },
  { id:38, cat:"Адгезивные", q:"Адгезивная система 4-го поколения. Механизм. Меры снижения полимеризационного стресса.", short:"4 покол. — тотальное протравливание (37% H₃PO₄) + прайм + бонд отдельно. 3 флакона. «Влажное связывание». Золотой стандарт.", full:"Адгезивные системы 4-го поколения — трёхкомпонентные, тотального травления (total-etch). Этапы: (1) Тотальное кислотное протравливание: гель 37% ортофосфорной кислоты на эмаль 30 с, дентин 15 с → смывают → не пересушивают (влажное связывание). (2) Праймер: амфифильные молекулы (HEMA, MDP) проникают в деминерализованный коллагеновый слой дентина, создавая гибридный слой (Nakabayashi). (3) Адгезив (бонд): гидрофобная смола заполняет пространства над праймером, полимеризуется. Механизм: микромеханическая ретенция в порах эмали + гибридный слой в дентине. Прочность адгезии: 20–30 МПа к дентину, 30–40 МПа к эмали. Меры снижения полимеризационного стресса: адгезивный слой (флексибильный); послойное нанесение; мягкий старт; буферный жидкотекучий слой. Представители: OptiBond FL (Kerr), Scotchbond Multi-Purpose (3M), All-Bond 2.", opts:["3 этапа: протравливание + праймер + бонд отдельно; золотой стандарт, гибридный слой","Один флакон","Нет кислотного протравливания","4-е поколение хуже 5-го"] },
  { id:39, cat:"Адгезивные", q:"Адгезивная система 5-го поколения. Механизм. Меры снижения полимеризационного стресса.", short:"5 покол. — тотальное протравливание + праймер и бонд в одном флаконе (2 шага). Удобнее, прочность немного ниже.", full:"Адгезивные системы 5-го поколения — двухкомпонентные (two-step total-etch). Отличие от 4-го поколения: праймер и адгезив объединены в один флакон. Этапы: (1) Тотальное кислотное протравливание 37% H₃PO₄ (эмаль 30 с, дентин 15 с) → смыть → слегка просушить (влажная поверхность). (2) Нанесение праймер-бонда: один флакон наносят кистью, втирают лёгкими движениями, продувают воздухом → полимеризация. Механизм: аналогичен 4-му поколению (гибридный слой), но праймер и смола конкурируют в одном флаконе → возможно меньшее проникновение в дентин. Прочность ~18–25 МПа к дентину. Меры снижения стресса: те же — послойное нанесение, мягкий старт, жидкотекучий буфер. Представители: Prime&Bond NT (Dentsply), Excite (Ivoclar), One-Step (Bisco), Adper Single Bond 2 (3M ESPE).", opts:["2 этапа: протравливание + праймер-бонд в одном флаконе; удобнее 4-го, прочность сопоставима","Один флакон без протравливания","3 флакона, как 4-е поколение","Без адгезии к дентину"] },
  { id:40, cat:"Адгезивные", q:"Адгезивная система 6-го поколения. Механизм. Меры снижения полимеризационного стресса.", short:"6 покол. — самопротравливающие (self-etch), 2 флакона: самопротравливающий праймер + бонд. Нет отдельного смывания кислоты. Меньший риск пересушивания.", full:"Адгезивные системы 6-го поколения — двухкомпонентные самопротравливающие (two-step self-etch). Принцип: кислотные мономеры в составе праймера одновременно деминерализуют и инфильтрируют дентин — нет отдельного этапа кислотного протравливания и смывания. Этапы: (1) Самопротравливающий праймер (pH 1.5–2): содержит кислотные мономеры (MDP, Phenyl-P) → наносят на невысушенный зуб → продувают → НЕ смывают. (2) Бонд (гидрофобная смола) → нанесение → полимеризация. Механизм: неполная деминерализация дентина (лучше взаимодействие с гидроксиапатитом); нет риска пересушивания; «снаружи-внутрь» гибридный слой. Плюсы: меньше чувствительность после лечения; нет пересушивания. Минусы: хуже протравливание апризматической эмали (особенно молочных зубов → рекомендуют точечное протравливание эмали). Меры снижения стресса: послойность, мягкий старт. Представители: Clearfil SE Bond (Kuraray), AdheSE (Ivoclar), Optibond Solo Plus Self-Etch.", opts:["2 этапа: самопротравливающий праймер (без смывания) + бонд; не пересушивает","3 этапа, как 4-е поколение","Один флакон","Нет адгезии к дентину"] },
  { id:41, cat:"Композиты", q:"Макронаполненные композиты. Состав, свойства, показания, представители.", short:"Макронаполненные: частицы 10–100 мкм, 70–80% об. Прочные, плохо полируются, матовые. Применялись для боковых зубов. Исторически первые.", full:"Макронаполненные (крупнодисперсные) композиты. Состав: органическая матрица (Bis-GMA, UDMA) + крупные частицы наполнителя (кварц, стекло) 10–100 мкм, содержание 70–80% по объёму. Свойства: высокая прочность на сжатие и износостойкость; плохая полируемость (крупные частицы выступают над матрицей → шероховатость → налёт); поверхность матовая, непрозрачная; цветоустойчивость невысокая. Показания: исторические — боковые зубы под жевательную нагрузку (сейчас заменены гибридными). В современной практике практически не применяются. Представители: Adaptic (Johnson), Concise (3M), Evicrol (SpofaDental). Историческое значение: первое поколение полимерных пломбировочных материалов.", opts:["Крупные частицы 10–100 мкм; прочные, но не полируются; для боковых зубов (исторически)","Нанометрические частицы","Отличная полируемость","Применяются для фронтальных зубов"] },
  { id:42, cat:"Композиты", q:"Микронаполненные композиты. Состав, свойства, показания, представители.", short:"Микронаполненные: частицы 0.04–0.4 мкм. Отличная полировка, высокий блеск. Недостаток — низкая прочность, большая усадка. Только фронтальные зубы.", full:"Микронаполненные композиты. Состав: матрица (Bis-GMA) + ультрамелкий наполнитель (коллоидный диоксид кремния SiO₂) 0.04–0.4 мкм; содержание наполнителя 35–50% по объёму. Из-за малого размера частиц сложно ввести больший процент без потери пластичности. Свойства: превосходная полируемость (поверхность гладкая, зеркальная, длительно сохраняет блеск); хорошая эстетика; высокая гибкость (модуль упругости ниже). Недостатки: низкая прочность на сжатие и износостойкость; высокий коэффициент полимеризационной усадки (из-за большого количества матрицы); значительное водопоглощение. Показания: реставрации фронтальных зубов (особенно внешний, эмалевый слой); III, IV классы; финишный слой при многослойной технике. Представители: Silux Plus (3M), Degufill Mineral (Degussa), Heliomolar (Ivoclar).", opts:["Частицы 0.04–0.4 мкм; идеальная полировка; низкая прочность → только фронтальные зубы","Самые прочные","Для жевательных зубов","Нет полируемости"] },
  { id:43, cat:"Композиты", q:"Гибридные композиты. Состав, свойства, показания, представители.", short:"Гибридные: смесь крупных (10–50 мкм) и мелких частиц (0.04 мкм). Баланс прочности и полируемости. Универсальные, для всех классов.", full:"Гибридные (smeared-particle) композиты. Состав: матрица (Bis-GMA, UDMA) + комбинация крупных (0.1–10 мкм) и мелких (0.04 мкм) частиц наполнителя; содержание 75–80% по массе. Свойства: сочетают прочность макронаполненных с полируемостью микронаполненных; КТР и водопоглощение близки к дентину; умеренная полируемость (поверхность глаже макронаполненных, но хуже микронаполненных); хорошие механические показатели. Показания: универсальные — все классы полостей (I–V); фронтальные и жевательные зубы. Представители: Herculite (Kerr), P-50 (3M ESPE), Charisma (Heraeus Kulzer). Гибридные — наиболее широко применявшийся класс до появления микрогибридных и нанонаполненных.", opts:["Смесь крупных и мелких частиц; универсальные, все классы","Только мелкие частицы","Нет крупных частиц","Только для временных пломб"] },
  { id:44, cat:"Композиты", q:"Микрогибридные композиты. Состав, свойства, показания, представители.", short:"Микрогибридные: частицы 0.4–1 мкм. Улучшенная полировка по сравнению с гибридными, высокая прочность. Наиболее популярные универсальные материалы.", full:"Микрогибридные (fine-particle hybrid) композиты. Состав: матрица (Bis-GMA, UDMA, TEGDMA) + частицы 0.4–1.0 мкм (бариевое, стронциевое стекло + микронаполнитель); содержание 75–80% по массе. Уменьшенный размер частиц по сравнению с классическими гибридными. Свойства: высокая прочность; отличная полируемость и длительное сохранение блеска; хорошая эстетика; устойчивость к истиранию. Показания: универсальные — I–V классы; фронтальные и боковые зубы; эстетические реставрации. Представители: Filtek Z250 (3M ESPE), Tetric Ceram (Ivoclar), Charisma (Heraeus), Spectrum TPH (Dentsply), Estelite Sigma (Tokuyama). Наиболее широко применяемый класс в современной клинической практике.", opts:["Частицы 0.4–1 мкм; высокая прочность + хорошая полировка; универсальные (I–V классы)","Только для I класса","Хуже гибридных по прочности","Нет полировки"] },
  { id:45, cat:"Композиты", q:"Нанонаполненные композиты. Состав, виды, свойства, показания, представители.", short:"Нанонаполненные: частицы <100 нм (нанометры). Идеальная полировка + прочность как у гибридных. Виды: нанодисперсные и нанокластерные. Для фронта и боковых.", full:"Нанонаполненные композиты. Состав: матрица (Bis-GMA, UDMA) + нанодисперсный наполнитель (<100 нм); также нанокластеры (агломераты наночастиц 0.6–1.4 мкм, дезинтегрирующиеся при полировке). Виды: (1) Нанодисперсные — равномерно распределённые наночастицы; (2) Нанокластерные (Filtek Supreme) — нанокластеры + отдельные наночастицы. Содержание наполнителя 78–80% по массе. Свойства: идеальная полируемость (наночастицы не выступают над матрицей); прочность сопоставима с гибридными; сохранение блеска в течение длительного времени; низкая усадка; хорошая цветоустойчивость. Показания: все классы (I–V); фронтальные и боковые зубы; финишный слой реставрации; клиновидные дефекты. Представители: Filtek Supreme Ultra (3M ESPE), Ceram.X (Dentsply), Grandio (VOCO), Tetric EvoCeram (Ivoclar).", opts:["<100 нм частицы; идеальная полировка + прочность гибридных; нанокластерные и нанодисперсные","Только для боковых зубов","Низкая прочность","Хуже микронаполненных"] },
  { id:46, cat:"Композиты", q:"Компомеры. Ормокеры. Состав, свойства, показания, представители.", short:"Компомеры = композит + СИЦ (выделяют фтор, но меньше). Ормокеры = органически модифицированная керамика (Si-O-Si основа). Для молочных зубов, V класса.", full:"Компомеры (Poly-acid modified composites). Состав: органическая матрица (Bis-GMA + кислотный мономер HEMA) + стеклоиономерный наполнитель + фотоинициатор. Не требуют воды для реакции (схватываются как композиты). Фторвыделение меньше, чем у СИЦ. Свойства: удобство применения (как СИЦ); адгезия к дентину (при условии использования адгезива); умеренное фторвыделение; хорошая эстетика; средняя прочность. Показания: молочные зубы; V класс; полости с умеренной нагрузкой; пациенты с высоким риском кариеса. Представители: Dyract (Dentsply), Compoglass (Ivoclar), F2000 (3M). Ормокеры (Organically Modified Ceramics). Состав: Si-O-Si-неорганическая сеть + органические группы (акрилатные) — синтез золь-гель методом; неорганический наполнитель. Свойства: малая усадка; низкое водопоглощение; хорошая биосовместимость. Представители: Admira (VOCO), Ceram.X (Dentsply).", opts:["Компомер = композит+СИЦ эффект (фтор); ормокер = Si-O-Si керамика; оба для молочных зубов, V класса","Компомер = только СИЦ","Ормокер = металлическая основа","Нет фторвыделения у компомеров"] },
  { id:47, cat:"Композиты", q:"Конденсируемые (пакуемые) композиты. Состав, свойства, показания, представители.", short:"Конденсируемые (packable): высокое содержание наполнителя (>80%), жёсткие, не липнут к инструменту. Имитируют амальгаму по консистенции. Для боковых зубов.", full:"Конденсируемые (packable, пакуемые) композиты. Состав: матрица (Bis-GMA, UDMA) + высокое содержание наполнителя >80% по массе, крупные частицы неправильной формы, которые создают жёсткую консистенцию. Свойства: консистенция как у влажного песка → не прилипает к инструменту; можно конденсировать штопфером (как амальгаму); хорошее воссоздание контактного пункта и жевательного рельефа; прочность на сжатие 250–300 МПа; худшая полируемость; ниже эстетика. Показания: I и II класс; боковые зубы под высокую нагрузку; замена амальгамы. Представители: Solitaire 2 (Heraeus), Surefil (Dentsply), Filtek P60 (3M ESPE), Квиксил (Дентспли).", opts:["Высокое содержание наполнителя >80%, жёсткие, штопфером; I–II класс боковых зубов","Текучие","Для фронтальных зубов","Низкое наполнение"] },
  { id:48, cat:"Композиты", q:"Жидкотекучие (текучие) композиты. Состав, свойства, показания, представители.", short:"Flowable: низкое наполнение (50–65%), текучая консистенция, большая усадка, высокая эластичность. Для V класса, фиссур, первый слой (буфер), недоступных участков.", full:"Жидкотекучие (flowable) композиты. Состав: матрица (Bis-GMA, TEGDMA — снижает вязкость) + пониженное содержание наполнителя 50–65% по массе (при стандарте 75–80%). Свойства: текучая консистенция → шприц с иглой-канюлей; хорошее краевое прилегание и смачивание; высокий модуль упругости → амортизирующий эффект (буфер при полимеризационном стрессе); недостатки — большая усадка из-за меньшего наполнения; низкая прочность на износ. Показания: V класс, клиновидные дефекты; фиссурное герметизирование; первый буферный слой в полости (снижение стресса); малые полости I класса; ретенционные борозды; ремонт реставраций; под конденсируемый или гибридный. Представители: Filtek Flow (3M ESPE), Tetric Flow (Ivoclar), Revolution (Kerr), SDR (Dentsply — bulk-fill).", opts:["Низкое наполнение 50–65%, из шприца с иглой; V класс, буферный слой, малые полости","Высокое наполнение","Нет усадки","Для боковых зубов основная пломба"] },
  { id:49, cat:"Техники", q:"«Сэндвич-техника» пломбирования. Показания к применению, виды, методы.", short:"Сэндвич = нижний слой СИЦ (адгезия, фтор) + верхний слой композита (эстетика, прочность). Открытый: СИЦ виден на десне. Закрытый: СИЦ полностью покрыт композитом.", full:"Сэндвич-техника — комбинированный метод, использующий преимущества СИЦ и композита. Принцип: нижний слой — СИЦ (химическая адгезия к дентину, фторвыделение, биосовместимость); верхний слой — композит (эстетика, прочность, износостойкость). Виды: (1) Закрытый (closed sandwich): СИЦ полностью покрывается композитом; применяется в I, II классе, при среднем кариесе. (2) Открытый (open sandwich): СИЦ формирует десневую стенку II класса, остаётся открытым к полости рта; применяется при глубоких поддесневых полостях II класса. Показания: средний и глубокий кариес; II класс с поддесневым расположением десневой стенки; пациенты с высоким кариесриском; молочные зубы. Преимущества: минимизирует полимеризационный стресс; высвобождение фтора из СИЦ; хорошая адгезия к дентину без протравливания.", opts:["Нижний слой СИЦ + верхний слой композита; открытый (СИЦ открыт у десны) и закрытый","Только один слой","Два слоя композита","СИЦ сверху, композит снизу"] },
  { id:50, cat:"Техники", q:"«Слоёная техника» пломбирования. Показания, используемые материалы, механизм работы.", short:"Слоёная техника — нанесение композита слоями ≤2 мм с полимеризацией каждого. Снижает усадку, обеспечивает качественную полимеризацию. Для всех классов при адгезивных материалах.", full:"Слоёная (incremental) техника — основная техника работы с фотополимерными композитами. Принцип: полость заполняется последовательными слоями ≤2 мм (максимальная глубина проникновения света при стандартной лампе); каждый слой полимеризуется отдельно (20–40 с). Механизм работы: снижение суммарной полимеризационной усадки и стресса (меньший объём каждого слоя → меньше сжимающая сила); обеспечение полной конверсии мономера; возможность имитации анатомических слоёв зуба (дентин + эмаль). Варианты: горизонтальная (I класс), диагональная (II класс — центрипетальная, косой слой от бугра к бугру), вертикальная (III–IV классы). Используемые материалы: обычный гибридный или микрогибридный композит; для первого слоя — жидкотекучий (буфер); для основного объёма — стандартный; для поверхностного слоя — высокополируемый (нанонаполненный). Показания: все классы при использовании адгезивных материалов.", opts:["Слои ≤2 мм с полимеризацией каждого; снижает усадку; дентинный + эмалевый слои","Один толстый слой","Только для I класса","Без полимеризации каждого слоя"] },
  { id:51, cat:"Анатомия", q:"Анатомические особенности строения коронки и корня 11, 12, 21, 22 зубов (верхние резцы).", short:"Центральные резцы (11, 21): коронка долотообразная, 1 корень конический, 3 бугорка на режущем крае. Боковые (12, 22): меньше, лопатообразные. Корень 1, уплощённый.", full:"Верхние центральные резцы (11, 21): Коронка: долотообразная (лопатообразная), вестибулярная поверхность выпуклая с 3 вертикальными валиками у молодых пациентов; медиальный угол режущего края острый, дистальный — закруглённый; на нёбной поверхности — поясок и слепое отверстие (fossa incisiva). Длина коронки 9–11 мм, ширина 8–9 мм. Корень: 1 корень, конический, прямой; длина ~14–16 мм. Верхние боковые резцы (12, 22): Коронка: уже, лопатообразная, нёбная поверхность более вогнута; иногда — зуб в форме шипа (зуб Хатчинсона, вариант); медиальный угол может быть закруглённым. Длина коронки 8–9 мм. Корень: 1 корень, уплощённый с боков, нередко с дистальным изгибом.", opts:["Долотообразная коронка, 1 конический корень; у 12/22 — уплощённый корень с дистальным изгибом","2 корня","Трёхбугорковая коронка","Нёбная поверхность выпуклая"] },
  { id:52, cat:"Анатомия", q:"Анатомические особенности строения коронки и корня 13 и 23 зубов (верхние клыки).", short:"Верхние клыки (13, 23): самый длинный зуб. Коронка с одним бугром, ромбовидная. Корень — самый длинный в полости рта, конический, иногда с дистальным изгибом.", full:"Верхние клыки (13, 23): «Краеугольный камень» зубного ряда. Коронка: ромбовидная, с одним выраженным бугром (cusp) на режущем крае; медиальный скат бугра короче дистального; вестибулярная поверхность выпуклая с выраженным валиком; нёбная поверхность — два гребня (медиальный и дистальный); хорошо выражен шеечный бугорок. Размеры: длина коронки 9–11 мм, ширина 7–8 мм. Корень: 1 корень, самый длинный (16–20 мм), конический, с выраженными продольными бороздками (уплощённый с боков); нередко с дистальным изгибом в апикальной части. Функция: разрывание пищи; направляющий при боковых движениях нижней челюсти (клыковое ведение).", opts:["1 бугор на режущем крае; самый длинный корень (~17–20 мм); ромбовидная коронка","2 бугра","Самый короткий корень","Нет выраженного бугра"] },
