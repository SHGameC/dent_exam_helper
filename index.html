{ "id":35, "cat":"Фотополимеризаторы", "q":"Диодные (LED) фотополимеризаторы. Положительные свойства, недостатки. Относительные противопоказания к реставрации.", "short":"LED: не нагреваются, долговечны (>1000 ч), работают от аккумулятора, мощность до 2000 мВт/см². Недостатки: узкий спектр (~460 нм) — могут не полимеризовать материалы с альтернативными фотоинициаторами.", "full":"Диодные (LED — Light Emitting Diode) фотополимеризаторы — современный стандарт. Устройство: один или несколько синих светодиодов, длина волны 440–480 нм. Мощность: 400–2000 мВт/см². Положительные свойства: 1) Не нагреваются (нет термической травмы); 2) Долговечность — срок службы светодиодов >10 000 часов; 3) Аккумуляторное питание — мобильность; 4) Компактность и малый вес; 5) Не требуют фильтров; 6) Мощность стабильна в процессе работы; 7) Широкодиапазонные LED (Polywave) — перекрывают спектр 380–515 нм, полимеризуют материалы с разными фотоинициаторами. Недостатки: 1) Традиционные LED — узкий спектр (~460 нм); не полимеризуют материалы с фотоинициаторами, поглощающими в других диапазонах (например, ацилфосфиноксид — Lucerin); 2) Необходим более точный контроль расстояния; 3) Высокомощные LED могут создавать полимеризационный стресс при неправильном применении. Относительные противопоказания к реставрации зубов: беременность I триместра; тяжёлые декомпенсированные соматические заболевания; выраженный рвотный рефлекс; невозможность открыть рот на необходимое время; повышенная чувствительность на конкретный материал (без полной непереносимости). Мощность LED-прибора желательно измерять радиометром 1 раз в 6 месяцев.", "opts":["LED: не нагреваются, долговечны, аккумулятор; узкий спектр — не полимеризуют все материалы","Устаревший тип полимеризаторов","Только для металлических материалов","Самые мощные без каких-либо недостатков"] },

{ "id":36, "cat":"Композиты", "q":"Классификация полимерных наполненных материалов. Полимеризация. Меры для снижения полимеризационного стресса.", "short":"По размеру частиц: макро, мини, микро, гибридные, микрогибридные, наноконструкции. Полимеризация — усадка 0,5–3%. Снижение стресса: послойное нанесение ≤2 мм, жидкотекучий первый слой, техника свободного края.", "full":"Классификация композитных пломбировочных материалов по размеру частиц наполнителя: 1) Макронаполненные (8–45 мкм); 2) Мининаполненные (1–5 мкм); 3) Микронаполненные (0,04–0,4 мкм); 4) Гибридные (смесь крупных и мелких частиц); 5) Микрогибридные (0,4–3 мкм); 6) Нанонаполненные: наночастицы (5–75 нм) и/или нанокластеры; 7) Конденсируемые (packable) — повышенное содержание наполнителя; 8) Жидкотекучие (flowable) — пониженная вязкость; 9) По способу отверждения: химического (ХО), светового (СО), двойного. Полимеризация: инициируется фотоинициатором (камфорохинон) при световом воздействии; происходит раскрытие двойных связей мономеров и образование полимерной сети. Усадка 0,5–3% от объёма — создаёт полимеризационный стресс (напряжение на границе с дентином и эмалью, микрощели). Меры снижения полимеризационного стресса: 1) Послойное нанесение: каждый слой ≤2 мм (глубина полимеризации ограничена); 2) Жидкотекучий первый слой (адаптирующий) — снижает нагрузку на стенки за счёт эластичности; 3) Техника «свободного края» (направление усадки от стенки к центру); 4) Поэтапное полимеризация низкой мощностью → высокой («soft-start»); 5) Использование материалов с пониженной усадкой (нанокомпозиты, Filtek LS с сиоранами); 6) Правило C-фактора: соотношение склеенных и свободных поверхностей — чем ниже, тем меньше стресс.", "opts":["Макро/мини/микро/гибридные/нанонаполненные; стресс снижают послойным нанесением и жидкотекучим первым слоем","Только по цвету прозрачности","Только по стране производства","По прозрачности"] },

{ "id":37, "cat":"Композиты", "q":"Композиты химического и светового отверждения. Состав, свойства, недостатки, показания.", "short":"Химического отверждения: 2 пасты (катализатор + база), твердеют без света, нет времени для коррекции. Световые: 1 паста + фотоинициатор, управляемое время работы, лучшие свойства.", "full":"Химически отверждаемые (самоотверждаемые) композиты: Состав: два компонента — паста-база (мономер BisGMA + наполнитель + активатор третичный амин) + паста-катализатор (мономер + наполнитель + инициатор перекись бензоила). Смешиваются в соотношении 1:1. Реакция: амин + перекись бензоила → свободные радикалы → полимеризация. Положительные свойства: не требуют фотополимеризатора; равномерное отверждение на любую глубину; дешевле. Недостатки: ограниченное рабочее время после смешивания (2–3 мин); нет возможности коррекции после начала полимеризации; воздушная пористость при смешивании; цветовая нестабильность (аминовое пожелтение). Показания: восстановление культи под коронку; пломбирование в отдалённых кариозных участках (без доступа света); фиксация штифтов; при отсутствии фотополимеризатора. Световые (фотополимеризуемые) композиты: Состав: один компонент — смесь мономеров (BisGMA, TEGDMA, UDMA) + наполнитель + фотоинициатор (камфорохинон, 0,2%) + сорастворители. Отверждение: свет 400–500 нм → активация камфорохинона → свободные радикалы → полимеризация. Положительные свойства: контролируемое рабочее время; возможность коррекции до полимеризации; лучшие эстетические свойства; меньше пористость; стабильность цвета. Недостатки: полимеризационный стресс; требуют послойного нанесения (≤2 мм); зависят от мощности лампы. Показания: все виды реставраций. Являются основными реставрационными материалами в современной терапевтической стоматологии.", "opts":["Химические: 2 пасты, без света, нет коррекции; световые: 1 паста, управляемое время, лучшие свойства","Только химические отверждаемые","Только световые","Только двойного отверждения"] },

{ "id":38, "cat":"Адгезивы", "q":"Адгезивная система 4-го поколения. Механизм работы. Меры снижения полимеризационного стресса.", "short":"4-е поколение — тотальное протравливание (37% H₃PO₄) + праймер + адгезив (три отдельных этапа). Золотой стандарт. OptiBond FL, All-Bond 2, Scotchbond Multi-Purpose.", "full":"Адгезивные системы 4-го поколения (Total Etch — тотальное протравливание + трёхшаговые). Протокол трёх отдельных шагов: Шаг 1 — Протравливание: нанесение 37% геля ортофосфорной кислоты (H₃PO₄) на эмаль (15–30 с) и дентин (15 с). Механизм: удаляет «смазанный слой» (smear layer), деминерализует эмаль — создаёт микрошероховатость, деминерализует поверхностный слой дентина (~4–8 мкм) — обнажает коллагеновые волокна (гибридная зона). Смыть водой 15–30 с, осторожно осушить (не пересушивать!). Шаг 2 — Праймер (primer): наносится на дентин; содержит гидрофильные мономеры (HEMA) в ацетоне или этаноле; пропитывает обнажённые коллагеновые волокна → образует гибридную зону. Просушить воздухом. Шаг 3 — Адгезив (бонд): наносится на эмаль и дентин; содержит гидрофобные мономеры (BisGMA, TEGDMA); полимеризуется (20 с) — образует адгезивный слой. Прочность адгезии к дентину: 20–30 МПа. Механизм адгезии к эмали: микромеханическое сцепление с растравленными призмами. Представители: OptiBond FL (Kerr), All-Bond 2 (Bisco), Scotchbond Multi-Purpose (3M ESPE), Syntac (Ivoclar Vivadent). Меры снижения полимеризационного стресса: послойное нанесение композита слоями ≤2 мм; жидкотекучий первый слой; техника «свободного края»; поэтапная полимеризация (soft-start); использование нанокомпозитов с пониженной усадкой.", "opts":["Тотальное протравливание 37% H₃PO₄ → праймер → адгезив — три отдельных этапа; OptiBond FL, All-Bond 2","Один флакон без протравки","Два флакона без отдельного праймера","Самопротравливающий праймер"] },

{ "id":39, "cat":"Адгезивы", "q":"Адгезивная система 5-го поколения. Механизм работы. Меры снижения полимеризационного стресса.", "short":"5-е поколение — тотальное протравливание + однокомпонентный бонд (праймер и адгезив в 1 флаконе). Prime & Bond NT, Single Bond, One-Step.", "full":"Адгезивные системы 5-го поколения (Total Etch — двухшаговые, «однобутылочные»). Протокол двух шагов: Шаг 1 — Протравливание: нанесение 37% геля ортофосфорной кислоты на эмаль (15–30 с) и дентин (15 с). Аналогично 4-му поколению. Смыть 15–30 с, осторожно просушить. Шаг 2 — Адгезив «всё в одном» (праймер + бонд в одном флаконе): содержит и гидрофильные (HEMA), и гидрофобные (BisGMA) мономеры в ацетоне или этаноле. Наносится несколькими слоями (2–3 раза), осторожно просушивается воздухом (растворитель испаряется), полимеризуется (10–20 с). Прочность адгезии к дентину: 17–25 МПа (несколько ниже, чем у 4-го поколения из-за конкуренции между гидрофильными и гидрофобными молекулами). Преимущества: проще протокол; меньше вероятность ошибки; экономия времени. Недостатки: при пересушивании дентина — коллагеновые волокна склеиваются, гибридная зона не образуется; при недостаточном просушивании — вода мешает полимеризации; более тонкий адгезивный слой. Представители: Prime & Bond NT (Dentsply), Single Bond (3M ESPE), One-Step (Bisco), Solobond M (VOCO), Optibond Solo Plus (Kerr), Clearfil Photo Bond (Kuraray). Меры снижения стресса: те же, что для 4-го поколения — послойное нанесение ≤2 мм, жидкотекучий слой, техника свободного края.", "opts":["Тотальное протравливание + праймер+адгезив в 1 флаконе; Prime & Bond NT, Single Bond, Solobond M","Три отдельных флакона","Самопротравливающий без кислоты","Без протравки, один флакон"] },

{ "id":40, "cat":"Адгезивы", "q":"Адгезивная система 6-го поколения. Механизм работы. Меры снижения полимеризационного стресса.", "short":"6-е поколение — самопротравливающий праймер (без 37% H₃PO₄) + отдельный адгезив. AdheSE, Clearfil SE Bond, Xeno IV. Менее чувствительны к влажности дентина.", "full":"Адгезивные системы 6-го поколения (Self-Etch — самопротравливающие, двухшаговые). Принципиальное отличие: не используется отдельная фосфорная кислота. Протокол: Шаг 1 — Самопротравливающий праймер: содержит кислые мономеры (например, 10-MDP — метакрилоилоксидецилдигидрофосфат или феноспосфорная кислота) в гидрофильном растворителе. Одновременно: протравливает эмаль и дентин (менее агрессивно, чем 37% H₃PO₄, рН 1–2), проникает в смазанный слой и дентин, пропитывает коллагеновые волокна. «Смазанный слой» частично растворяется и включается в гибридную зону. Шаг 2 — Адгезив (бонд): стандартный гидрофобный бонд, полимеризуется. Особенности: не нужна кислота, промывание; меньше зависимость от степени влажности дентина («мокрое бондирование» не обязательно); возможна «постоперативная чувствительность» ниже. Адгезия к эмали несколько ниже, чем при тотальном протравливании (частичное растворение призм). Для улучшения адгезии к эмали — возможно предварительное протравливание только эмали (selective enamel etching). Представители: AdheSE (Ivoclar Vivadent), Clearfil SE Bond (Kuraray), Xeno IV (Dentsply), Optibond XTR (Kerr). 7-е поколение — самоадгезивные (1 флакон, без протравки): iBond (Heraeus), G-Bond (GC), Adper Easy Bond (3M ESPE). Меры снижения стресса: послойное нанесение ≤2 мм, жидкотекучий слой.", "opts":["Самопротравливающий праймер (без H₃PO₄) + отдельный бонд; AdheSE, Clearfil SE Bond, Xeno IV","Три флакона с тотальным протравливанием","Только тотальное протравливание","Один флакон без бонда"] },

{ "id":41, "cat":"Виды композитов", "q":"Макронаполненные композиты. Состав, свойства, недостатки, показания, представители.", "short":"Макронаполненные: частицы 8–45 мкм. Прочные, рентгеноконтрастные, но плохо полируются (шероховатая поверхность). Показаны для боковых зубов. Adaptic, Concise.", "full":"Макронаполненные (крупнодисперсные) композиты — первое поколение наполненных полимеров. Состав: органическая матрица (BisGMA, TEGDMA) + неорганический наполнитель из крупных частиц (кварц, бариевое стекло, стекло стронция) размером 8–45 мкм (объёмное содержание наполнителя 60–80%). Положительные свойства: высокая механическая прочность (прочность при сжатии до 300 МПа); рентгеноконтрастность (бариевое/стронциевое стекло); хорошая рентгенконтрастность. Недостатки: поверхность шероховатая после полировки (крупные частицы выступают из матрицы → быстрое накопление налёта); низкая полируемость; высокий коэффициент истирания; плохие эстетические свойства. Показания: практически вышли из клинической практики; исторически — пломбирование жевательных зубов; временно — восстановление культи. Представители: Adaptic (Dentsply), Concise (3M), Evicrol (SpofaDental). В настоящее время заменены микрогибридными и конденсируемыми композитами. Для врача важно знать: алмазные боры мелкой зернистости и финиры дают лучшее качество полировки макрокомпозита, чем стандартные алмазные инструменты.", "opts":["Крупные частицы 8–45 мкм; прочные, плохо полируются; исторически — боковые зубы; Adaptic, Concise","Лучшая эстетика фронтальных зубов","Мелкие частицы <1 мкм","Жидкотекучие для поддесневых полостей"] },

{ "id":42, "cat":"Виды композитов", "q":"Микронаполненные композиты. Состав, свойства, недостатки, показания, представители.", "short":"Микронаполненные: частицы 0,04–0,4 мкм (диоксид кремния). Отличная полировка и блеск поверхности, но хрупкие, высокая усадка. Только для фронтальных зубов. Heliomolar, Silux Plus.", "full":"Микронаполненные (мелкодисперсные) композиты: Состав: органическая матрица (BisGMA, TEGDMA) + наполнитель — коллоидный диоксид кремния (SiO₂) частицами 0,04–0,4 мкм. Содержание наполнителя 35–50% по объёму (ниже, чем у макронаполненных — проблема компактной упаковки мелких частиц). Положительные свойства: отличная полируемость — «зеркальный блеск»; гладкая поверхность устойчива к адсорбции налёта; долгосрочное сохранение блеска («сухой блеск»); высокая косметичность. Недостатки: хрупкость — относительно низкая прочность при изгибе; высокая полимеризационная усадка (из-за низкого содержания наполнителя); высокий коэффициент теплового расширения; невозможность применения на жевательных зубах (скалывается под нагрузкой); высокое истирание эмали антагониста. Показания: эстетические реставрации фронтальных зубов III, IV классов; пришеечные полости (V класс) фронтальных зубов; финишный эстетический слой при послойной технике. Представители: Heliomolar (Ivoclar Vivadent), Silux Plus (3M), Durafill VS (Heraeus), Degufill SC (Degussa), Renamel Microfill (Cosmedent).", "opts":["Частицы 0,04–0,4 мкм SiO₂; отличная полировка, хрупкие; только фронтальные зубы; Heliomolar, Silux Plus","Жёсткие и прочные для жевательных зубов","Крупные частицы, плохая полировка","Для боковых зубов"] },

{ "id":43, "cat":"Виды композитов", "q":"Гибридные композиты. Состав, свойства, недостатки, показания, представители.", "short":"Гибридные: смесь крупных (0,5–5 мкм) + микрочастиц (0,04 мкм). Баланс прочности и эстетики. Универсальны. Charisma, Herculite XRV.", "full":"Гибридные (смешанные, смесевые) композиты — сочетание преимуществ макро- и микронаполненных материалов. Состав: органическая матрица (BisGMA, TEGDMA) + наполнитель: крупные частицы 0,5–8 мкм (кварц, бариевое стекло) + мелкие коллоидные частицы SiO₂ 0,04–0,1 мкм. Общее содержание наполнителя 60–80% по объёму. Положительные свойства: хорошая полируемость (лучше макро-, несколько хуже микронаполненных); более высокая прочность по сравнению с микронаполненными; универсальность применения; хорошие эстетические свойства. Недостатки: полируемость несколько хуже, чем у микрогибридных; со временем теряют блеск быстрее, чем микронаполненные. Показания: универсальные — для реставрации зубов любых групп (фронтальные и жевательные); полости I–V классов. Представители: Charisma (Heraeus Kulzer), Herculite XRV (Kerr), Рrismafil (Dentsply). Гибридные композиты были популярны в 1990-х годах; в настоящее время в значительной мере вытеснены микрогибридными и нанонаполненными материалами.", "opts":["Крупные + мелкие частицы; баланс прочности и полировки; универсальные; Charisma, Herculite XRV","Только микрочастицы, только для фронтальных","Только макрочастицы","Жидкотекучие конденсируемые"] },

{ "id":44, "cat":"Виды композитов", "q":"Микрогибридные композиты. Состав, свойства, недостатки, показания, представители.", "short":"Микрогибридные: частицы 0,4–3 мкм. Хорошая прочность + хорошая полируемость. Основа современной клинической практики. Filtek Z250, Z550, Tetric N-Ceram, Gradia Direct.", "full":"Микрогибридные (fine hybrid) композиты — самая многочисленная группа современных реставрационных материалов. Состав: органическая матрица (BisGMA, TEGDMA, UDMA) + наполнитель из частиц 0,4–3 мкм (среднее — 0,6–1,0 мкм) + возможное добавление микрочастиц SiO₂. Содержание наполнителя 60–80% по объёму (до 85% по весу). Положительные свойства: хорошая прочность (до 400–450 МПа при сжатии); хорошая полируемость (лучше, чем у гибридных); долгое сохранение «сухого блеска»; универсальность; высокая рентгеноконтрастность; широкий выбор оттенков. Недостатки: полируемость несколько уступает микро- и нанонаполненным; полимеризационная усадка 1,5–3%; при послойном нанесении — риск захвата воздуха. Показания: полости I–V классов; реставрации жевательных и фронтальных зубов; универсальный выбор для большинства клинических ситуаций. Представители: Filtek Z250 (3M ESPE), Filtek Z550 (3M ESPE), Tetric N-Ceram (Ivoclar Vivadent), Gradia Direct (GC), Synergy D6 (Coltene), Estelite Σ Quick (Tokuyama), Point 4 (Kerr). Микрогибридные — наиболее часто используемые в клинической практике.", "opts":["Частицы 0,4–3 мкм; хорошая прочность и полируемость; универсальные; Filtek Z250, Tetric N-Ceram","Макронаполненные для жевательных зубов","Наночастицы <100 нм","Конденсируемые для амальгамы"] },

{ "id":45, "cat":"Виды композитов", "q":"Нанонаполненные композиты. Состав, виды, свойства, недостатки, показания, представители.", "short":"Нанонаполненные: наночастицы 5–75 нм и нанокластеры (нанофиллеры). Лучшая полировка + высокая прочность. Filtek Supreme Ultra, Premise, Grandio. Универсальные.", "full":"Нанонаполненные (нанокомпозиты) — наиболее современное поколение. Виды наночастиц: 1) Нанофиллеры: отдельные частицы SiO₂ или ZrO₂ диаметром 5–75 нм; 2) Нанокластеры: агломераты нанофиллеров диаметром 0,6–20 мкм, связанных силаном; при полировке разбиваются на нанофиллеры → гладкая поверхность. Общее содержание наполнителя: до 78–85% по весу. Состав: BisGMA, UDMA, BisEMA + нанофиллеры + нанокластеры. Положительные свойства: 1) Отличная полируемость и длительное сохранение блеска (как у микронаполненных); 2) Высокая прочность и устойчивость к износу (как у гибридных); 3) Малая полимеризационная усадка (0,6–1,5%); 4) Хорошие эстетические свойства; 5) Универсальность. Недостатки: высокая стоимость; технологически сложное производство; некоторые виды — «залипание» инструмента. Показания: универсальные — полости всех классов; фронтальные и жевательные зубы; высокоэстетичные реставрации; финишный слой при стратификации. Представители: Filtek Supreme Ultra (3M ESPE), Premise (Kerr), Grandio (VOCO), CeramX (Dentsply), Estet X HD (Dentsply), Filtek Ultimate (3M ESPE), Amaris (VOCO), Charisma Opal (Heraeus).", "opts":["Нанофиллеры 5–75 нм + нанокластеры; лучшая полировка + прочность; Filtek Supreme Ultra, Premise, Grandio","Крупные частицы, плохая полировка","Только для фронтальных зубов","Временные материалы"] },

{ "id":46, "cat":"Виды композитов", "q":"Компомеры. Ормокеры. Состав, свойства, недостатки, показания, представители.", "short":"Компомеры: СИЦ + композит (полиацидмодифицированные смолы). Выделяют фтор, проще применение. Ормокеры: органомодифицированная керамика — меньше мономера, меньше усадка.", "full":"Компомеры (polyacid-modified resin composites): Состав: мономеры (BisGMA, TEGDMA) + наполнитель-стекло, содержащий фтор + остатки карбоксильных групп. Схожи с СИЦ по включению ионообменного наполнителя, но отверждаются как композиты (светом). После полимеризации в условиях влажности среды происходит ограниченная ионообменная реакция → выделение фтора (меньше, чем у СИЦ). Свойства: хорошие эстетические; выделение фтора; более простой протокол, чем у СИЦ; достаточная прочность. Недостатки: меньше фтора, чем у СИЦ; ниже прочность, чем у полноценных композитов; не заменяют ни СИЦ, ни композиты полностью. Показания: молочные зубы; V класс; пришеечные дефекты у кариесактивных пациентов; у детей. Представители: Dyract AP (Dentsply), Compoglass F (Ivoclar Vivadent), F2000 (3M ESPE), Hytac (ESPE). Ормокеры (ORMOCER — ORganically MOdified CERamic): Состав: неорганическо-органическая сополимерная сеть (поликонденсат диоксида кремния + органические цепи с метакрилатными группами) + традиционный наполнитель. Механизм: реагируют так, что большая часть двойных связей включается в трёхмерную неорганическую сеть → значительно меньше свободного остаточного мономера → меньше токсичность. Свойства: меньшая усадка; биосовместимость; хорошая полируемость. Представители: Admira (VOCO), Definite (Degussa). Показания: те же, что для микрогибридных.", "opts":["Компомеры — СИЦ+композит (выделяют фтор, Dyract); ормокеры — органомодифицированная керамика (меньше мономера, Admira)","Только СИЦ без добавок","Только чистый композит","Только металл"] },

{ "id":47, "cat":"Виды композитов", "q":"Конденсируемые (пакуемые) композиты. Состав, свойства, недостатки, показания, представители.", "short":"Конденсируемые (packable): высокое содержание наполнителя, жёсткая консистенция. Имитируют амальгаму по обращению. Для жевательных зубов. Filtek P60, Solitaire, Prodigy Condensable.", "full":"Конденсируемые (packable, уплотняемые) композиты разработаны как альтернатива амальгаме для жевательных зубов. Состав: органическая матрица (BisGMA, BisEMA, TEGDMA) + высоконаполненный (до 80–85% по весу) наполнитель из крупных и средних частиц (1–10 мкм) специальной нерегулярной формы (волокнистые, нерегулярные частицы для создания жёсткой структуры материала). Свойства: высокая вязкость и жёсткость пасты (конденсируется штопфером, как амальгама); высокая прочность на сжатие; хорошая рентгеноконтрастность; устойчивость к жевательным нагрузкам. Недостатки: плохая полируемость (крупный наполнитель); трудно создать правильный контактный пункт (жёсткость мешает адаптации к матрице); плохая краевая адаптация в области придесневой стенки; эстетика значительно хуже нанонаполненных; полимеризационная усадка сохраняется. Показания: полости I и II классов жевательных зубов; восстановление жевательных зубов у пациентов с повышенной стираемостью; когда врач предпочитает технику конденсации. Представители: Filtek P60 (3M ESPE), Solitaire / Solitaire 2 (Heraeus), Prodigy Condensable (Kerr), SureFil (Dentsply), Alert (Jeneric Pentron).", "opts":["Высоконаполненные, жёсткая консистенция; для жевательных зубов, конденсация штопфером; Filtek P60, Solitaire","Жидкотекучие, пониженная вязкость","Только для фронтальных зубов","Гибридные для всех случаев"] },

{ "id":48, "cat":"Виды композитов", "q":"Жидкотекучие (flowable) композиты. Состав, свойства, недостатки, показания, представители.", "short":"Жидкотекучие: пониженное содержание наполнителя (37–55%), низкая вязкость. Адаптирующий слой, поддесневые полости, туннельный метод, фиссуры. Revolution, Filtek Flow, Tetric Flow.", "full":"Жидкотекучие (flowable, текучие) композиты: Состав: органическая матрица (BisGMA, TEGDMA, UDMA) + наполнитель 37–55% по объёму (микрогибридный, 0,5–3 мкм) — пониженное содержание по сравнению с обычными композитами; + дополнительные разбавители для снижения вязкости (дополнительный TEGDMA). Свойства: 1) Низкая вязкость — хорошо адаптируется ко дну и стенкам полости без пустот; 2) Высокая упругость — снижает полимеризационный стресс (демпфирующий эффект); 3) Хорошая краевая адаптация; 4) Удобство нанесения — из шприца или канюли. Недостатки: 1) Повышенная полимеризационная усадка (из-за меньшего наполнителя); 2) Более низкая прочность, чем у обычных гибридных; 3) Нельзя использовать как основной материал в полостях под нагрузкой. Показания: 1) Адаптирующий (буферный) первый слой на дно полости под основной композит (снижает C-фактор и стресс); 2) Поддесневые полости (V класс, придесневая стенка II класса) — где сложно адаптировать вязкий материал; 3) Туннельный метод препарирования; 4) Фиссуры (инвазивная герметизация); 5) Небольшие полости I и III классов; 6) Ремонт (починка) сколов реставраций. Представители: Flow-It (Jeneric Pentron), Revolution (Kerr), Filtek Flow / Filtek Supreme Ultra Flow (3M ESPE), Tetric Flow (Ivoclar Vivadent), Estelite Flow Quick (Tokuyama), Ice (SDI).", "opts":["Пониженный наполнитель 37–55%; адаптирующий слой, поддесневые полости, туннельный метод; Revolution, Filtek Flow","Конденсируемые жёсткой консистенции","Макронаполненные для жевательных","Только для фронтальных"] },

{ "id":49, "cat":"Техники пломбирования", "q":"«Сэндвич-техника» пломбирования. Показания, виды, методы.", "short":"Сэндвич-техника: СИЦ (основание) + композит (верхний слой). Открытая: СИЦ выходит на апроксимальную поверхность. Закрытая: СИЦ полностью перекрыт композитом. Показание — глубокий кариес II класса.", "full":"Сэндвич-техника (sandwich technique) — методика, при которой кариозная полость восстанавливается двумя материалами: СИЦ (нижний слой, «начинка») и композит (верхний слой, «хлеб»). Теоретическое обоснование: СИЦ обеспечивает химическую адгезию к дентину и выделение фтора (биологически активный материал); композит обеспечивает прочность, эстетику и сопротивление жевательным нагрузкам. Виды: 1) Открытая (open sandwich) сэндвич-техника: СИЦ накладывается на дно и придесневую стенку таким образом, что выходит на апроксимальную поверхность и контактирует с маргинальной десной; поверх накладывается композит, не перекрывающий апроксимальную часть СИЦ. Применяется при полостях II класса, когда придесневая стенка находится ниже десневого края или на уровне десны (трудно изолировать от влаги для адгезива). Методика: матрица и клин; СИЦ (классический или гибридный) на придесневую стенку и дно; после отверждения — адгезивная система и послойное нанесение композита. 2) Закрытая (closed sandwich) сэндвич-техника: СИЦ только на дно полости, не выходит на контактную поверхность, полностью перекрывается композитом. Применяется при глубоком кариесе (замещает большую часть дентина) при наддесневом расположении. Показания к сэндвич-технике: 1) Глубокий кариес с обширным поражением дентина; 2) Полости II класса с поддесневой придесневой стенкой (открытая); 3) Пациенты с высокой активностью кариеса; 4) Молочные зубы; 5) Невозможность полной изоляции (СИЦ менее чувствителен к влаге). Протокол закрытой техники: СИЦ (гибридный — Vitremer, Fuji II LC) → свет 20 с → адгезивная система → послойный композит.", "opts":["Открытая (СИЦ на десну) и закрытая (СИЦ под композит); при глубоком кариесе и поддесневой стенке II класса","Только один материал","Только СИЦ без композита","Только нанокомпозит"] },

{ "id":50, "cat":"Техники пломбирования", "q":"«Слоёная техника» пломбирования. Показания, используемые пломбы, механизм работы.", "short":"Слоёная техника (стратификация): нанесение разных оттенков и видов композита послойно для воспроизведения оптики естественного зуба. Опаковый дентин + прозрачная эмаль.", "full":"Слоёная техника (layering technique, стратификация) — послойное воспроизведение оптических характеристик естественного зуба различными оттенками и видами композита. Цель: достичь максимального эстетического результата путём имитации структуры зуба: дентин (опаковый, тёплый, цветной), эмаль (прозрачная, серая, светопреломляющая). Используемые материалы: Дентиновые оттенки: опаковые (A2D, A3D, B2D) — формируют основу объёма и цвет; имитируют дентин. Эмалевые оттенки: более прозрачные (A1E, A2E, прозрачный) — перекрывают дентин; имитируют эмаль. Дополнительно: белые непрозрачные пасты для имитации мамелонов; коричневые/серые для пигментированных трещин; эффект-оттенки (опал, флуоресцентный). Механизм работы: 1) Выбор цвета до препарирования (при увлажнённом зубе); 2) Препарирование, изоляция, медикаментозная обработка; 3) Цветовая диагностика (оттенок, насыщенность, прозрачность, флуоресценция, опалесценция); 4) Адгезивная система (по протоколу 4, 5 или 6 поколения); 5) Дентинный слой: первый слой — опаковый дентиновый оттенок на дно и стенки, полимеризация 20–40 с; 6) Нанесение эмалевых слоёв послойно с полимеризацией каждого; 7) Контурирование, финирование, полировка. Механизм снижения полимеризационного стресса: каждый слой ≤2 мм, меньший C-фактор, лучшая адаптация. Показания: полости III, IV классов; высокие эстетические требования при I, II, V классах; прямые виниры.", "opts":["Послойное нанесение разных оттенков (опаковый дентин + прозрачная эмаль) для имитации оптики зуба","Однослойное нанесение одного оттенка","Только один вид композита без стратификации","Только химическое отверждение без слоёв"] },

{ "id":51, "cat":"Анатомия зубов", "q":"Анатомические особенности строения коронки и корня 12 11|21 22 зубов (центральные и боковые верхние резцы).", "short":"11, 21 — крупнейшие резцы, лопатообразная коронка, 1 конусовидный прямой корень. 12, 22 — меньше, нёбная ямка выражена, корень сплюснутый.", "full":"Центральные верхние резцы (11, 21): Коронка: лопатообразной формы, трапециевидная; вестибулярная поверхность выпуклая, с вертикальными валиками (особенно у молодых); нёбная поверхность — чашеобразная, с краевыми гребнями и нёбным бугорком у шейки; медиальный угол режущего края — прямой или острый; дистальный — тупой, закруглённый. Признак угла коронки, признак кривизны коронки (наибольшая выпуклость вестибулярной поверхности смещена медиально). Режущий край горизонтальный с 2–3 мамелонами у молодых. Размеры: ширина коронки ~8,5 мм, длина ~10–11 мм, длина корня ~12–14 мм. Корень: один, конусовидный, прямой, хорошо выражен, 1 корневой канал. Боковые верхние резцы (12, 22): Коронка: аналогичной формы, но меньше по размерам (ширина ~6,5 мм); нёбная ямка глубже; режущий край несколько длиннее нёбной поверхности; дистальный угол более округлый. Нёбный бугорок выражен лучше, чем у центральных. Корень: один, конусовидный, сплющенный мезио-дистально, часто отклонён дистально. Слепая ямка (foramen caecum) нередко глубже, чем у 11, 21 — кариесвосприимчивая зона. Общие особенности для реставрации: режущий край центральных всегда ниже режущего края боковых; соотношение ширины 11:12 ≈ 1,3:1; при реставрации учитываются признак угла, признак кривизны и признак корня.", "opts":["Лопатообразная коронка, 1 конусовидный прямой корень (центральные крупнее, боковые меньше со сплюснутым корнем)","Два отдельных корня","Три бугра на жевательной поверхности","Трёхкорневые"] },

{ "id":52, "cat":"Анатомия зубов", "q":"Анатомические особенности строения коронки и корня 13|23 зубов (верхние клыки).", "short":"Клыки 13, 23: один мощный бугор, ромбовидная коронка, самый длинный корень в зубном ряду (16–17 мм). Один корень. Важная функция — опорная и направляющая.", "full":"Верхние клыки (13, 23): Коронка: ромбовидная или пятиугольная; один выраженный остроконечный бугор (кусп) на режущем крае, разделяющий режущий край на медиальный (более короткий) и дистальный (более длинный) скаты. Вестибулярная поверхность выпуклая, с выраженным медиальным и дистальным гребнями. Нёбная поверхность: нёбный бугорок, краевые гребни. Размеры коронки: ширина ~8 мм, длина ~10–11 мм. Самые крупные и выпуклые зубы в зубном ряду — «угловые зубы». У мужчин, как правило, более выражены бугры. Корень: один, самый длинный корень в постоянном зубном ряду (16–17 мм и более); конусовидный, мощный, боковые поверхности со слабыми продольными бороздками; чаще прямой, иногда слегка дистально изогнут; 1 корневой канал. Особенности: клыки обладают наилучшей ретенцией в альвеоле (самый длинный корень); выполняют направляющую функцию при боковых движениях нижней челюсти (клыковая или групповая функция); у пациентов с интактными клыками нижней челюсти нет боковых помех. Значение для реставрации: при значительном разрушении коронки — восстановление анатомической формы с учётом угловых признаков; опаковый дентинный слой + эмалевый прозрачный слой; длинный скос эмали при полостях III–IV классов.", "opts":["Один мощный бугор, ромбовидная коронка, самый длинный одиночный корень (16–17 мм)","Два корня (как у премоляров)","Плоская коронка без бугра","Три бугра (как у моляров)"] },

{ "id":53, "cat":"Анатомия зубов", "q":"Анатомические особенности строения коронки и корня 15 14|24 25 зубов (верхние премоляры).", "short":"14, 24 — 2 бугра (щёчный больше), чаще 2 корня (щёчный и нёбный). 15, 25 — 2 равных бугра, чаще 1 корень. Переходная форма между клыком и моляром.", "full":"Первые верхние премоляры (14, 24): Коронка: прямоугольная, два жевательных бугра — щёчный (buccal, вестибулярный, более крупный и высокий) и нёбный (palatal). Жевательная поверхность: центральная борозда разделяет бугры; мезиальная и дистальная ямки. Вестибулярная поверхность сходна с клыком. Размер: ширина ~7 мм, длина ~8,5 мм. Корень: как правило, 2 корня (у 70–90% пациентов) — щёчный и нёбный; щёчный — более узкий, нёбный — шире; расходятся в средней трети; реже 1 корень. При 1 корне — широкий, сплюснутый мезио-дистально, с глубокими продольными бороздками (легко расщепляется при экстракции). Вторые верхние премоляры (15, 25): Коронка: аналогична 14/24, но бугры более равные по размеру (щёчный лишь незначительно крупнее нёбного). Центральная борозда слегка извилистая. Размер: несколько меньше, чем 14/24. Корень: чаще 1 корень (у 50–75%), конусовидный, часто с продольными бороздками; реже 2 корня. Канал при 1 корне может раздваиваться в апикальной трети. Важно при эндодонтическом лечении. Особенности кариеса: контактные поверхности и фиссуры — кариесвосприимчивые зоны. При реставрации II класса — обязательна матрица и клин для восстановления контактного пункта.", "opts":["14/24: 2 бугра (щёчный крупнее), чаще 2 корня; 15/25: 2 равных бугра, чаще 1 корень","Один бугор, один корень (как клык)","Три корня (как моляры)","Один корень у всех верхних премоляров"] },

{ "id":54, "cat":"Анатомия зубов", "q":"Анатомические особенности строения коронки и корня 16|26 зубов (первые верхние моляры).", "short":"16, 26 — самые крупные боковые зубы, 4 бугра (иногда + бугор Карабелли), 3 корня (2 щёчных + 1 нёбный). Ключевой зуб окклюзии.", "full":"Первые верхние моляры (16, 26): Коронка: ромбовидная (шире вестибулярно); 4 жевательных бугра: мезиально-щёчный (наибольший), дистально-щёчный, мезиально-нёбный (нёбный, самый большой по объёму), дистально-нёбный (наименьший). Центральная ямка, Н-образная система борозд. Нередко имеется 5-й дополнительный бугор Карабелли на нёбной поверхности мезиально-нёбного бугра (признак антропологической изменчивости). Размеры: мезио-дистальный размер ~10,5 мм, вестибулярно-нёбный ~11,5 мм. Корней: 3 — 1) мезиально-щёчный (медиальный щёчный): широкий, сплюснутый, нередко имеет 2 канала (MB1 и MB2); 2) дистально-щёчный (латеральный щёчный): более тонкий, 1 канал; 3) нёбный: самый длинный и толстый (до 17–19 мм), конусовидный, 1 широкий канал. Особенности: первый верхний моляр — ключевой зуб окклюзии (первый прорезывается в 6 лет, часто теряется из-за кариеса); при реставрации полостей II класса особенно важно восстановление контактного пункта с 17 и 15. Mезиально-щёчный корень имеет наибольшую вариабельность анатомии каналов — важно при эндодонтии.", "opts":["4 бугра (иногда + Карабелли), 3 корня (2 щёчных + 1 нёбный), самый крупный боковой зуб верхней челюсти","2 корня","1 корень","5 бугров постоянно"] },

{ "id":55, "cat":"Анатомия зубов", "q":"Анатомические особенности строения коронки и корня 17|27 зубов (вторые верхние моляры).", "short":"17, 27 — меньше первого моляра. 4 бугра (иногда 3 — слиты дистальные), 3 корня, часто сближены/слиты. Варианты строения более разнообразны.", "full":"Вторые верхние моляры (17, 27): Коронка: аналогична первому моляру, но меньше по размерам (мезио-дистальный ~10 мм). Чаще 4 бугра, однако у значительной части (20–35%) дистально-нёбный бугор редуцирован или сливается с мезиально-нёбным → коронка принимает треугольную или овальную форму. В таком случае 3 бугра: мезиально-щёчный, дистально-щёчный и нёбный. Бугор Карабелли встречается реже, чем у 16/26. Центральная ямка, Н-образная или косая система борозд. Корни: 3 корня, аналогично первому моляру, но: корни обычно короче и нередко сближены, частично слиты или расходятся меньше; у 30–50% пациентов корни частично срощены; щёчные корни часто изогнуты в дистальном направлении; нёбный корень — конусовидный, менее мощный, чем у 16/26. Клиническое значение: второй верхний моляр созывает к 12–13 годам; значительно чаще первого имеет конфлюентные (слитые) корни → важно при эндодонтическом лечении и экстракции; при утрате 16/26 второй моляр перемещается мезиально. Кариозные полости: фиссуры жевательной поверхности и контактные поверхности.", "opts":["4 бугра (иногда 3 при слиянии дистальных), 3 корня (часто сближены/слиты), меньше первого моляра","1 корень","2 корня","5 бугров как у нижних"] },

{ "id":56, "cat":"Анатомия зубов", "q":"Анатомические особенности строения коронки и корня 42 41|31 32 зубов (нижние резцы).", "short":"41, 31 — самые маленькие зубы полости рта, узкая лопатообразная коронка, 1 тонкий сплюснутый корень. 42, 32 — чуть крупнее.", "full":"Центральные нижние резцы (41, 31): Коронка: самые маленькие зубы в постоянном прикусе; лопатообразная, но узкая (ширина ~5 мм); медиальный и дистальный углы почти одинаковы (слабее выражен признак угла по сравнению с верхними резцами); режущий край горизонтальный; вестибулярная и язычная поверхности относительно плоские; мамелоны у молодых. Корень: один, тонкий, сплюснутый мезио-дистально (ширина мезио-дистальная < вестибулярно-язычной); с глубокими продольными бороздками на медиальной и дистальной поверхностях → возможно 2 канала. Длина корня ~13 мм. Боковые нижние резцы (42, 32): Коронка: несколько шире и длиннее центральных нижних (ширина ~5,5 мм); признак угла коронки и признак кривизны выражены лучше, чем у 41/31; дистальный угол режущего края более закруглён. Корень: один, чуть длиннее, менее сплюснутый, чем у 41/31; реже 2 канала. Особенности реставрации: при пломбировании III класса — оральный доступ (вестибулярная поверхность более значима эстетически); учитывать, что нижние резцы уже верхних — признак угла коронки выражен слабее; скос эмали на вестибулярной поверхности обязателен для маскировки границы.", "opts":["Самые маленькие зубы, узкая лопатообразная коронка, 1 тонкий сплюснутый корень (41/31 меньше 42/32)","Два корня","Широкая коронка с двумя буграми","Трёхкорневые как моляры"] },

{ "id":57, "cat":"Анатомия зубов", "q":"Анатомические особенности строения коронки и корня 43|33 зубов (нижние клыки).", "short":"43, 33: один бугор, коронка уже верхнего клыка, один длинный корень (иногда расщеплённый в апикальной трети). Менее выпуклые, чем верхние клыки.", "full":"Нижние клыки (43, 33): Коронка: аналогична верхнему клыку, но уже (ширина ~7 мм; у верхнего ~8 мм); один бугор на режущем крае; вестибулярная поверхность менее выпуклая; нёбная (язычная) поверхность: нёбный бугорок и краевые гребни выражены слабее, чем у верхних клыков. Медиальный скат режущего края несколько короче дистального (аналогично верхним клыкам). Высота коронки ~10–11 мм. Корень: один, длинный, мощный (длина 14–16 мм); менее длинный, чем у верхнего клыка; коническая форма, боковые поверхности со слабыми продольными бороздками (или без них). У 10–25% пациентов корень может расщепляться в нижней трети на два отдельных корня (щёчный и язычный) → два корневых канала (важно при эндодонтическом лечении!). Клиническое значение: нижние клыки выполняют направляющую функцию; при их утрате возникают нарушения клыковой защиты; при реставрации пломбами III–IV классов — нёбный (язычный) доступ предпочтительнее для сохранения эстетики; широкий скос на вестибулярной поверхности.", "opts":["Один бугор, уже верхнего клыка, один длинный корень (иногда расщеплённый), длина 14–16 мм","Два корня всегда","Плоская коронка без бугра","Три бугра как у премоляров"] },

{ "id":58, "cat":"Анатомия зубов", "q":"Анатомические особенности строения коронки и корня 45 44|34 35 зубов (нижние премоляры).", "short":"44, 34 — щёчный бугор значительно крупнее язычного, один корень. 45, 35 — два равных бугра (или 3 у 35), один корень.", "full":"Первые нижние премоляры (44, 34): Коронка: округлая, 2 бугра — щёчный (значительно крупнее, достигает уровня верхних бугров при окклюзии) и язычный (мал, рудиментарен). Поперечный гребень между буграми на жевательной поверхности. Небольшие мезиальная и дистальная ямки. Ширина ~7 мм. Корень: один, конусовидный, слегка сплюснутый мезио-дистально, иногда раздвоен (в 10–25% случаев). Важная особенность: коронковая часть пульпарной камеры сдвинута щёчно и наклонена в сторону щёчного бугра → при препарировании риск вскрытия пульпы. Вторые нижние премоляры (45, 35): Коронка: крупнее первого нижнего премоляра, два (или три) приблизительно равных по высоте жевательных бугра: двубугорковый вариант (55–60%) — щёчный и язычный, разделённые центральной бороздой; трёхбугорковый вариант (40–45%) — у 35 чаще; хорошо выражены ямки и борозды. Ширина ~8 мм. Корень: один, хорошо развитый конусовидный, прямой или слегка дистально изогнутый; реже 2 корня. Клиническое значение: первые нижние премоляры сложны для препарирования (наклон коронки); при реставрациях I и II классов — обязателен контроль оккклюзионных контактов; форма бугров влияет на правила формирования полости.", "opts":["44/34: щёчный бугор крупнее язычного, 1 корень; 45/35: два равных бугра (или 3), 1 корень","Три корня как у верхних моляров","Один бугор как у резцов","Два корня у всех нижних премоляров"] },

{ "id":59, "cat":"Анатомия зубов", "q":"Анатомические особенности строения коронки и корня 46|36 зубов (первые нижние моляры).", "short":"46, 36 — самые крупные нижние жевательные зубы. 5 бугров: 3 щёчных + 2 язычных. 2 корня: медиальный (широкий, 2 канала) и дистальный (1–2 канала).", "full":"Первые нижние моляры (46, 36): Коронка: прямоугольная, наибольшая из нижних моляров. 5 жевательных бугров: 3 щёчных (мезиально-щёчный, дистально-щёчный, дистальный) и 2 язычных (мезиально-язычный и дистально-язычный). Центральная ямка, система Н- или крестообразных борозд. Мезиально-дистальный размер ~11–12 мм, щёчно-язычный ~10 мм. Корни: 2 корня — 1) Медиальный (мезиальный): широкий, сплюснутый, мезио-дистальный размер значительно меньше вестибулярно-язычного; очень часто 2 канала (ML и MB) с апикальным слиянием или раздельными апексами; 2) Дистальный: более широкий и округлый в поперечнике; чаще 1 широкий канал, иногда 2. Длина корней медиального ~14 мм, дистального ~13 мм. Оба корня расходятся в апикальной трети; дистальный немного короче. Клиническое значение: первые нижние моляры прорезываются первыми среди постоянных (в 6 лет) → наиболее часто поражаются кариесом; при реставрации I класса — восстановление всей системы фиссур; II класса — матрица и клин с учётом плотного контакта 46 с 47 и 45; сложная анатомия каналов медиального корня — важно при эндодонтии.", "opts":["5 бугров (3 щёчных + 2 язычных), 2 корня — медиальный (чаще 2 канала) и дистальный","3 корня как у верхних моляров","4 бугра как у вторых нижних моляров","1 корень"] },

{ "id":60, "cat":"Анатомия зубов", "q":"Анатомические особенности строения коронки и корня 47|37 зубов (вторые нижние моляры).", "short":"47, 37 — меньше первого нижнего моляра. 4 бугра (2 щёчных + 2 язычных). 2 корня, нередко сближены или слиты. Вариабельность строения высока.", "full":"Вторые нижние моляры (47, 37): Коронка: несколько меньше первого нижнего моляра (мезио-дистально ~10–11 мм). Чаще 4 бугра: 2 щёчных (мезиально-щёчный и дистально-щёчный) и 2 язычных (мезиально-язычный и дистально-язычный). Борозды образуют крестообразную или Н-образную систему; центральная ямка. Реже 5-бугорковый вариант (сохранён дистальный буграл, аналогично первому моляру). Корни: 2 корня — медиальный и дистальный; оба часто более параллельные, менее расходящиеся, чем у 46/36; нередко частично или полностью слиты (у 30–50%) → единый конусообразный корень с продольной бороздкой; при слиянии — один широкий канал. У 47/37 корни чаще изогнуты дистально. Длина корней несколько меньше, чем у 46/36. Клиническое значение: прорезываются в 11–13 лет; нередко ретинированы или частично ретинированы («восьмёрки»); при слитых корнях — нет возможности разделить корни при депульпировании; сложность при реставрации II класса из-за близости к 48; контактный пункт с 47 формируется позже, чем с 45–46.", "opts":["4 бугра (2 щёчных + 2 язычных), 2 корня (часто сближены/слиты), меньше первого нижнего моляра","3 корня как у верхних","5 бугров всегда","1 корень"] },

{ "id":61, "cat":"Практика", "q":"Препарирование кариозных полостей I класса на фантомах.", "short":"I класс — жевательные поверхности моляров и премоляров, слепые ямки. Форма: ящикообразная (амальгама) или грушевидная (композит). Боры: конусовидный (фиссуротомия), шаровидный (некроэктомия).", "full":"Практическая отработка препарирования полостей I класса на фантоме: Цель: выработка навыков последовательного препарирования и формирования кариозной полости в соответствии с принципами Блека или адгезивного препарирования. Этапы: 1) Раскрытие: алмазным фиссурным или шаровидным бором, турбинным наконечником; удаление нависающих краёв эмали. 2) Расширение: конусовидным алмазным бором d=1 мм, иссечение фиссур на глубину 1–1,5 мм; ширина бороздки 0,7–0,8 мм; без создания острых углов. 3) Некроэктомия: шаровидным твёрдосплавным/стальным бором большого размера на малой скорости или экскаватором; движения от дна к стенкам; проверка кариес-маркером. 4) Формирование: а) для амальгамы — плоское дно (обратноконусовидный бор), прямые углы, глубина ≥1,5 мм, скос эмали 45°; б) для композита — плавные переходы, грушевидная форма, скос ≥1 мм. 5) Финирование: твёрдосплавный финир 10–12 граней или эмалевые ножи; гладкие края. Требования к сформированной полости I класса: всё пораженное иссечено; дно плотное; стенки отвесные (для амальгамы) или слегка расходящиеся; нет нависающей эмали; граница не на окклюзионных контактах; симметрия и чистота форм.", "opts":["Жевательные поверхности и ямки; ящикообразная или грушевидная; конусовидный бор для фиссур, шаровидный для некроэктомии","Контактные поверхности","Пришеечная область","Только режущий край"] },

{ "id":62, "cat":"Практика", "q":"Препарирование кариозных полостей II класса на фантомах.", "short":"II класс — контактные поверхности моляров и премоляров. МО, ОД или МОД полость. Обязательны матрица и клин. Сложность: придесневая стенка, изоляция.", "full":"Практическая отработка препарирования полостей II класса: Особенности: доступ создаётся через жевательную поверхность (ОД или МО или МОД). Необходима защита соседнего зуба. Этапы: 1) Установка металлической разделительной полоски для защиты соседнего зуба; 2) Раскрытие окклюзиональной части: фиссурным бором, как I класс; 3) Создание апроксимального ящика (box): пиковидным или шаровидным алмазным бором; ширина ≥1,5 мм; выводится на вестибулярную и оральную сторону; придесневая стенка ≥0,5 мм ниже контактного пункта; 4) Некроэктомия; 5) Формирование: придесневая стенка перпендикулярна длинной оси зуба (для амальгамы — строго горизонтально; для композита — скос); боковые стенки апроксимального ящика слегка расходящиеся или параллельные; 6) Финирование, скос. Матрица и клин: клин вводится с вестибулярной стороны под матрицу в межзубной промежуток; отжимает десну и прижимает матрицу к шейке зуба; при открытой сэндвич-технике СИЦ вносится до матрицы. Критерии оценки: нет нависающих краёв; придесневая стенка сформирована; ящик симметричный и достаточной глубины; контактный пункт восстановлен.", "opts":["Контактные поверхности с доступом через жевательную; апроксимальный ящик, матрица, клин","Только жевательные ямки без апроксимальной части","Пришеечная область без жевательной","Режущий край фронтальных"] },

{ "id":63, "cat":"Практика", "q":"Препарирование кариозных полостей III класса на фантомах.", "short":"III класс — контактные поверхности фронтальных зубов без угла. Оральный или вестибулярный доступ. Треугольная форма. Длинный скос эмали на вестибулярной стороне.", "full":"Практическая отработка препарирования полостей III класса: Локализация: контактные поверхности резцов и клыков без нарушения режущего края и угла коронки. Доступ: преимущественно с оральной (нёбной/язычной) стороны — сохраняется эстетика вестибулярной поверхности. При обширном поражении или для улучшения эстетики — вестибулярный доступ. Этапы: 1) Раскрытие: шаровидным алмазным бором небольшого диаметра; 2) Расширение: до здоровых тканей; при профилактическом пломбировании — минимальное; 3) Некроэктомия: тщательная, с контролем кариес-маркером; 4) Формирование: треугольная форма с вершиной к режущему краю; стенки отвесные; для адгезивного препарирования — сглаженные углы; 5) Финирование: длинный скос эмали на вестибулярной стенке — 3–4 волны (для плавного перехода реставрации и маскировки границы). Пломбирование композитом: нанесение через прозрачную матрицу; опаковый слой на дентин; прозрачный слой — эмаль; полировка — при необходимости штрипсами. Критерии: отсутствие нависающих краёв; плавный скос; чёткое восстановление контурных точек; без нарушения режущего края.", "opts":["Контактные поверхности фронтальных без угла; треугольная форма; оральный доступ; длинный скос вестибулярной эмали","С разрушением угла коронки (это IV класс)","Пришеечная область","Жевательная поверхность"] },

{ "id":64, "cat":"Практика", "q":"Препарирование кариозных полостей IV класса на фантомах.", "short":"IV класс — контактные поверхности с разрушением угла. Нёбный доступ + восстановление угла. Ретенционные пазы. Силиконовый ключ для воспроизведения нёбной поверхности.", "full":"Практическая отработка препарирования полостей IV класса: Локализация: контактные поверхности резцов и клыков с нарушением угла коронки и/или режущего края — наиболее сложные реставрации. Подготовка: до препарирования снять силиконовый оттиск (ключ) нёбной поверхности зуба для последующего воспроизведения нёбной стенки. Этапы: 1) Раскрытие; 2) Расширение в пределах поражения; 3) Некроэктомия; 4) Формирование: длинный волнистый скос эмали на вестибулярной поверхности (≥3 мм, 3–4 волны); ретенционные пазы (пины или пазы в дентине) при значительном разрушении (>1/3 коронки); при необходимости — парапульпарные штифты; сглаженные контуры для адгезивного пломбирования. 5) Финирование длинного скоса эмали. Пломбирование: нёбная стенка восстанавливается первой (через силиконовый ключ или с помощью матрицы); нанесение опакового слоя на дентин; прозрачный слой на эмаль; воспроизведение мамелонов; полировка. Критерии: восстановление угла и режущего края; плавный скос; имитация оптики зуба; достаточная прочность (слой ≥2 мм в нагружаемых зонах).", "opts":["Контактные поверхности с разрушением угла коронки; длинный волнистый скос; ретенционные пазы; силиконовый ключ","Без разрушения угла (это III класс)","Пришеечная область","Жевательная поверхность"] },

{ "id":65, "cat":"Практика", "q":"Препарирование кариозных полостей V класса на фантомах.", "short":"V класс — пришеечная область. Бобовидная форма, вестибулярный или оральный доступ. Ретракция десны. Открытая сэндвич-техника при поддесневой стенке.", "full":"Практическая отработка препарирования полостей V класса: Локализация: пришеечная область всех зубов (вестибулярные и оральные поверхности). Особенности: близость к десне; часто поддесневое расположение; ограниченный доступ; сложная изоляция. Подготовка: ретракция десны ретракционной нитью или ретрактором; установка клина при необходимости; изоляция ватными валиками и слюноотсосом; при возможности — коффердам. Этапы: 1) Раскрытие: шаровидным или грушевидным алмазным бором; 2) Расширение: минимальное, только в пределах поражения; 3) Некроэктомия; 4) Формирование: бобовидная форма; придесневая стенка горизонтальная; при применении адгезивных материалов — без ретенционных подрезок; при применении амальгамы — обратноконусовидным бором создать подрезки; 5) Финирование: мелкозернистым алмазным бором, скос на аксиальных стенках. Пломбирование: при поддесневой придесневой стенке — открытая сэндвич-техника (СИЦ → адгезивная система → композит); при наддесневой — адгезивная система + послойный композит или компомер. Критерии: правильная бобовидная форма; чёткие края; хорошее краевое прилегание; восстановленный контур коронки.", "opts":["Пришеечная область; бобовидная форма; ретракция десны; открытая сэндвич-техника при поддесневой стенке","Контактные поверхности","Жевательная поверхность","Режущий край"] },

{ "id":66, "cat":"Практика", "q":"Препарирование кариозных полостей VI класса на фантомах.", "short":"VI класс — вершины бугров и режущие края. Чашеобразная форма, минимальная инвазивность. Шаровидный бор. Нанонаполненный или микрогибридный композит.", "full":"Практическая отработка препарирования полостей VI класса: Локализация: вершины жевательных бугров моляров и премоляров, режущие края резцов и клыков. Особенности: дефекты небольшие, чашеобразные; дно часто пигментировано (тёмно-коричневое); минимально-инвазивный подход. Этапы: 1) Раскрытие: шаровидным алмазным бором небольшого диаметра (0,8–1,0 мм); 2) Расширение: только в пределах поражения; 3) Некроэктомия: тщательное удаление пигментированного мягкого дентина экскаватором или стальным шаровидным бором; 4) Формирование: чашеобразная форма (круглая или овальная); стенки слегка расходящиеся; без острых углов; без ретенционных подрезок (адгезивная фиксация); 5) Финирование: мелкозернистый алмазный бор по краям. Пломбирование: адгезивная система; нанонаполненный или микрогибридный световой композит (обеспечивает полировку и износостойкость на буграх); нанесение одной порцией (небольшой объём); полимеризация 20–40 с; контроль окклюзии. Критерии: чёткие края; без нависающих краёв; форма воспроизводит естественный контур бугра; нет преждевременных окклюзионных контактов.", "opts":["Вершины бугров и режущие края; чашеобразная форма; минимальная инвазивность; нано/микрогибридный композит","Пришеечная область","Контактные поверхности","Жевательные ямки (это I класс)"] },

{ "id":67, "cat":"Практика", "q":"Медикаментозная обработка кариозной полости на фантомах.", "short":"Обработка: промывание H₂O₂ (3%) → ополаскивание водой → 0,05–0,5% хлоргексидин или 70% спирт → просушивание. Цель: дезинфекция, удаление дентинных опилок.", "full":"Медикаментозная обработка — этап после некроэктомии и формирования полости перед нанесением изолирующей и лечебной прокладок или адгезивной системы. Цель: дезинфекция полости (уменьшение числа микроорганизмов); удаление дентинного смазанного слоя (smear layer) при подготовке к адгезии; предотвращение инфицирования пульпы. Основные препараты: 1) Хлоргексидин биглюконат 0,05–0,5% (водный раствор): антисептик широкого спектра; наносится на 30–60 с; хорошо совместим с адгезивными системами; не мешает полимеризации; рекомендуется как первый выбор. 2) 3% перекись водорода: механическое очищение пузырьками кислорода; антибактериальное действие. 3) 70% этиловый спирт: дезинфицирует и слегка подсушивает. Не рекомендуется при глубоком кариесе (раздражает обнажённые дентинные канальцы). 4) 0,5–1% раствор йода: антисептик, но может окрашивать ткани. Порядок: промыть водой → просушить слабой струёй воздуха → нанести антисептик на 30–60 с → промыть → просушить (осторожно, без пересушивания дентина!). Ошибки: пересушивание дентина → схлопывание коллагеновых волокон → нарушение адгезии; избыточная экспозиция агрессивных антисептиков → химическое повреждение пульпы.", "opts":["Хлоргексидин 0,05–0,5% или H₂O₂ 3% на 30–60 с → промыть → просушить; дезинфекция и удаление опилок","Только дистиллированная вода","Только спирт 70%","Только перекись водорода"] },

{ "id":68, "cat":"Практика", "q":"Высушивание кариозной полости на фантомах.", "short":"Осушить ватными шариками и слабой воздушной струёй (не пересушивать!). Дентин должен быть слегка влажным (блестящим) для адгезии. Пересушивание разрушает коллаген гибридной зоны.", "full":"Высушивание (осушение) кариозной полости — важный технологический этап, непосредственно предшествующий нанесению адгезивной системы или пломбировочного материала. Цель: удалить избыток влаги, не пересушивая дентин. Методика: 1) Промокнуть полость ватными шариками — основной способ удаления влаги; 2) Слабой (!) струёй воздуха из пистолета установки — дополнительно, с расстояния 10–15 см; 3) Эмаль — можно высушить интенсивнее; дентин — только слегка. Критерий правильного высушивания: дентин должен оставаться слегка блестящим (слегка влажным) — «moist bonding» — влажное бондирование. При правильно проведённом высушивании дентин: тёмный, блестящий, с матовым оттенком; коллагеновые волокна раскрыты и способны к инфильтрации праймером. Ошибки: 1) Пересушивание: дентин белеет, матовеет → коллагеновые волокна слипаются («коллапс») → праймер не может пропитать → гибридная зона не образуется → плохая адгезия → постоперативная чувствительность. Признак пересушивания — белесоватость дентина. Если произошло — смочить дентин дистиллированной водой или специальным увлажнителем (Aqua-Prep, EDTA-раствор) на несколько секунд. 2) Недостаточное высушивание (влажность избыточна): вода мешает полимеризации → слабая адгезия. Для СИЦ: дентин может быть чуть влажнее, чем для композитов (СИЦ гидрофильны).", "opts":["Ватными шариками + слабая воздушная струя; дентин остаётся слегка влажным/блестящим; пересушивание разрушает адгезию","Только сильная воздушная струя до белизны дентина","Только ватными шариками без воздуха","Высушивание не нужно"] },

{ "id":69, "cat":"Практика", "q":"Восстановление полости композитами химического отверждения.", "short":"Химические: смешать в равных пропорциях (1:1) базу и катализатор пластмассовым шпателем, внести в полость за один приём, не светить. Коррекция до начала полимеризации. Время твердения 3–7 мин.", "full":"Пломбирование полости химически отверждаемым (самоотверждаемым) композитом: Подготовка полости: стандартная (препарирование, медикаментозная обработка, изолирующая/лечебная прокладка). Применение адгезивной системы (при использовании современных ХО-композитов): нанесение химически отверждаемой адгезивной системы (химический вариант 4-го поколения); протравливание 37% H₃PO₄ → промыть → просушить → праймер → бонд → выдержка 30–60 с (без полимеризации светом). Приготовление материала: 1) Отмерить равные части базы и катализатора (1:1) на блоке или стеклянной пластине; 2) Смешать пластиковым (не металлическим!) шпателем быстрыми движениями в течение 30–45 с до однородной консистенции и цвета; 3) Внести в полость одной порцией (не слоями!); 4) Сформировать пломбу инструментом (штопфером, гладилкой) до начала схватывания; 5) Удалить излишки; 6) Не использовать фотополимеризатор — свет не нужен. Твердение: 3–7 мин при температуре тела. Обработка пломбы (после полимеризации): контроль окклюзии; шлифование и полировка твёрдосплавными финирами и дисками. Особенности: ограниченное рабочее время; нельзя вносить второй порцией; аминовое пожелтение со временем.", "opts":["Смешать 2 пасты 1:1 пластиковым шпателем; внести одной порцией без света; коррекция до схватывания; 3–7 мин твердения","Световая полимеризация 20–40 с","Послойное нанесение с полимеризацией","Нагрев до жидкого состояния"] },

{ "id":70, "cat":"Практика", "q":"Восстановление полости композитами светового отверждения.", "short":"Адгезивная система (протравка → праймер → бонд → свет 10–20 с) → нанесение слоями ≤2 мм → полимеризация каждого слоя 20–40 с → контурирование → полировка.", "full":"Пломбирование световым (фотополимеризуемым) композитом — основная методика реставрации в современной терапевтической стоматологии: Этапы: 1) Выбор цвета (до начала всех манипуляций, при увлажнённом зубе и при дневном свете); 2) Препарирование полости, изоляция от слюны; 3) Медикаментозная обработка, высушивание; 4) Нанесение лечебной и/или изолирующей прокладки (при необходимости); 5) Адгезивная система (4 или 5 поколения): а) протравливание 37% H₃PO₄: эмаль 15–30 с, дентин 15 с; б) промыть 15–30 с; в) просушить (дентин — слегка влажный); г) нанести праймер (для 4-го поколения) и просушить; д) нанести бонд, просушить от растворителя, полимеризовать 10–20 с; 6) Внесение первого слоя текучего композита (адаптирующий слой, ~0,5 мм на дно); полимеризация 20–40 с; 7) Послойное нанесение основного композита слоями ≤2 мм; полимеризация каждого слоя 20–40 с с разных сторон (особенно при глубоких полостях); 8) Моделирование анатомической формы (штопфером, гладилкой, кисточкой); 9) Финирование (твёрдосплавные финиры 10–12 граней): контурирование, удаление излишков; 10) Шлифование и полировка (финиры 16–30 граней, диски от грубых к мелким, пасты); 11) Контроль окклюзии (артикуляционная бумага), шлифование точек преждевременного контакта.", "opts":["Адгезив → слои ≤2 мм с полимеризацией 20–40 с → финирование → полировка","Одним слоем без полимеризации","Химическое отверждение без света","Без адгезива прямо на дентин"] },

{ "id":71, "cat":"Практика", "q":"Пломбирование кариозных полостей текучими (flowable) композитными материалами.", "short":"Текучий первый слой ~0,5–1 мм на дно полости → полимеризация 20–40 с → основной микрогибридный/нанонаполненный композит слоями ≤2 мм. Текучий снижает стресс и улучшает адаптацию.", "full":"Методика пломбирования с применением жидкотекучих (flowable) композитов: Показания: адаптирующий первый слой при всех полостях (снижает полимеризационный стресс); пломбирование небольших полостей (I, III классов); поддесневые стенки (V класс, придесневая II класса); туннельный метод; фиссурная герметизация. Протокол: 1) Препарирование, изоляция, медикаментозная обработка; 2) Адгезивная система (полный протокол 4 или 5 поколения — протравливание, праймер, бонд); 3) Нанесение жидкотекучего первого слоя на дно полости из канюли или шприца тонким слоем 0,5–1 мм; 4) Распределить по дну и стенкам инструментом, чтобы убрать пузыри; 5) Полимеризация 20–40 с; 6) Нанесение основного микрогибридного или нанонаполненного композита слоями ≤2 мм; полимеризация каждого слоя; 7) Моделирование анатомической формы; 8) Финирование и полировка. Механизм действия адаптирующего слоя: жидкотекучий композит обладает упругостью и модулем эластичности ниже, чем у обычных гибридных → демпфирует полимеризационный стресс → лучшее краевое прилегание. Важно: не использовать текучий материал как основной наполнитель в нагружаемых зонах (низкая прочность).", "opts":["Текучий слой 0,5–1 мм на дно (адаптирующий) → полимеризация → основной слоями ≤2 мм; снижает стресс и улучшает адаптацию","Весь объём заполнить текучим","Без адгезива сразу текучий","Конденсируемый без текучего"] },

{ "id":72, "cat":"Практика", "q":"Препарирование «Туннельным» методом.", "short":"Туннельный метод: доступ через краевой гребень (marginal ridge) жевательной поверхности к апроксимальному кариесу без разрушения контактного пункта. Пломбирование — СИЦ или текучий композит через канюлю.", "full":"Практическая отработка туннельного метода препарирования: Показания: начальный и средний апроксимальный кариес (D1–D2), без обширного поражения, когда контактный пункт сохранён. Этапы: 1) Рентгенологическая оценка: установить глубину и точную локализацию апроксимального кариеса; оценить расстояние от краевого гребня до очага; 2) Изоляция зуба, защита соседнего; 3) Создание доступа: шаровидным или грушевидным алмазным бором d=0,8–1,0 мм через краевой гребень жевательной поверхности; 4) Расширение туннеля: тонкими шаровидными борами малого диаметра (угловой наконечник, малая скорость) направлять к очагу кариеса по краю эмали; 5) Некроэктомия: мини-экскаватором или маленьким шаровидным бором, движения от дна к стенкам; 6) Высушивание; 7) Пломбирование: СИЦ (химического или светового отверждения) или текучий композит вносится через канюлю или мини-штопфер поэтапно; для текучего — сначала нанести адгезивную систему; 8) Полимеризация (для светоотверждаемых) через жевательную поверхность с нескольких сторон; 9) Восстановление жевательной поверхности (если нарушена): обычным послойным методом; 10) Полировка. Ошибки: недостаточное удаление кариеса (низкий контроль); перфорация в сторону пульпы; недостаточная полимеризация.", "opts":["Доступ через краевой гребень жевательной поверхности к апроксимальному кариесу; контактный пункт не разрушается; СИЦ или текучий","Через вестибулярную поверхность (BATE)","Через жевательную до полного разрушения краевого гребня","ART-методика без бормашины"] },

{ "id":73, "cat":"Практика", "q":"Пломбирование «Открытой» сэндвич техникой.", "short":"Открытая сэндвич-техника: СИЦ наносится на дно и придесневую стенку, выходит на апроксимальную поверхность (контактирует с десной). Затем — адгезив + послойный композит без перекрытия апроксимального СИЦ.", "full":"Пломбирование открытой сэндвич-техникой: Показание: полости II класса, когда придесневая стенка находится на уровне или ниже десневого края (поддесневое расположение) → невозможно обеспечить сухость для адгезива в зоне придесневой стенки. Последовательность: 1) Препарирование полости II класса (МО, ОД, МОД) с апроксимальным ящиком; 2) Установка матрицы и клина (или кольца); 3) Ретракция десны (при необходимости); 4) Кондиционирование дентина (полиакриловая кислота 10–25% или EDTA) — для улучшения адгезии СИЦ; 5) Внесение СИЦ (химического или светового отверждения) на дно и придесневую стенку апроксимального ящика; СИЦ вносится до уровня дна ящика или чуть выше, заполняя весь апроксимальный ящик; выходит на апроксимальную (контактную) поверхность и граничит с десной; 6) Полимеризация СИЦ (при световом) или выдержка (при химическом); 7) Снятие матрицы; 8) Кондиционирование/протравливание поверхности СИЦ (35–37% H₃PO₄, 15 с) — для адгезии к СИЦ; 9) Адгезивная система на всю оставшуюся поверхность (не на апроксимальный СИЦ); 10) Послойное нанесение композита в окклюзиональную часть; 11) Финирование и полировка. Преимущества: лучшая биологическая совместимость у десневого края; выделение фтора в области шейки.", "opts":["СИЦ на дно и придесневую стенку, выходит на апроксимальную поверхность к десне; затем адгезив + композит в окклюзиональную часть","Закрытая — СИЦ полностью перекрыт","Только СИЦ без композита","Только композит без СИЦ"] },

{ "id":74, "cat":"Практика", "q":"Пломбирование «Закрытой» сэндвич техникой.", "short":"Закрытая сэндвич-техника: СИЦ (гибридный) только на дно полости, не выходит на контактную поверхность, полностью перекрывается слоем адгезива и послойным композитом.", "full":"Пломбирование закрытой сэндвич-техникой: Показание: глубокий кариес при наддесневом расположении придесневой стенки; значительное поражение дентина, требующее замены большой части дентина биоактивным материалом. Последовательность: 1) Препарирование полости (I, II, V классов); 2) Изоляция, медикаментозная обработка; 3) При необходимости — лечебная прокладка из Са(ОН)₂ точечно на самый глубокий участок; 4) Кондиционирование дентина (полиакриловая кислота); 5) Внесение гибридного СИЦ (светоотверждаемого — для быстроты: Vitremer, Fuji II LC) на дно и боковые стенки (не выходит на контактную поверхность и не доходит до краёв полости); толщина СИЦ — около 1–2 мм; 6) Полимеризация СИЦ (20–40 с); 7) Обработка поверхности СИЦ: протравливание 37% H₃PO₄ 15–20 с → промыть → просушить; 8) Адгезивная система (полный протокол); 9) Нанесение первого тонкого слоя текучего или стандартного композита на стенки полости; полимеризация; 10) Послойное нанесение микрогибридного или нанонаполненного композита (≤2 мм); полимеризация каждого; 11) Моделирование формы, финирование, полировка. Преимущества: биологическая активность СИЦ в зоне глубокого дентина; профилактика рецидивного кариеса; меньшая усадка в объёме благодаря СИЦ-основанию.", "opts":["СИЦ только на дно, не выходит на контактную поверхность, полностью перекрыт адгезивом и послойным композитом","Открытая — СИЦ у десны","Только СИЦ на всю полость","Только нанокомпозит без СИЦ"] },

let learnedSet = new Set(JSON.parse(localStorage.getItem('learned') || '[]'));
let quizQuestions = [];
let quizIdx = 0;
let quizScore = 0;

function saveProgress() {
  try { localStorage.setItem('learned', JSON.stringify([...learnedSet])); } catch(e){}
  updateStats();
}

function updateStats() {
  document.getElementById('learned-count').textContent = learnedSet.size;
  document.getElementById('pct-count').textContent = Math.round(learnedSet.size/75*100)+'%';
}

function showSection(name, btn) {
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('visible'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('section-'+name).classList.add('visible');
  btn.classList.add('active');
}

function renderCards(list) {
  const grid = document.getElementById('cards-grid');
  grid.innerHTML = '';
  if(!list.length) { grid.innerHTML='<div class="no-results">Ничего не найдено</div>'; return; }
  list.forEach(q => {
    const isLearned = learnedSet.has(q.id);
    const div = document.createElement('div');
    div.className = 'card' + (isLearned?' learned':'');
    div.dataset.id = q.id;
    div.innerHTML = `
      <div class="card-num">Вопрос ${q.id} · ${q.cat}</div>
      <div class="card-q">${q.q}</div>
      <div class="card-divider"></div>
      <div class="card-answer-short">${q.short}</div>
      <div style="padding:0 1.2rem 0.5rem">
        <button class="expand-btn" onclick="toggleExpand(${q.id}, event)">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg>
          Развёрнутый ответ
        </button>
      </div>
      <div class="card-full" id="full-${q.id}">${q.full}</div>
      <div class="card-actions">
        <button class="tag-learned" onclick="toggleLearned(${q.id}, event)">${isLearned?'✓ Изучено':'Отметить изученным'}</button>
      </div>
    `;
    grid.appendChild(div);
  });
}

function toggleExpand(id, e) {
  e.stopPropagation();
  const el = document.getElementById('full-'+id);
  const btn = e.target.closest('.expand-btn');
  const isOpen = el.classList.toggle('open');
  btn.querySelector('svg').style.transform = isOpen ? 'rotate(180deg)' : '';
}

function toggleLearned(id, e) {
  e.stopPropagation();
  if(learnedSet.has(id)) learnedSet.delete(id);
  else learnedSet.add(id);
  saveProgress();
  const card = document.querySelector(`.card[data-id="${id}"]`);
  const btn = card.querySelector('.tag-learned');
  if(learnedSet.has(id)) { card.classList.add('learned'); btn.textContent='✓ Изучено'; }
  else { card.classList.remove('learned'); btn.textContent='Отметить изученным'; }
}

function filterCards() {
  const q = document.getElementById('search').value.toLowerCase();
  const cat = document.getElementById('cat-filter').value;
  const status = document.getElementById('status-filter').value;
  const filtered = QUESTIONS.filter(item => {
    const matchQ = !q || item.q.toLowerCase().includes(q) || item.short.toLowerCase().includes(q);
    const matchCat = !cat || item.cat.includes(cat);
    const matchStatus = !status || (status==='learned'&&learnedSet.has(item.id)) || (status==='new'&&!learnedSet.has(item.id));
    return matchQ && matchCat && matchStatus;
  });
  renderCards(filtered);
}

// QUIZ
function startQuiz() {
  const cat = document.getElementById('quiz-cat').value;
  const num = parseInt(document.getElementById('quiz-num').value) || 10;
  const learnedOnly = document.getElementById('quiz-learned-only').checked;
  let pool = QUESTIONS.filter(q => {
    const matchCat = !cat || q.cat.includes(cat);
    const matchLearned = !learnedOnly || learnedSet.has(q.id);
    return matchCat && matchLearned;
  });
  if(pool.length < 3) { alert('Недостаточно вопросов по выбранным критериям. Уменьшите фильтры.'); return; }
  pool = shuffle(pool).slice(0, Math.min(num, pool.length));
  quizQuestions = pool;
  quizIdx = 0;
  quizScore = 0;
  document.getElementById('quiz-setup').style.display='none';
  document.getElementById('quiz-active').style.display='block';
  document.getElementById('quiz-score-end').classList.remove('visible');
  showQuestion();
}

function shuffle(arr) { return [...arr].sort(()=>Math.random()-0.5); }

function showQuestion() {
  const q = quizQuestions[quizIdx];
  const total = quizQuestions.length;
  document.getElementById('quiz-counter').textContent = `Вопрос ${quizIdx+1} из ${total}`;
  document.getElementById('quiz-score-live').textContent = `✓ ${quizScore}`;
  document.getElementById('quiz-progress').style.width = (quizIdx/total*100)+'%';
  document.getElementById('quiz-q-num').textContent = `Вопрос ${q.id} · ${q.cat}`;
  document.getElementById('quiz-q-text').textContent = q.q;
  const opts = document.getElementById('quiz-options');
  opts.innerHTML = '';
  const correct = q.opts[0];
  const shuffled = shuffle(q.opts);
  shuffled.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'quiz-opt';
    btn.textContent = opt;
    btn.onclick = () => answerQuestion(opt, correct, q.short);
    opts.appendChild(btn);
  });
  document.getElementById('quiz-explanation').classList.remove('open');
  document.getElementById('quiz-explanation').textContent = '';
  document.getElementById('quiz-next').classList.remove('visible');
}

function answerQuestion(chosen, correct, explanation) {
  const btns = document.querySelectorAll('.quiz-opt');
  btns.forEach(b => {
    b.disabled = true;
    if(b.textContent === correct) b.classList.add('correct');
    else if(b.textContent === chosen && chosen !== correct) b.classList.add('wrong');
  });
  if(chosen === correct) quizScore++;
  document.getElementById('quiz-score-live').textContent = `✓ ${quizScore}`;
  const exp = document.getElementById('quiz-explanation');
  exp.textContent = chosen === correct ? '✓ Верно! ' + explanation : '✗ Неверно. ' + explanation;
  exp.classList.add('open');
  document.getElementById('quiz-next').classList.add('visible');
}

function nextQuestion() {
  quizIdx++;
  if(quizIdx >= quizQuestions.length) { endQuiz(); return; }
  showQuestion();
}

function endQuiz() {
  document.getElementById('quiz-active').style.display='none';
  const score = document.getElementById('quiz-score-end');
  const total = quizQuestions.length;
  const pct = total > 0 ? Math.round(quizScore/total*100) : 0;
  document.getElementById('score-num').textContent = `${quizScore} / ${total}`;
  const emoji = pct>=80?'🏆':pct>=60?'👍':pct>=40?'📚':'💪';
  const comment = pct>=80?'Отличный результат! Продолжай в том же духе.':pct>=60?'Хороший результат, но есть что повторить.':pct>=40?'Неплохо, но нужно больше практики.':'Повтори материал и попробуй снова!';
  document.getElementById('score-emoji').textContent = emoji;
  document.getElementById('score-comment').textContent = comment;
  score.classList.add('visible');
}

function resetQuiz() {
  document.getElementById('quiz-score-end').classList.remove('visible');
  document.getElementById('quiz-setup').style.display='block';
  document.getElementById('quiz-active').style.display='none';
}

// INIT
renderCards(QUESTIONS);
updateStats();
</script>
</body>
</html>
