<!DOCTYPE html>
<html lang="ru">
<head>

<title>Карточки</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #f4f4f4;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
    }

    .card {
        background: white;
        width: 750px;
        max-width: 90%;
        border-radius: 20px;
        padding: 30px;
        box-shadow: 0 8px 25px rgba(0,0,0,0.1);

        margin-top: 0;
    }

        padding: 10px;
        border-radius: 8px;
        margin-bottom: 20px;
    }

    #question {
        font-size: 24px;
        font-weight: bold;
        margin-bottom: 15px;
    }

    #status {
        margin-bottom: 15px;
        font-weight: bold;
    }

    .learned {
        color: green;
    }

    .not-learned {
        color: crimson;
    }

    #answer {
        display: none;
        background: #f7f7f7;
        padding: 15px;
        border-radius: 10px;
        margin-top: 15px;
        line-height: 1.5;
    }

    .buttons {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 20px;
    }

    button {
        border: none;
        border-radius: 10px;
        padding: 12px 20px;
        cursor: pointer;
        font-size: 16px;
    }

    .show-btn {
        background: #4CAF50;
        color: white;
    }

    .next-btn {
        background: #2196F3;
        color: white;
    }

    .learn-btn {
        background: #ff9800;
        color: white;
    }
</style>
</head>
<body>

        <option value="learned">Выученные</option>

    <div id="status"></div>

    <div id="question"></div>

    <div class="buttons">
        <button class="show-btn" onclick="showAnswer()">
            Показать ответ

<script>

const QUESTIONS = [
{ "id":61, "cat":"Практика", "q":"Препарирование кариозных полостей I класса на фантомах.", "short":"1	Правильно определить принадлежность кариозной полости к соответствующему классу. 2	Правильно выбрать боры для каждого этапа препарирования. 3	Произвести этапы раскрытия и расширения кариозной полости. 4	Правильно выбрать целесообразную форму полости, в зависимости от расположения и глубины. 5	Правильно сформировать кариозную полость (отвесные стенки, прямые углы, плоское дно). 6	Создать скос краев кариозной полости под углом 45о  7	Проверить наличие некротизированного дентина стоматологическим зондом. ", "full":"Практическая отработка препарирования полостей I класса на фантоме: Цель: выработка навыков последовательного препарирования и формирования кариозной полости в соответствии с принципами Блека или адгезивного препарирования. Этапы: 1) Раскрытие: алмазным фиссурным или шаровидным бором, турбинным наконечником; удаление нависающих краёв эмали. 2) Расширение: конусовидным алмазным бором d=1 мм, иссечение фиссур на глубину 1–1,5 мм; ширина бороздки 0,7–0,8 мм; без создания острых углов. 3) Некроэктомия: шаровидным твёрдосплавным/стальным бором большого размера на малой скорости или экскаватором; движения от дна к стенкам; проверка кариес-маркером. 4) Формирование: а) для амальгамы — плоское дно (обратноконусовидный бор), прямые углы, глубина ≥1,5 мм, скос эмали 45°; б) для композита — плавные переходы, грушевидная форма, скос ≥1 мм. 5) Финирование: твёрдосплавный финир 10–12 граней или эмалевые ножи; гладкие края. Требования к сформированной полости I класса: всё пораженное иссечено; дно плотное; стенки отвесные (для амальгамы) или слегка расходящиеся; нет нависающей эмали; граница не на окклюзионных контактах; симметрия и чистота форм.", "opts":["Жевательные поверхности и ямки; ящикообразная или грушевидная; конусовидный бор для фиссур, шаровидный для некроэктомии","Контактные поверхности","Пришеечная область","Только режущий край"] },

{ "id":62, "cat":"Практика", "q":"Препарирование кариозных полостей II класса на фантомах.", "short":"1	Правильно определить принадлежность кариозной полости к соответствующему классу. 2	Провести сепарацию сепарационным односторонним диском. 3	Препарирование начинают с жевательной поверхности кариозной полости и после проваливания внутрь кариозной полости переходят к обработке с жевательной поверхности.  4	Некратизированную ткань убирают маленким шаровидным бором движениями в щёчно-язычном направлении.  5	Правильно выбрать целесообразную форму полости в зависимости от расположения и глубины.  6	Кариозную полость формировать с образованием ступенек на дентине зуба.  ", "full":"Практическая отработка препарирования полостей II класса: Особенности: доступ создаётся через жевательную поверхность (ОД или МО или МОД). Необходима защита соседнего зуба. Этапы: 1) Установка металлической разделительной полоски для защиты соседнего зуба; 2) Раскрытие окклюзиональной части: фиссурным бором, как I класс; 3) Создание апроксимального ящика (box): пиковидным или шаровидным алмазным бором; ширина ≥1,5 мм; выводится на вестибулярную и оральную сторону; придесневая стенка ≥0,5 мм ниже контактного пункта; 4) Некроэктомия; 5) Формирование: придесневая стенка перпендикулярна длинной оси зуба (для амальгамы — строго горизонтально; для композита — скос); боковые стенки апроксимального ящика слегка расходящиеся или параллельные; 6) Финирование, скос. Матрица и клин: клин вводится с вестибулярной стороны под матрицу в межзубной промежуток; отжимает десну и прижимает матрицу к шейке зуба; при открытой сэндвич-технике СИЦ вносится до матрицы. Критерии оценки: нет нависающих краёв; придесневая стенка сформирована; ящик симметричный и достаточной глубины; контактный пункт восстановлен.", "opts":["Контактные поверхности с доступом через жевательную; апроксимальный ящик, матрица, клин","Только жевательные ямки без апроксимальной части","Пришеечная область без жевательной","Режущий край фронтальных"] },

{ "id":63, "cat":"Практика", "q":"Препарирование кариозных полостей III класса на фантомах.", "short":"1 Правильно определить принадлежность кариозной полости к соответствующему классу.  2	Правильно выбрать боры для каждого этапа препарирования и выполнить их.  3	Кариозную полость препарируют с язычной или нёбной стороны (шаровидным бором).  4	Эмаль не имеющая дентинной основы полностью удаляется.  5	Кариозную полость формируют не повреждая соседний зуб.  6	Дополнительная площадка (фальц) формируется с язычной или небной стороны.  ", "full":"Практическая отработка препарирования полостей III класса: Локализация: контактные поверхности резцов и клыков без нарушения режущего края и угла коронки. Доступ: преимущественно с оральной (нёбной/язычной) стороны — сохраняется эстетика вестибулярной поверхности. При обширном поражении или для улучшения эстетики — вестибулярный доступ. Этапы: 1) Раскрытие: шаровидным алмазным бором небольшого диаметра; 2) Расширение: до здоровых тканей; при профилактическом пломбировании — минимальное; 3) Некроэктомия: тщательная, с контролем кариес-маркером; 4) Формирование: треугольная форма с вершиной к режущему краю; стенки отвесные; для адгезивного препарирования — сглаженные углы; 5) Финирование: длинный скос эмали на вестибулярной стенке — 3–4 волны (для плавного перехода реставрации и маскировки границы). Пломбирование композитом: нанесение через прозрачную матрицу; опаковый слой на дентин; прозрачный слой — эмаль; полировка — при необходимости штрипсами. Критерии: отсутствие нависающих краёв; плавный скос; чёткое восстановление контурных точек; без нарушения режущего края.", "opts":["Контактные поверхности фронтальных без угла; треугольная форма; оральный доступ; длинный скос вестибулярной эмали","С разрушением угла коронки (это IV класс)","Пришеечная область","Жевательная поверхность"] },

{ "id":64, "cat":"Практика", "q":"Препарирование кариозных полостей IV класса на фантомах.", "short":"1	Правильно определить принадлежность кариозной полости к соответствующему классу.  2	Правильно выбрать боры для каждого этапа препарирования и выполнить их.  3	Кариозную полость препарируют с язычной или небной стороны (шаровидным бором).  4	Эмаль не имеющая дентинной основы полностью удаляется.  5	Кариозную полость формируют не повреждая соседний зуб.  6	Дополнительная площадка формируется с язычной или небной стороны.  7	На вестибулярной поверхности зуба образуют ретенционные пункты (при необходимости).", "full":"Практическая отработка препарирования полостей IV класса: Локализация: контактные поверхности резцов и клыков с нарушением угла коронки и/или режущего края — наиболее сложные реставрации. Подготовка: до препарирования снять силиконовый оттиск (ключ) нёбной поверхности зуба для последующего воспроизведения нёбной стенки. Этапы: 1) Раскрытие; 2) Расширение в пределах поражения; 3) Некроэктомия; 4) Формирование: длинный волнистый скос эмали на вестибулярной поверхности (≥3 мм, 3–4 волны); ретенционные пазы (пины или пазы в дентине) при значительном разрушении (>1/3 коронки); при необходимости — парапульпарные штифты; сглаженные контуры для адгезивного пломбирования. 5) Финирование длинного скоса эмали. Пломбирование: нёбная стенка восстанавливается первой (через силиконовый ключ или с помощью матрицы); нанесение опакового слоя на дентин; прозрачный слой на эмаль; воспроизведение мамелонов; полировка. Критерии: восстановление угла и режущего края; плавный скос; имитация оптики зуба; достаточная прочность (слой ≥2 мм в нагружаемых зонах).", "opts":["Контактные поверхности с разрушением угла коронки; длинный волнистый скос; ретенционные пазы; силиконовый ключ","Без разрушения угла (это III класс)","Пришеечная область","Жевательная поверхность"] },

{ "id":65, "cat":"Практика", "q":"Препарирование кариозных полостей V класса на фантомах.", "short":"1	Правильно определить принадлежность кариозной полости к соответствующему классу.  2	Правильно выбрать боры для каждого этапа препарирования.  3	Проводят электрокоагуляцию при близком расположении кариозной полости к десне.  4	Кариозную полость формируется в овальной или почкообразной форме  5	Дно кариозной полости должно быть выпуклым (из-за близкого расположения пульпы).  6	На стенках кариозной полости сформировать ретенционные пункты с помощью обратно конусного или колесовидного бора.", "full":"Практическая отработка препарирования полостей V класса: Локализация: пришеечная область всех зубов (вестибулярные и оральные поверхности). Особенности: близость к десне; часто поддесневое расположение; ограниченный доступ; сложная изоляция. Подготовка: ретракция десны ретракционной нитью или ретрактором; установка клина при необходимости; изоляция ватными валиками и слюноотсосом; при возможности — коффердам. Этапы: 1) Раскрытие: шаровидным или грушевидным алмазным бором; 2) Расширение: минимальное, только в пределах поражения; 3) Некроэктомия; 4) Формирование: бобовидная форма; придесневая стенка горизонтальная; при применении адгезивных материалов — без ретенционных подрезок; при применении амальгамы — обратноконусовидным бором создать подрезки; 5) Финирование: мелкозернистым алмазным бором, скос на аксиальных стенках. Пломбирование: при поддесневой придесневой стенке — открытая сэндвич-техника (СИЦ → адгезивная система → композит); при наддесневой — адгезивная система + послойный композит или компомер. Критерии: правильная бобовидная форма; чёткие края; хорошее краевое прилегание; восстановленный контур коронки.", "opts":["Пришеечная область; бобовидная форма; ретракция десны; открытая сэндвич-техника при поддесневой стенке","Контактные поверхности","Жевательная поверхность","Режущий край"] },

{ "id":66, "cat":"Практика", "q":"Препарирование кариозных полостей VI класса на фантомах.", "short":"1	Правильно определить принадлежность кариозной полости к соответствующему классу.  2	Правильно выбрать боры для каждого этапа препарирования.  3	Формировать кариозную полость овальный или почкообразной форме.  4	Дно кариозной полости должно быть выпуклым (из-за близкого расположения пульпы)  5	На стенках кариозной полости сформировать ретенционные пункты с помощью обратно конусного или колесовидного бора.", "full":"Практическая отработка препарирования полостей VI класса: Локализация: вершины жевательных бугров моляров и премоляров, режущие края резцов и клыков. Особенности: дефекты небольшие, чашеобразные; дно часто пигментировано (тёмно-коричневое); минимально-инвазивный подход. Этапы: 1) Раскрытие: шаровидным алмазным бором небольшого диаметра (0,8–1,0 мм); 2) Расширение: только в пределах поражения; 3) Некроэктомия: тщательное удаление пигментированного мягкого дентина экскаватором или стальным шаровидным бором; 4) Формирование: чашеобразная форма (круглая или овальная); стенки слегка расходящиеся; без острых углов; без ретенционных подрезок (адгезивная фиксация); 5) Финирование: мелкозернистый алмазный бор по краям. Пломбирование: адгезивная система; нанонаполненный или микрогибридный световой композит (обеспечивает полировку и износостойкость на буграх); нанесение одной порцией (небольшой объём); полимеризация 20–40 с; контроль окклюзии. Критерии: чёткие края; без нависающих краёв; форма воспроизводит естественный контур бугра; нет преждевременных окклюзионных контактов.", "opts":["Вершины бугров и режущие края; чашеобразная форма; минимальная инвазивность; нано/микрогибридный композит","Пришеечная область","Контактные поверхности","Жевательные ямки (это I класс)"] },

{ "id":67, "cat":"Практика", "q":"Медикаментозная обработка кариозной полости на фантомах.", "short":"1	Формируют кариозную полость.  2	Берут антисептический раствор (3% перекись водорода, 1%  раствор хлорамина или др.).  3	Ватный шарик макают в раствор пинцетом и обрабатывают кариозную полость.  4	Манипуляцию повторяют несколько раз.", "full":"Медикаментозная обработка — этап после некроэктомии и формирования полости перед нанесением изолирующей и лечебной прокладок или адгезивной системы. Цель: дезинфекция полости (уменьшение числа микроорганизмов); удаление дентинного смазанного слоя (smear layer) при подготовке к адгезии; предотвращение инфицирования пульпы. Основные препараты: 1) Хлоргексидин биглюконат 0,05–0,5% (водный раствор): антисептик широкого спектра; наносится на 30–60 с; хорошо совместим с адгезивными системами; не мешает полимеризации; рекомендуется как первый выбор. 2) 3% перекись водорода: механическое очищение пузырьками кислорода; антибактериальное действие. 3) 70% этиловый спирт: дезинфицирует и слегка подсушивает. Не рекомендуется при глубоком кариесе (раздражает обнажённые дентинные канальцы). 4) 0,5–1% раствор йода: антисептик, но может окрашивать ткани. Порядок: промыть водой → просушить слабой струёй воздуха → нанести антисептик на 30–60 с → промыть → просушить (осторожно, без пересушивания дентина!). Ошибки: пересушивание дентина → схлопывание коллагеновых волокон → нарушение адгезии; избыточная экспозиция агрессивных антисептиков → химическое повреждение пульпы.", "opts":["Хлоргексидин 0,05–0,5% или H₂O₂ 3% на 30–60 с → промыть → просушить; дезинфекция и удаление опилок","Только дистиллированная вода","Только спирт 70%","Только перекись водорода"] },

{ "id":68, "cat":"Практика", "q":"Высушивание кариозной полости на фантомах.", "short":"1	Провести все этапы препарирования кариозной полости.  2	Кариозную полость медикаментозно обрабатывают.  3	Кариозную полость высушивают при помощи ватного тампона спиртом или эфиром.  4	Кариозную полость также можно высушить с помощью ватного тампона или струи воздуха из пистолета стоматологической установки.  ", "full":"Высушивание (осушение) кариозной полости — важный технологический этап, непосредственно предшествующий нанесению адгезивной системы или пломбировочного материала. Цель: удалить избыток влаги, не пересушивая дентин. Методика: 1) Промокнуть полость ватными шариками — основной способ удаления влаги; 2) Слабой (!) струёй воздуха из пистолета установки — дополнительно, с расстояния 10–15 см; 3) Эмаль — можно высушить интенсивнее; дентин — только слегка. Критерий правильного высушивания: дентин должен оставаться слегка блестящим (слегка влажным) — «moist bonding» — влажное бондирование. При правильно проведённом высушивании дентин: тёмный, блестящий, с матовым оттенком; коллагеновые волокна раскрыты и способны к инфильтрации праймером. Ошибки: 1) Пересушивание: дентин белеет, матовеет → коллагеновые волокна слипаются («коллапс») → праймер не может пропитать → гибридная зона не образуется → плохая адгезия → постоперативная чувствительность. Признак пересушивания — белесоватость дентина. Если произошло — смочить дентин дистиллированной водой или специальным увлажнителем (Aqua-Prep, EDTA-раствор) на несколько секунд. 2) Недостаточное высушивание (влажность избыточна): вода мешает полимеризации → слабая адгезия. Для СИЦ: дентин может быть чуть влажнее, чем для композитов (СИЦ гидрофильны).", "opts":["Ватными шариками + слабая воздушная струя; дентин остаётся слегка влажным/блестящим; пересушивание разрушает адгезию","Только сильная воздушная струя до белизны дентина","Только ватными шариками без воздуха","Высушивание не нужно"] },

{ "id":69, "cat":"Практика", "q":"Восстановление полости композитами химического отверждения.", "short":"1	Образовавшаяся кариозная полость обрабатывается медикаментозными препаратами.  2	 Кариозная полость высушивается.  3	Зуб изолируются от слюны.  4	В кариозную полость границы эмалевой-дентинной границы накладывают изолирующую основу.  5	Кариозная полость обрабатывается 30% ортофосфорной кислотой в течение 1 минуты.  6	Кариозную полость промывают водой.  7	Кариозная полость высушивается.  8	Выбирается цвет пломбировочного материала.  9	Смешивают основную массу и катализатора на специальной бумаге пластмассовым шпателем.  10	Готовая масса вводится в полость и формируется  в течении 1 минуты.  11	Окончательная обработка производится через 3 минуты.  ", "full":"Пломбирование полости химически отверждаемым (самоотверждаемым) композитом: Подготовка полости: стандартная (препарирование, медикаментозная обработка, изолирующая/лечебная прокладка). Применение адгезивной системы (при использовании современных ХО-композитов): нанесение химически отверждаемой адгезивной системы (химический вариант 4-го поколения); протравливание 37% H₃PO₄ → промыть → просушить → праймер → бонд → выдержка 30–60 с (без полимеризации светом). Приготовление материала: 1) Отмерить равные части базы и катализатора (1:1) на блоке или стеклянной пластине; 2) Смешать пластиковым (не металлическим!) шпателем быстрыми движениями в течение 30–45 с до однородной консистенции и цвета; 3) Внести в полость одной порцией (не слоями!); 4) Сформировать пломбу инструментом (штопфером, гладилкой) до начала схватывания; 5) Удалить излишки; 6) Не использовать фотополимеризатор — свет не нужен. Твердение: 3–7 мин при температуре тела. Обработка пломбы (после полимеризации): контроль окклюзии; шлифование и полировка твёрдосплавными финирами и дисками. Особенности: ограниченное рабочее время; нельзя вносить второй порцией; аминовое пожелтение со временем.", "opts":["Смешать 2 пасты 1:1 пластиковым шпателем; внести одной порцией без света; коррекция до схватывания; 3–7 мин твердения","Световая полимеризация 20–40 с","Послойное нанесение с полимеризацией","Нагрев до жидкого состояния"] },

{ "id":70, "cat":"Практика", "q":"Восстановление полости композитами светового отверждения.", "short":"1	Образовавшаяся кариозная полость обрабатывается медикаментозными препаратами.  2	Кариозная полость высушивается.  3	Зуб изолируются от слюны.  4	В кариозную полость границы эмалевой-дентинной границы накладывают изолирующую основу.  5	Кариозная полость обрабатывается 30% ортофосфорной кислотой в течение 1 минуты.  6	 Кариозную полость промывают водой.  7	Кариозная полость высушивается.  8	На стены кариозной полости наносится  адгезив с последующей полимеризацией.   9	 Выбирается цвет пломбы.  10	Выбранный цвет пломбировочного материала вводится послойно в кариозную полость и производят отверждение с помощью полимеризационной лампы.  11	Производится первичная и окончательная обработка пломбы", "full":"Пломбирование световым (фотополимеризуемым) композитом — основная методика реставрации в современной терапевтической стоматологии: Этапы: 1) Выбор цвета (до начала всех манипуляций, при увлажнённом зубе и при дневном свете); 2) Препарирование полости, изоляция от слюны; 3) Медикаментозная обработка, высушивание; 4) Нанесение лечебной и/или изолирующей прокладки (при необходимости); 5) Адгезивная система (4 или 5 поколения): а) протравливание 37% H₃PO₄: эмаль 15–30 с, дентин 15 с; б) промыть 15–30 с; в) просушить (дентин — слегка влажный); г) нанести праймер (для 4-го поколения) и просушить; д) нанести бонд, просушить от растворителя, полимеризовать 10–20 с; 6) Внесение первого слоя текучего композита (адаптирующий слой, ~0,5 мм на дно); полимеризация 20–40 с; 7) Послойное нанесение основного композита слоями ≤2 мм; полимеризация каждого слоя 20–40 с с разных сторон (особенно при глубоких полостях); 8) Моделирование анатомической формы (штопфером, гладилкой, кисточкой); 9) Финирование (твёрдосплавные финиры 10–12 граней): контурирование, удаление излишков; 10) Шлифование и полировка (финиры 16–30 граней, диски от грубых к мелким, пасты); 11) Контроль окклюзии (артикуляционная бумага), шлифование точек преждевременного контакта.", "opts":["Адгезив → слои ≤2 мм с полимеризацией 20–40 с → финирование → полировка","Одним слоем без полимеризации","Химическое отверждение без света","Без адгезива прямо на дентин"] },

{ "id":71, "cat":"Практика", "q":"Пломбирование кариозных полостей текучими (flowable) композитными материалами.", "short":"1	Образовавшаяся кариозная полость обрабатывается медикаментозными препаратами.  2	Кариозная полость высушивается.  3	Зуб изолируются от слюны.  4	В кариозную полость границы эмалевой-дентинной границы накладывают изолирующую основу.  5	Кариозная полость обрабатывается 30% ортофосфорной кислотой в течение 1 минуты.  6	Кариозную полость промывают водой.  7	Кариозная полость высушивается.  8	На стены кариозной полости наносится  адгезив с последующей полимеризацией.   9	Выбирается жидкотекучий композитная пломба.  10	Выбранный жидкотекучий композитная пломба вводится послойно в кариозную полость и производят отверждение с помощью полимеризационной лампы.  11	Производится первичная и окончательная обработка пломбы.", "full":"Методика пломбирования с применением жидкотекучих (flowable) композитов: Показания: адаптирующий первый слой при всех полостях (снижает полимеризационный стресс); пломбирование небольших полостей (I, III классов); поддесневые стенки (V класс, придесневая II класса); туннельный метод; фиссурная герметизация. Протокол: 1) Препарирование, изоляция, медикаментозная обработка; 2) Адгезивная система (полный протокол 4 или 5 поколения — протравливание, праймер, бонд); 3) Нанесение жидкотекучего первого слоя на дно полости из канюли или шприца тонким слоем 0,5–1 мм; 4) Распределить по дну и стенкам инструментом, чтобы убрать пузыри; 5) Полимеризация 20–40 с; 6) Нанесение основного микрогибридного или нанонаполненного композита слоями ≤2 мм; полимеризация каждого слоя; 7) Моделирование анатомической формы; 8) Финирование и полировка. Механизм действия адаптирующего слоя: жидкотекучий композит обладает упругостью и модулем эластичности ниже, чем у обычных гибридных → демпфирует полимеризационный стресс → лучшее краевое прилегание. Важно: не использовать текучий материал как основной наполнитель в нагружаемых зонах (низкая прочность).", "opts":["Текучий слой 0,5–1 мм на дно (адаптирующий) → полимеризация → основной слоями ≤2 мм; снижает стресс и улучшает адаптацию","Весь объём заполнить текучим","Без адгезива сразу текучий","Конденсируемый без текучего"] },

{ "id":72, "cat":"Практика", "q":"Препарирование «Туннельным» методом.", "short":"1	Правильно определить класс кариозной полости.  2	Для сохранения краевого гребня от края зуба сохраняется расстояние в пределах 2: 2,5 мм.  3	С жевательной поверхности начинается препарирование в треугольной глубине.  4	Выполняется каждый этап препарирования.  5	Проверяется правильность препарирования кариозной полости туннельным методом.  ", "full":"Практическая отработка туннельного метода препарирования: Показания: начальный и средний апроксимальный кариес (D1–D2), без обширного поражения, когда контактный пункт сохранён. Этапы: 1) Рентгенологическая оценка: установить глубину и точную локализацию апроксимального кариеса; оценить расстояние от краевого гребня до очага; 2) Изоляция зуба, защита соседнего; 3) Создание доступа: шаровидным или грушевидным алмазным бором d=0,8–1,0 мм через краевой гребень жевательной поверхности; 4) Расширение туннеля: тонкими шаровидными борами малого диаметра (угловой наконечник, малая скорость) направлять к очагу кариеса по краю эмали; 5) Некроэктомия: мини-экскаватором или маленьким шаровидным бором, движения от дна к стенкам; 6) Высушивание; 7) Пломбирование: СИЦ (химического или светового отверждения) или текучий композит вносится через канюлю или мини-штопфер поэтапно; для текучего — сначала нанести адгезивную систему; 8) Полимеризация (для светоотверждаемых) через жевательную поверхность с нескольких сторон; 9) Восстановление жевательной поверхности (если нарушена): обычным послойным методом; 10) Полировка. Ошибки: недостаточное удаление кариеса (низкий контроль); перфорация в сторону пульпы; недостаточная полимеризация.", "opts":["Доступ через краевой гребень жевательной поверхности к апроксимальному кариесу; контактный пункт не разрушается; СИЦ или текучий","Через вестибулярную поверхность (BATE)","Через жевательную до полного разрушения краевого гребня","ART-методика без бормашины"] },

{ "id":73, "cat":"Практика", "q":"Пломбирование «Открытой» сэндвич техникой.", "short":"1	Правильно определить класс кариозной полости.  2	Выполняется каждый этап препарирования.  3	Выбирается стеклоиономерные и композиционные материалы.  4	Контактная поверхностью кариозной полости полностью закрывается стеклоиономерным цементом.  5	 Композитный пломбировочный материал помещается на жевательную поверхность ", "full":"Пломбирование открытой сэндвич-техникой: Показание: полости II класса, когда придесневая стенка находится на уровне или ниже десневого края (поддесневое расположение) → невозможно обеспечить сухость для адгезива в зоне придесневой стенки. Последовательность: 1) Препарирование полости II класса (МО, ОД, МОД) с апроксимальным ящиком; 2) Установка матрицы и клина (или кольца); 3) Ретракция десны (при необходимости); 4) Кондиционирование дентина (полиакриловая кислота 10–25% или EDTA) — для улучшения адгезии СИЦ; 5) Внесение СИЦ (химического или светового отверждения) на дно и придесневую стенку апроксимального ящика; СИЦ вносится до уровня дна ящика или чуть выше, заполняя весь апроксимальный ящик; выходит на апроксимальную (контактную) поверхность и граничит с десной; 6) Полимеризация СИЦ (при световом) или выдержка (при химическом); 7) Снятие матрицы; 8) Кондиционирование/протравливание поверхности СИЦ (35–37% H₃PO₄, 15 с) — для адгезии к СИЦ; 9) Адгезивная система на всю оставшуюся поверхность (не на апроксимальный СИЦ); 10) Послойное нанесение композита в окклюзиональную часть; 11) Финирование и полировка. Преимущества: лучшая биологическая совместимость у десневого края; выделение фтора в области шейки.", "opts":["СИЦ на дно и придесневую стенку, выходит на апроксимальную поверхность к десне; затем адгезив + композит в окклюзиональную часть","Закрытая — СИЦ полностью перекрыт","Только СИЦ без композита","Только композит без СИЦ"] },

let currentQuestion = null;

// Загружаем выученные id
let learnedCards =
    JSON.parse(localStorage.getItem("learnedCards")) || [];

function saveLearned() {
    localStorage.setItem(
        "learnedCards",
        JSON.stringify(learnedCards)
    );
}

function getFilteredQuestions() {
    const mode =
        document.getElementById("mode").value;

    if (mode === "learned") {
        return QUESTIONS.filter(q =>
            learnedCards.includes(q.id)
        );
    }

    if (mode === "unlearned") {
        return QUESTIONS.filter(q =>
            !learnedCards.includes(q.id)
        );
    }

    return QUESTIONS;
}

function updateStatus() {
    const status =
        document.getElementById("status");

    const learned =
        learnedCards.includes(currentQuestion.id);

    status.textContent = learned
        ? "✓ Выученная карточка"
        : "✗ Невыученная карточка";

    status.className = learned
        ? "learned"
        : "not-learned";
}

function nextCard() {
    const filtered = getFilteredQuestions();

    if (!filtered.length) {
        document.getElementById("question")
            .textContent = "Нет карточек";

        document.getElementById("answer")
            .style.display = "none";

        document.getElementById("status")
            .textContent = "";

        return;
    }

    const randomIndex =
        Math.floor(Math.random() * filtered.length);

    currentQuestion =
        filtered[randomIndex];

    document.getElementById("question")
        .textContent = currentQuestion.q;

    const answer =
        document.getElementById("answer");

    answer.style.display = "none";
    answer.textContent =
        currentQuestion.short;

    updateStatus();
}

function showAnswer() {
    document.getElementById("answer")
        .style.display = "block";
}

function markLearned() {
    if (!learnedCards.includes(currentQuestion.id)) {
        learnedCards.push(currentQuestion.id);
        saveLearned();
    }

    updateStatus();
}

nextCard();
</script>
